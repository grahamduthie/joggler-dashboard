<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>Lineside — Twyford</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#07090f;color:#c0d0e0;
  font-family:'Segoe UI',Arial,sans-serif;font-size:14px}

/* ── Topbar ── */
#topbar{display:flex;align-items:center;justify-content:space-between;
  height:36px;padding:0 12px;background:#0d1219;border-bottom:1px solid #1a2535;
  font-size:12px;color:#4a7a9a}
#topbar .title{font-size:14px;font-weight:600;color:#7aaccc;letter-spacing:.05em}
#topbar .clock{font-size:16px;font-weight:300;color:#c0d0e0;font-variant-numeric:tabular-nums}
#refresh-dot{width:6px;height:6px;border-radius:50%;background:#1e4a2a;margin-left:6px;
  transition:background .3s}
#refresh-dot.active{background:#3ddc84}

/* ── Recent strip ── */
#recent-strip{height:38px;display:flex;align-items:center;padding:0 12px;gap:10px;
  background:#0a0e17;border-bottom:1px solid #141c2a;overflow:hidden}
.recent-label{font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:.08em;
  white-space:nowrap;flex-shrink:0}
#recent-content{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.rc-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;
  font-size:11px;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.rc-info{font-size:12px;color:#7090a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-time{font-size:11px;color:#3a5a7a;white-space:nowrap;flex-shrink:0}

/* ── Track SVG container ── */
#track-wrap{position:relative;width:800px;height:210px;background:#07090f}
#track-svg{position:absolute;top:0;left:0;width:800px;height:210px}

/* ── Next train panel ── */
#next-wrap{height:155px;display:flex;flex-direction:column;border-top:1px solid #141c2a}
.next-empty{display:flex;align-items:center;justify-content:center;height:100%;
  color:#2a4a6a;font-size:16px;letter-spacing:.05em}

#next-header{display:flex;align-items:stretch;flex:0 0 56px}
.nh-badge{display:flex;align-items:center;justify-content:center;width:64px;
  font-size:28px;font-weight:900;letter-spacing:.03em;flex-shrink:0}
.nh-main{display:flex;flex-direction:column;justify-content:center;gap:3px;
  padding:0 12px;flex:1;overflow:hidden}
.nh-hc{font-size:22px;font-weight:700;letter-spacing:.06em;color:#e0eaf4}
.nh-op{font-size:11px;color:#5a8aaa;letter-spacing:.03em;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.nh-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
  gap:4px;padding:0 12px;flex-shrink:0}
.nh-track-badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;
  background:#0f1e30;border:1px solid #1e3a55;color:#6a9abf;letter-spacing:.05em}
.nh-call-badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}
.badge-stop{background:#1a3020;border:1px solid #2a5030;color:#4aaa60}
.badge-pass{background:#0f1e30;border:1px solid #1e3a55;color:#4a7aaa}
.badge-est{background:#2a2010;border:1px solid #4a3a10;color:#aa8a30}

#next-route{display:flex;align-items:center;padding:6px 12px;gap:6px;
  flex:0 0 32px;background:#08101a;font-size:12px;color:#5a8aaa;overflow:hidden}
.nr-ep{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nr-ep-right{text-align:right}
.nr-arrow{color:#2a4a6a;flex-shrink:0;font-size:14px}
.nr-house{color:#ffd080;font-weight:600;flex-shrink:0;text-align:center}

#next-footer{display:flex;align-items:stretch;flex:1}
.nf-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;border-right:1px solid #0d1620;gap:2px;padding:6px 4px}
.nf-card:last-child{border-right:none}
.nf-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#3a5a7a}
.nf-value{font-size:15px;font-weight:700;color:#c0d8f0;font-variant-numeric:tabular-nums}
.nf-countdown{font-size:24px;font-weight:300;color:#e8f4ff;font-variant-numeric:tabular-nums}
.stat-ontime{color:#3ddc84}
.stat-late{color:#f06040}
.stat-est{color:#c0a030}
.stat-cancel{color:#c03030}

/* ── Also coming strip ── */
#also-strip{height:41px;display:flex;align-items:center;padding:0 10px;gap:8px;
  background:#0a0e17;border-top:1px solid #141c2a;overflow:hidden}
.also-label{font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:.08em;
  white-space:nowrap;flex-shrink:0}
.also-train{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;
  background:#0d1620;border:1px solid #1a2a3a;flex-shrink:0}
.also-badge{width:28px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:2px;font-size:9px;font-weight:700}
.also-hc{font-size:11px;font-weight:600;color:#c0d0e0;letter-spacing:.04em}
.also-eta{font-size:10px;color:#4a7aaa}
</style>
</head>
<body>

<div id="topbar">
  <span class="title">Lineside · Twyford</span>
  <span style="display:flex;align-items:center">
    <span id="clock" class="clock">--:--</span>
    <span id="refresh-dot"></span>
  </span>
</div>

<div id="recent-strip">
  <span class="recent-label">Last</span>
  <div id="recent-content"><span class="rc-info" style="color:#2a4a6a">—</span></div>
</div>

<div id="track-wrap">
  <svg id="track-svg" viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- Direction labels -->
    <text x="14" y="20" fill="#2a4060" font-size="10" font-family="Arial">← Reading</text>
    <text x="786" y="20" fill="#2a4060" font-size="10" font-family="Arial" text-anchor="end">Maidenhead →</text>

    <!-- DOWN track (trains move right → left) -->
    <text x="14" y="60" fill="#1e3a55" font-size="9" font-family="Arial">DOWN</text>
    <line x1="60" y1="65" x2="740" y2="65" stroke="#162030" stroke-width="6"/>
    <line x1="60" y1="65" x2="740" y2="65" stroke="#1e3a55" stroke-width="2"/>

    <!-- UP track (trains move left → right) -->
    <text x="14" y="125" fill="#1e3a55" font-size="9" font-family="Arial">UP</text>
    <line x1="60" y1="130" x2="740" y2="130" stroke="#162030" stroke-width="6"/>
    <line x1="60" y1="130" x2="740" y2="130" stroke="#1e3a55" stroke-width="2"/>

    <!-- Twyford station box -->
    <rect id="stn-box" x="163" y="50" width="106" height="92" rx="3"
          fill="#0d1a28" stroke="#1e3a55" stroke-width="1"/>
    <text x="216" y="100" fill="#2a5070" font-size="9" font-family="Arial"
          text-anchor="middle">TWYFORD</text>

    <!-- House / crossover marker -->
    <line x1="279" y1="45" x2="279" y2="150" stroke="#3a5020" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="279" y="170" fill="#ffd080" font-size="16" text-anchor="middle" filter="url(#glow)">★</text>
    <text x="279" y="185" fill="#6a5020" font-size="8" font-family="Arial" text-anchor="middle">HOUSE</text>

    <!-- Ruscombe Jn landmark -->
    <line x1="469" y1="58" x2="469" y2="137" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="2,4"/>
    <text x="469" y="200" fill="#1e3a55" font-size="8" font-family="Arial" text-anchor="middle">Ruscombe</text>

    <!-- Signal indicators (positioned at known signal locations) -->
    <!-- D6:12 — Down Relief signal, protects Twyford approach from east (~berth 549) -->
    <g id="sig-D6-12" transform="translate(395, 65)">
      <circle r="5" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1"/>
      <text y="4" fill="#2a4a6a" font-size="7" font-family="Arial" text-anchor="middle">S</text>
    </g>
    <!-- D6:15 — Up Main signal through Twyford (~berth 570) -->
    <g id="sig-D6-15" transform="translate(284, 130)">
      <circle r="5" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1"/>
      <text y="4" fill="#2a4a6a" font-size="7" font-family="Arial" text-anchor="middle">S</text>
    </g>
    <!-- D6:1B — Up Relief/bidirectional near station (~berth 554) -->
    <g id="sig-D6-1B" transform="translate(350, 130)">
      <circle r="5" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1"/>
      <text y="4" fill="#2a4a6a" font-size="7" font-family="Arial" text-anchor="middle">S</text>
    </g>

    <!-- Train icons layer (dynamic) -->
    <g id="trains-layer"></g>
  </svg>
</div>

<div id="next-wrap">
  <div class="next-empty" id="next-empty">No trains due</div>
  <div id="next-header" style="display:none"></div>
  <div id="next-route"  style="display:none"></div>
  <div id="next-footer" style="display:none"></div>
</div>

<div id="also-strip">
  <span class="also-label">Also</span>
  <div id="also-content" style="display:flex;gap:6px;overflow:hidden"></div>
</div>

<script>
'use strict';

// ── Operator colour table (subset — same as trains.html) ───────────────────
var OPS = {
  GW:{bg:'#007a4d',fg:'#fff',abbr:'GWR'},
  XR:{bg:'#7156a5',fg:'#fff',abbr:'ELN'},
  XC:{bg:'#a61530',fg:'#fff',abbr:'XC '},
  HX:{bg:'#532885',fg:'#fff',abbr:'HEX'},
  GB:{bg:'#1e3050',fg:'#c8d8f0',abbr:'GBRf'},
  DW:{bg:'#db0a17',fg:'#fff',abbr:'DB '},
  FL:{bg:'#1a6b2a',fg:'#fff',abbr:'FL '},
  ZZ:{bg:'#f05a24',fg:'#fff',abbr:'COL'},
  ZN:{bg:'#d4ac0d',fg:'#111',abbr:'NR '},
};
function opStyle(code, isPassenger) {
  if (isPassenger === false) return OPS[code] || {bg:'#2d3d1a',fg:'#a0c060',abbr:'FRT'};
  return OPS[code] || {bg:'#2a3a4a',fg:'#c0d0e0',abbr:(code||'??').slice(0,3)};
}

// ── Berth → SVG x position ─────────────────────────────────────────────────
// D6 berth range shown: 476 (east/Maidenhead, x=740) to 620 (west/Reading, x=60)
var BERTH_EAST = 476, BERTH_WEST = 620;
var SVG_X_EAST = 740, SVG_X_WEST = 60;

function berthToX(berthStr) {
  var b = parseInt(berthStr, 10);
  if (isNaN(b)) return null;
  // Main line berths (1600+): remap via known crossover point 1602≈596
  if (b >= 1600) b = b - 1602 + 596;
  if (b < BERTH_EAST - 20 || b > BERTH_WEST + 20) return null;
  var frac = (b - BERTH_EAST) / (BERTH_WEST - BERTH_EAST);
  return Math.round(SVG_X_EAST - frac * (SVG_X_EAST - SVG_X_WEST));
}

// Estimated x from schedule: ms until Twyford, direction, speed class
var HOUSE_X = berthToX('571');  // ≈ 279 in SVG coords
function schedToX(msUntilHouse, direction, isMain) {
  // Berths increase going west. Down trains approach from east (lower berth numbers).
  // Up trains approach from west (higher berth numbers).
  // Speed: Relief ~75mph = 33m/s, Main ~110mph = 49m/s; each berth ≈ 100m
  var mps = isMain ? 49 : 33;
  var berths_away = (msUntilHouse / 1000) * (mps / 100);
  var approx_berth = direction === 'down'
    ? 571 - berths_away   // approaching from east → lower berth = higher x (right)
    : 571 + berths_away;  // approaching from west → higher berth = lower x (left)
  return berthToX(String(Math.round(approx_berth)));
}

// ── Signal aspect decoding ─────────────────────────────────────────────────
function decodeAspect(hexData) {
  var b = parseInt(hexData, 16);
  if (isNaN(b)) return 'unknown';
  // Empirical bitmask for TVSC IECC (from correlator runs)
  if (b & 0x01) return 'red';
  if (b & 0x02) return 'yellow';
  if (b & 0x04) return 'double-yellow';
  if (b & 0x08) return 'green';
  return 'unknown';
}
var ASPECT_COLOUR = {
  'red': '#cc2222', 'yellow': '#ccaa00', 'double-yellow': '#aacc00',
  'green': '#22cc44', 'unknown': '#2a4a6a'
};

// ── Key signal addresses to display ───────────────────────────────────────
// Identified from correlator run 2026-06-25
var KEY_SIGNALS = {
  'D6:12': 'sig-D6-12',   // Down Relief approach to Twyford
  'D6:15': 'sig-D6-15',   // Up Main through Twyford
  'D6:1B': 'sig-D6-1B',   // Up Relief / bidirectional
};

// ── Time formatting ────────────────────────────────────────────────────────
function fmtHHMM(isoOrMs) {
  var d = typeof isoOrMs === 'number' ? new Date(isoOrMs) : new Date(isoOrMs);
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtCountdown(ms) {
  var s = Math.round(ms / 1000);
  if (s < 0) return 'now';
  if (s < 60) return s + 's';
  var m = Math.floor(s / 60), r = s % 60;
  return r ? m + 'm ' + r + 's' : m + 'm';
}

// ── State ──────────────────────────────────────────────────────────────────
var trains = [];
var tdPositions = {};  // headcode → {berth, x, ts, age_s}
var sfStates   = {};   // "D6:12" → {data, aspect, ts}
var lastTdTs   = 0;

// ── Fetch trains ───────────────────────────────────────────────────────────
function fetchTrains() {
  fetch('/api/trains')
    .then(function(r){ return r.json(); })
    .then(function(d){ trains = d.trains || []; render(); })
    .catch(function(){});
}

// ── Fetch TD live ──────────────────────────────────────────────────────────
function fetchTdLive() {
  fetch('/api/td-live')
    .then(function(r){ return r.json(); })
    .then(function(d){
      // Update positions
      tdPositions = {};
      (d.positions || []).forEach(function(p){
        if (p.age_s < 600) {
          var x = berthToX(p.berth);
          if (x !== null) tdPositions[p.headcode] = {berth: p.berth, x: x, ts: p.ts, age_s: p.age_s};
        }
      });
      // Update signal states
      sfStates = {};
      Object.keys(d.signals || {}).forEach(function(k){
        var s = d.signals[k];
        sfStates[k] = {data: s.data, aspect: decodeAspect(s.data), ts: s.ts};
      });
      lastTdTs = d.ts || 0;
      renderSignals();
      renderTrackTrains();
      flash();
    })
    .catch(function(){});
}

// ── Render clock ───────────────────────────────────────────────────────────
function renderClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function flash() {
  var dot = document.getElementById('refresh-dot');
  dot.classList.add('active');
  setTimeout(function(){ dot.classList.remove('active'); }, 400);
}

// ── Render signal indicators ───────────────────────────────────────────────
function renderSignals() {
  Object.keys(KEY_SIGNALS).forEach(function(addr){
    var elId = KEY_SIGNALS[addr];
    var el = document.getElementById(elId);
    if (!el) return;
    var circle = el.querySelector('circle');
    var sf = sfStates[addr];
    if (sf) {
      var col = ASPECT_COLOUR[sf.aspect] || ASPECT_COLOUR.unknown;
      circle.setAttribute('fill', col);
      circle.setAttribute('stroke', col);
      circle.setAttribute('r', '6');
    } else {
      circle.setAttribute('fill', '#1a2a3a');
      circle.setAttribute('stroke', '#2a4a6a');
      circle.setAttribute('r', '5');
    }
  });
}

// ── Render train icons on track ────────────────────────────────────────────
function renderTrackTrains() {
  var layer = document.getElementById('trains-layer');
  var now = Date.now();
  var svgNS = 'http://www.w3.org/2000/svg';

  // Build set of trains to show: combine RTT data with TD positions
  var shown = {};
  trains.forEach(function(t){
    var ms = new Date(t.twy_actual || t.twy_sched).getTime();
    var eta = ms - now;
    if (eta < -120000 || eta > 20 * 60000) return; // outside ±2min past to 20min future

    var op = opStyle(t.op_code, t.passenger);
    var td = tdPositions[t.headcode];
    var x = null;

    if (td && td.age_s < 120) {
      x = td.x;
    } else if (eta > 0) {
      // Estimate position from schedule
      x = schedToX(eta, t.direction, t.track === 'Main');
    }
    if (x === null) return;

    shown[t.headcode] = {
      headcode: t.headcode, x: x, op: op,
      direction: t.direction, eta: eta,
      confirmed: t.confirmed, cancelled: t.cancelled,
      hasTd: !!(td && td.age_s < 120),
      isMain: t.track === 'Main',
    };
  });

  // Also show any TD-tracked trains not in RTT list
  Object.keys(tdPositions).forEach(function(hc){
    if (shown[hc]) return;
    var td = tdPositions[hc];
    if (td.age_s > 120) return;
    shown[hc] = {
      headcode: hc, x: td.x, op: {bg:'#1a2a3a',fg:'#8aa0b8',abbr:'???'},
      direction: null, eta: null, confirmed: true, hasTd: true,
    };
  });

  // Clear and redraw
  while (layer.firstChild) layer.removeChild(layer.firstChild);

  Object.values(shown).forEach(function(tr){
    var x = tr.x;
    var isDown = tr.direction === 'down' || (!tr.direction && tr.x > 279);
    var y = isDown ? 65 : 130;
    var isMain = tr.isMain;
    var w = 38, h = 18;
    var g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', 'translate(' + (x - w/2) + ',' + (y - h/2) + ')');

    var bg = document.createElementNS(svgNS, 'rect');
    bg.setAttribute('width', String(w));
    bg.setAttribute('height', String(h));
    bg.setAttribute('rx', '3');
    bg.setAttribute('fill', tr.cancelled ? '#2a1010' : tr.op.bg);
    bg.setAttribute('opacity', tr.hasTd ? '1' : '0.55');
    if (!tr.hasTd) bg.setAttribute('stroke-dasharray', '2,2');
    g.appendChild(bg);

    var txt = document.createElementNS(svgNS, 'text');
    txt.setAttribute('x', String(w/2));
    txt.setAttribute('y', String(h/2 + 4));
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('fill', tr.op.fg);
    txt.setAttribute('font-size', '9');
    txt.setAttribute('font-family', 'Arial');
    txt.setAttribute('font-weight', '700');
    txt.textContent = tr.headcode;
    g.appendChild(txt);

    // Dot below for Main line trains (so they don't overlap Relief)
    if (isMain) {
      g.setAttribute('transform', 'translate(' + (x - w/2) + ',' + (y + (isDown ? 20 : -20) - h/2) + ')');
    }

    layer.appendChild(g);

    // Direction arrow
    if (tr.direction) {
      var arr = document.createElementNS(svgNS, 'polygon');
      var ax = isDown ? x - w/2 - 8 : x + w/2 + 8;
      var ay = y;
      var pts = isDown
        ? (ax+6)+','+(ay-4)+' '+ax+','+ay+' '+(ax+6)+','+(ay+4)
        : (ax-6)+','+(ay-4)+' '+ax+','+ay+' '+(ax-6)+','+(ay+4);
      arr.setAttribute('points', pts);
      arr.setAttribute('fill', tr.op.bg);
      arr.setAttribute('opacity', '0.6');
      layer.appendChild(arr);
    }
  });
}

// ── Render next train panel ────────────────────────────────────────────────
function render() {
  var now = Date.now();

  // Sort upcoming trains
  var upcoming = trains.filter(function(t){
    var ms = new Date(t.twy_actual || t.twy_sched).getTime();
    return !t.cancelled && ms > now - 60000 && ms < now + 25 * 60000;
  }).sort(function(a,b){
    return new Date(a.twy_sched).getTime() - new Date(b.twy_sched).getTime();
  });

  // Most recent past (for recent strip)
  var recent = trains.filter(function(t){
    var ms = new Date(t.twy_actual || t.twy_sched).getTime();
    return ms < now - 60000 && ms > now - 15 * 60000;
  }).sort(function(a,b){
    return new Date(b.twy_actual || b.twy_sched).getTime() - new Date(a.twy_actual || a.twy_sched).getTime();
  });

  renderRecent(recent[0] || null);
  renderNext(upcoming[0] || null, now);
  renderAlso(upcoming.slice(1, 4), now);
  renderTrackTrains();
}

function renderRecent(t) {
  var el = document.getElementById('recent-content');
  if (!t) { el.innerHTML = '<span class="rc-info" style="color:#2a4a6a">—</span>'; return; }
  var op = opStyle(t.op_code, t.passenger);
  var ms = new Date(t.twy_actual || t.twy_sched).getTime();
  var agoS = Math.round((Date.now() - ms) / 1000);
  var agoStr = agoS < 60 ? agoS + 's ago' : Math.round(agoS/60) + ' min ago';
  var actTime = t.twy_actual ? ' · ✓ ' + fmtHHMM(t.twy_actual) : '';
  var lateStr = (t.late_min && t.late_min > 0) ? ' +' + t.late_min + ' min' : (t.late_min === 0 ? ' on time' : '');
  el.innerHTML =
    '<span class="rc-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</span>' +
    '<span class="rc-info">' + esc(t.headcode) + ' &nbsp; ' + esc(t.origin||'') + ' → ' + esc(t.dest||'') + esc(actTime) + esc(lateStr) + '</span>' +
    '<span class="rc-time">' + esc(agoStr) + '</span>';
}

function renderNext(t, now) {
  var empty = document.getElementById('next-empty');
  var hdr   = document.getElementById('next-header');
  var route = document.getElementById('next-route');
  var ftr   = document.getElementById('next-footer');

  if (!t) {
    empty.style.display = 'flex';
    hdr.style.display = route.style.display = ftr.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  hdr.style.display = route.style.display = ftr.style.display = '';

  var op = opStyle(t.op_code, t.passenger);
  var ms = new Date(t.twy_sched).getTime();
  var eta = ms - now;
  var isEst = !t.confirmed;
  var isStop = t.call_type === 'STOP';
  var late = t.late_min;
  var isBadLate = late && late >= 5;
  var td = tdPositions[t.headcode];
  var hasTd = td && td.age_s < 120;

  var callClass = isStop ? 'badge-stop' : (isEst ? 'badge-est' : 'badge-pass');
  var callText  = isStop ? 'Stops' : (isEst ? 'Passing (est.)' : 'Passes');

  // Track label
  var trackTxt = (t.track || '') + (isStop ? ' · Plat ' + (t.platform || '?') : '');

  // ETA display
  var etaDisp;
  if (t.twy_actual) {
    etaDisp = '✓ ' + fmtHHMM(t.twy_actual);
  } else {
    var etaMs = hasTd ? estimateEtaFromBerth(td, t) : eta;
    etaDisp = etaMs > 0 ? fmtCountdown(etaMs) : 'now';
  }

  hdr.innerHTML =
    '<div class="nh-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</div>' +
    '<div class="nh-main">' +
      '<div class="nh-hc">' + esc(t.headcode) + '</div>' +
      '<div class="nh-op">' + esc(t.op_name || op.abbr) + (hasTd ? ' · <span style="color:#2a6a3a">●live</span>' : '') + '</div>' +
    '</div>' +
    '<div class="nh-right">' +
      '<span class="nh-track-badge">' + esc(trackTxt) + '</span>' +
      '<span class="nh-call-badge ' + callClass + '">' + esc(callText) + '</span>' +
    '</div>';

  route.innerHTML =
    '<span class="nr-ep">' + esc(t.origin||'—') + '</span>' +
    '<span class="nr-arrow">→</span>' +
    '<span class="nr-house">★ Twyford</span>' +
    '<span class="nr-arrow">→</span>' +
    '<span class="nr-ep nr-ep-right">' + esc(t.dest||'—') + '</span>';

  var delayHtml = t.cancelled ? '<span class="stat-cancel">Cancelled</span>'
    : isEst ? '<span class="stat-est">est.</span>'
    : late === 0 ? '<span class="stat-ontime">On time</span>'
    : late > 0 ? '<span class="stat-late">+' + late + ' min</span>'
    : '—';

  var schedDisp = fmtHHMM(t.twy_sched);

  ftr.innerHTML =
    nfCard('ETA', '<span class="nf-countdown">' + esc(etaDisp) + '</span>', true) +
    nfCard('Sched', schedDisp, false) +
    nfCard('Delay', delayHtml, true) +
    nfCard('Vehicles', t.num_veh ? t.num_veh + (t.num_veh===1?' coach':' coaches') : '—', false);
}

function estimateEtaFromBerth(td, train) {
  // If we have a berth position, estimate time to house (berth 571)
  var houseB = 571;
  var currentB = parseInt(td.berth, 10);
  if (isNaN(currentB)) return null;
  var berths_away = Math.abs(currentB - houseB);
  var mps = (train.track === 'Main') ? 49 : 33;
  var berths_per_sec = mps / 100;
  var eta_s = berths_away / berths_per_sec;
  var elapsed = Date.now() / 1000 - td.ts;
  return Math.max(0, (eta_s - elapsed) * 1000);
}

function nfCard(label, valHtml, rawHtml) {
  return '<div class="nf-card">' +
    '<div class="nf-label">' + esc(label) + '</div>' +
    '<div class="nf-value">' + (rawHtml ? valHtml : esc(valHtml)) + '</div>' +
    '</div>';
}

function renderAlso(upcoming, now) {
  var el = document.getElementById('also-content');
  if (!upcoming.length) { el.innerHTML = ''; return; }
  var html = upcoming.map(function(t){
    var op = opStyle(t.op_code, t.passenger);
    var ms = new Date(t.twy_sched).getTime();
    var eta = ms - now;
    var etaStr = eta > 0 ? 'in ' + fmtCountdown(eta) : fmtHHMM(t.twy_sched);
    return '<div class="also-train">' +
      '<span class="also-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</span>' +
      '<span class="also-hc">' + esc(t.headcode) + '</span>' +
      '<span class="also-eta">' + esc(etaStr) + '</span>' +
      '</div>';
  }).join('');
  el.innerHTML = html;
}

// ── Clock ──────────────────────────────────────────────────────────────────
setInterval(renderClock, 1000);
renderClock();

// ── Poll schedule ──────────────────────────────────────────────────────────
fetchTrains();
fetchTdLive();
setInterval(fetchTrains,  15000);
setInterval(fetchTdLive,   5000);
setInterval(function(){ render(); }, 1000);   // re-render countdown every second
</script>
