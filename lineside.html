<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>Lineside — Twyford</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   LINESIDE TWYFORD — TD berth panel, Tracksy-style.
   Fixed 1280×720 canvas, scaled to fill the window.
   Every berth section Reading → Maidenhead drawn as a cell; a train's
   TD describer lights the cell it occupies.  Topological layout
   (cells evenly spaced per segment), west/Reading LEFT, north at TOP:
   rows top→bottom = Up Relief · Down Relief · Up Main · Down Main,
   Henley branch rising top-left, Crossrail stabling top-right.
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:       #05070b;
  --panel:    #090d14;
  --rule:     #141b28;
  --text:     #dbe4ee;
  --dim:      #7286a0;
  --faint:    #35455c;
  --amber:    #ffb000;
  --ontime:   #46c97e;
  --late:     #ff9f43;
  --cancel:   #ff5f56;
  --live:     #35d07f;
  --relief:   #3fb7c4;
  --main-ln:  #6f9fd8;
  --cond: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --body: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); overflow: hidden; }
body {
  width: 1280px; height: 720px; position: absolute;
  color: var(--text); font-family: var(--body); font-size: 14px;
}

/* ── Topbar ── */
#topbar {
  height: 42px; display: flex; align-items: center; gap: 18px;
  padding: 0 18px; border-bottom: 1px solid var(--rule);
}
#topbar .title {
  font-family: var(--cond); font-weight: 700; font-size: 24px;
  letter-spacing: .12em; color: var(--amber);
}
#topbar .subtitle {
  font-family: var(--cond); font-weight: 500; font-size: 15px;
  letter-spacing: .14em; color: var(--dim);
}
#topbar .fill { flex: 1; }
#feed-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--faint); transition: background .3s;
}
#feed-dot.on { background: var(--live); }
#feed-dot.stale { background: var(--cancel); }
#topdate {
  font-family: var(--cond); font-weight: 500; font-size: 16px;
  letter-spacing: .06em; color: var(--dim);
}
#clock {
  font-family: var(--mono); font-weight: 600; font-size: 26px;
  font-variant-numeric: tabular-nums;
}
#clock .sec { color: var(--faint); font-size: 17px; }

/* ── Berth panel ── */
#schematic { position: relative; height: 398px; border-bottom: 1px solid var(--rule);
  background:
    radial-gradient(1100px 440px at 50% -80px, rgba(63,183,196,0.05), transparent 70%),
    var(--panel);
}
#track-svg { position: absolute; inset: 0; }

/* ── Bottom: approaching + log/info ── */
#bottom { display: flex; height: 278px; }
#appr-pane { flex: 1.62; border-right: 1px solid var(--rule);
             padding: 6px 14px 4px; display: flex; flex-direction: column; min-width: 0; }
#info-pane { flex: 1; padding: 6px 14px 4px; display: flex; flex-direction: column; min-width: 0; }
.pane-hdr {
  font-family: var(--cond); font-weight: 600; font-size: 13px;
  letter-spacing: .16em; color: var(--faint); margin-bottom: 3px;
  display: flex; gap: 10px; align-items: baseline; flex: 0 0 auto;
}
.pane-hdr .cnt { font-family: var(--mono); font-size: 11px; }
#appr-body { flex: 1; overflow: hidden; }
#appr-empty {
  height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--cond); font-size: 17px; letter-spacing: .14em; color: var(--faint);
}
.ap-row {
  display: grid; grid-template-columns: 78px 40px 46px 1fr 140px 194px;
  gap: 8px; align-items: center; height: 40px;
  border-bottom: 1px solid rgba(20,27,40,.7);
}
.ap-eta {
  font-family: var(--cond); font-weight: 700; font-size: 27px; line-height: 1;
  text-align: right; font-variant-numeric: tabular-nums;
}
.ap-eta .u { font-size: 13px; color: var(--dim); font-weight: 600; }
.ap-eta.now { color: var(--amber); animation: pulse 1.2s infinite; }
.ap-eta.warn { color: var(--late); font-size: 17px; }
/* scheduled time reached but no live berth sighting — softer than NOW */
.ap-eta.due { color: #a8791f; font-size: 18px; }
@keyframes pulse { 50% { opacity: .5; } }
.ap-chip {
  font-family: var(--cond); font-weight: 700; font-size: 14px; letter-spacing: .06em;
  text-align: center; border: 1px solid; border-radius: 3px; padding: 1px 0;
}
.ap-chip.r { color: var(--relief); border-color: rgba(63,183,196,.5); }
.ap-chip.m { color: var(--main-ln); border-color: rgba(111,159,216,.5); }
.op-pill {
  font-family: var(--cond); font-weight: 600; font-size: 12px; text-align: center;
  letter-spacing: .04em; padding: 1px 0; border-radius: 3px;
}
.ap-name { min-width: 0; line-height: 1.15; }
.ap-dest {
  font-family: var(--cond); font-weight: 700; font-size: 19px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ap-sub {
  font-size: 11px; color: var(--dim); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ap-sched { font-family: var(--mono); font-size: 12px; color: var(--dim);
            font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; }
.ap-live  { font-family: var(--mono); font-size: 11.5px;
            font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; }
.ontime { color: var(--ontime); }
.late   { color: var(--late); }
.cancel { color: var(--cancel); }
.live   { color: var(--live); }
.est    { color: var(--faint); font-style: italic; }
.lbl    { color: var(--faint); }

#log-body { flex: 1; overflow: hidden; }
.log-row {
  font-family: var(--mono); font-size: 12px; line-height: 1.68;
  color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
}
.log-row .t { color: var(--text); }
.log-row .ln { font-size: 11px; }
.log-row .ln.r { color: var(--relief); }
.log-row .ln.m { color: var(--main-ln); }
.log-row .d { color: var(--dim); font-family: var(--body); font-size: 12px; }
.log-row .hcc { color: var(--faint); }
#log-empty { color: var(--faint); font-size: 12px; font-style: italic; }
#nrcc-body { flex: 0 0 auto; max-height: 44px; overflow: hidden; margin-top: 3px;
             font-size: 12px; line-height: 1.4; color: var(--late); }
#nrcc-body .none { color: var(--faint); font-style: italic; }
#stats-row {
  border-top: 1px solid var(--rule); margin-top: 4px; padding-top: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--faint);
  display: flex; gap: 16px; font-variant-numeric: tabular-nums; flex: 0 0 auto;
}
#stats-row b { color: var(--dim); font-weight: 500; }

/* ── Calibration overlay (temporary tool: press when a train is heard
   passing the house, to compare heard-time against predicted house_pass_ts) ── */
#cal-toggle {
  font-family: var(--cond); font-weight: 600; font-size: 13px; letter-spacing: .1em;
  color: var(--dim); border: 1px solid var(--faint); border-radius: 3px;
  padding: 2px 8px; cursor: pointer; user-select: none;
}
#cal-toggle.active { color: var(--amber); border-color: var(--amber); }
#calib-panel {
  display: none; position: absolute; top: 8px; right: 8px; width: 236px;
  background: rgba(9,13,20,.96); border: 1px solid var(--rule); border-radius: 6px;
  padding: 8px 9px; z-index: 20; box-shadow: 0 4px 18px rgba(0,0,0,.5);
}
#calib-panel.show { display: block; }
.cal-hdr { font-family: var(--cond); font-weight: 600; font-size: 12px;
  letter-spacing: .1em; color: var(--amber); margin-bottom: 2px; }
.cal-hint { display: block; font-family: var(--body); font-weight: 400;
  font-size: 10.5px; letter-spacing: 0; color: var(--dim); margin-bottom: 6px; }
.cal-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 6px; }
.cal-btn {
  font-family: var(--cond); font-weight: 700; font-size: 15px; letter-spacing: .04em;
  padding: 9px 0; border-radius: 4px; border: 1px solid; background: transparent;
  cursor: pointer; transition: background .15s, color .15s;
}
.cal-btn.r { color: var(--relief); border-color: rgba(63,183,196,.6); }
.cal-btn.m { color: var(--main-ln); border-color: rgba(111,159,216,.6); }
.cal-btn.flash { background: var(--live); color: #05070b; }
#cal-stats { font-family: var(--mono); font-size: 10px; color: var(--faint);
  display: flex; flex-wrap: wrap; gap: 5px 9px; margin-bottom: 5px; }
#cal-stats b { color: var(--dim); font-weight: 500; }
#cal-list { max-height: 128px; overflow: hidden; }
.cal-row { font-family: var(--mono); font-size: 10.5px; color: var(--dim);
  line-height: 1.55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-row .ln.r { color: var(--relief); } .cal-row .ln.m { color: var(--main-ln); }
.cal-row .off-p { color: var(--late); } .cal-row .off-n { color: var(--ontime); }
#cal-empty { font-size: 10.5px; color: var(--faint); font-style: italic; }
</style>
</head>
<body>

<div id="topbar">
  <span class="title">LINESIDE</span>
  <span class="subtitle">TWYFORD BERTH PANEL · READING ⇄ MAIDENHEAD · TD D1/D6</span>
  <span class="fill"></span>
  <span id="cal-toggle" onmousedown="toggleCalib()">⏱ CAL</span>
  <span id="topdate">—</span>
  <span id="clock">--:--<span class="sec">--</span></span>
  <span id="feed-dot"></span>
</div>

<div id="schematic">
  <svg id="track-svg" viewBox="0 0 1280 398" xmlns="http://www.w3.org/2000/svg">
    <g id="static-layer"></g>
    <g id="cells-layer"></g>
    <g id="trains-layer"></g>
  </svg>
  <div id="calib-panel">
    <div class="cal-hdr">CALIBRATE
      <span class="cal-hint">press the line you just heard pass the house</span>
    </div>
    <div class="cal-btns">
      <button class="cal-btn r" id="cal-btn-ur" onmousedown="logCalibration('ur')">UR</button>
      <button class="cal-btn r" id="cal-btn-dr" onmousedown="logCalibration('dr')">DR</button>
      <button class="cal-btn m" id="cal-btn-um" onmousedown="logCalibration('um')">UM</button>
      <button class="cal-btn m" id="cal-btn-dm" onmousedown="logCalibration('dm')">DM</button>
    </div>
    <div id="cal-stats"></div>
    <div id="cal-list"><div id="cal-empty">No presses logged yet</div></div>
  </div>
</div>

<div id="bottom">
  <div id="appr-pane">
    <div class="pane-hdr">NEXT PAST THE HOUSE <span class="cnt" id="appr-cnt"></span></div>
    <div id="appr-body"></div>
  </div>
  <div id="info-pane">
    <div class="pane-hdr">PASSING LOG <span class="cnt" id="log-cnt"></span></div>
    <div id="log-body"><div id="log-empty">Nothing logged yet this session</div></div>
    <div id="nrcc-body"><span class="none">No disruption reported</span></div>
    <div id="stats-row">
      <span>next hour <b id="st-hour">–</b></span>
      <span>freight <b id="st-frt">–</b></span>
      <span>live fixes <b id="st-live">–</b></span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═════════ Berth layout (derived from learned TD CA chains + SMART) ═════════
   Cell order is geographic WEST → EAST.  Berth IDs are unique across D1/D6 in
   this corridor (fringe berths 16xx are the same physical berth in both). */
const X_WEST = [118, 585];    // Reading throat → Twyford
const X_TWY  = [592, 656];    // Twyford platform column
const X_EAST = [666, 1078];   // house → Maidenhead approach
const X_MAID = [1086, 1150];  // Maidenhead platform column
const X_STUB = [1158, 1204];  // east of Maidenhead
const HOUSE_X = 676;

const LINES = [
  {key:'ur', y:152, main:false, dir:'up',   name:'UP RELIEF',  plat:'4',
   west:['1676','1668','1664','1660','1652','1648','1644','1642'],
   twy:['1630'],
   east:['1628','1624','1622','1620','1616','1612','1608','1604','0598','0594'],
   maid:['0574','0576'], stub:['0568']},
  {key:'dr', y:208, main:false, dir:'down', name:'DOWN RELIEF', plat:'3',
   west:['1687','1677','1669','1665','1661','1657'],
   twy:['1637'],
   east:['1635','1631','1627','1623','1611','1607','1603','0595'],
   maid:['0577'], stub:['0571']},
  {key:'um', y:264, main:true,  dir:'up',   name:'UP MAIN',     plat:'2',
   west:['1672','1666','1662','1658','1650','1646','1640'],
   twy:['1626'],
   east:['1618','1614','1610','1606','1602','0596','0592'],
   maid:['0570'], stub:['0566']},
  {key:'dm', y:320, main:true,  dir:'down', name:'DOWN MAIN',   plat:'1',
   west:['1675','1667','1663','1659'],
   twy:['1655'],
   east:['1633','1629','1625','1621','1609','1605','1601','0593'],
   maid:['0573'], stub:['0569']},
];

/* Henley branch (single line, top-left) + Crossrail stabling (top-right) */
const BRANCH_CELLS = [
  {berths:['1636'],               x:[246,308], y:64,  cap:'HENLEY-ON-THAMES', capAbove:true},
  {berths:['BYDN','BYUP'],        x:[330,412], y:64,  cap:'WARGRAVE · SHIPLAKE'},
  {berths:['1643','1632'],        x:[462,524], y:86},
  {berths:['A641','B641','R641'], x:[592,656], y:118, cap:'P5 BAY', capAbove:true},
];
const STAB_CELL = {berths:['3570','0578','0580','0582','0584','0586','0588','0590','6296'],
                   x:[956,1046], y:104, cap:'CROSSRAIL STABLING', capAbove:true};

/* Trains inside Reading station show as chips in the Reading box */
const READ_BERTHS = ['1684','1685','1686','1688','1694','1697','1698','1702','1706',
  '1708','1709','1711','1716','1718','1721','1724','1727','1730','1731','1732','1733',
  '1740','SSTE','A701','B701','C701','A703','B703','C703','A705','B705','C705','R701'];

/* Berths that straddle the house (UM crossing is at 1640/1626, per observation;
   the others are the first section east of the Twyford platforms) */
const HOUSE_BERTHS = {'1628':1, '1635':1, '1640':1, '1626':1, '1633':1};

const C_RELIEF = '#3fb7c4', C_MAIN = '#6f9fd8', C_AMBER = '#ffb000';
const SVGNS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}

/* Build berth → cell index.  Each cell: {x, y, w, key, berths} */
const CELLS = [];          // draw order
const BERTH_CELL = {};     // berth id → cell
const READ_SET = {};
for (const b of READ_BERTHS) READ_SET[b] = 1;

function addCell(cell) {
  CELLS.push(cell);
  for (const b of cell.berths) BERTH_CELL[b] = cell;
}

/* Signed distance from the house (mi; + = west/Reading side, − = east/London
   side) for every corridor berth — MUST match _BERTH_MI in transport-proxy.py.
   Cells are placed on ONE shared distance scale per segment so the Main and
   Relief lines line up by real position: near-house berths cluster at the house,
   far berths spread out, instead of each line spacing its berths evenly (which
   made the sparse Main line read as "off"). */
const BERTH_MI = {
  // Up Main (house crossing observed live at 1640→1626, so those straddle 0)
  '1672':5.1,'1666':4.4,'1662':3.6,'1658':3.0,'1650':2.1,'1646':1.2,'1640':0.25,
  '1626':-0.15,'1618':-0.6,'1614':-1.1,'1610':-1.8,'1606':-2.6,'1602':-3.5,
  '0596':-4.6,'0592':-5.6,'0570':-6.7,'0566':-7.5,
  // Up Relief
  '1676':5.1,'1668':3.34,'1664':3.0,'1660':2.6,'1652':2.0,'1648':1.5,'1644':1.0,
  '1642':0.5,'1630':0.1,'1628':-0.3,'1624':-0.8,'1622':-1.3,'1620':-1.8,
  '1616':-2.4,'1612':-3.1,'1608':-3.9,'1604':-4.8,'0598':-5.7,'0594':-6.3,
  '0574':-6.7,'0576':-6.7,'0568':-7.5,
  // Down Relief
  '1687':5.1,'1677':4.0,'1669':3.34,'1665':2.5,'1661':1.5,'1657':0.6,'1637':0.1,
  '1635':-0.3,'1631':-0.8,'1627':-1.4,'1623':-2.1,'1611':-3.0,'1607':-4.0,
  '1603':-5.2,'0595':-6.2,'0577':-6.7,'0571':-7.5,
  // Down Main
  '1675':5.1,'1667':3.5,'1663':2.0,'1659':0.6,'1655':0.1,'1633':-0.4,'1629':-1.0,
  '1625':-1.7,'1621':-2.5,'1609':-3.6,'1605':-4.6,'1601':-5.6,'0593':-6.3,
  '0573':-6.7,'0569':-7.5,
};
const WEST_MAX = 5.1, WEST_MIN = 0.05, EAST_MIN = -0.05, EAST_MAX = -6.7;
function segCenter(dist, xr, seg) {
  const t = seg === 'west' ? (WEST_MAX - dist) / (WEST_MAX - WEST_MIN)
                           : (EAST_MIN - dist) / (EAST_MIN - EAST_MAX);
  return xr[0] + Math.max(0, Math.min(1, t)) * (xr[1] - xr[0]);
}
function layoutSeg(berths, xr, y, key, seg) {
  if (berths.length === 1) {   // single-berth segment (e.g. the far stub) fills its slot
    addCell({berths:[berths[0]], x: xr[0], y, w: xr[1] - xr[0], key});
    return;
  }
  // centre each berth at its true distance; cell width follows the gap to its
  // neighbours (dense near the house, wide out toward Reading/Maidenhead).
  const n = berths.length;
  const cx = berths.map((b, i) => {
    const d = BERTH_MI[b];
    return d != null ? segCenter(d, xr, seg)
                     : xr[0] + (i + 0.5) / n * (xr[1] - xr[0]);
  });
  berths.forEach((b, i) => {
    // each cell fills the span between the midpoints to its neighbours (Voronoi):
    // cells tile without overlapping.  Edge cells run to the segment boundary.
    const lb = i > 0     ? (cx[i-1] + cx[i]) / 2 : xr[0];
    const rb = i < n - 1 ? (cx[i] + cx[i+1]) / 2 : xr[1];
    let w = rb - lb - 3, x = lb + 1.5;
    if (w < 24) { w = 24; x = (lb + rb) / 2 - 12; }   // keep headcodes legible
    w = Math.min(w, 58);
    addCell({berths:[b], x, y, w, key});
  });
}
for (const ln of LINES) {
  layoutSeg(ln.west, X_WEST, ln.y, ln.key, 'west');
  addCell({berths: ln.twy,  x: X_TWY[0],  y: ln.y, w: X_TWY[1]  - X_TWY[0],  key: ln.key, plat: true});
  layoutSeg(ln.east, X_EAST, ln.y, ln.key, 'east');
  addCell({berths: ln.maid, x: X_MAID[0], y: ln.y, w: X_MAID[1] - X_MAID[0], key: ln.key, plat: true});
  layoutSeg(ln.stub, X_STUB, ln.y, ln.key, 'east');
}
for (const c of BRANCH_CELLS)
  addCell({berths: c.berths, x: c.x[0], y: c.y, w: c.x[1] - c.x[0], key: 'br'});
addCell({berths: STAB_CELL.berths, x: STAB_CELL.x[0], y: STAB_CELL.y,
         w: STAB_CELL.x[1] - STAB_CELL.x[0], key: 'st'});

const LINE_OF = {};   // row key → line def
for (const ln of LINES) LINE_OF[ln.key] = ln;

/* ── Static panel ── */
function drawStatic() {
  const g = document.getElementById('static-layer');
  const capFont = {'font-family':"'Barlow Condensed',sans-serif", 'font-weight':600,
                   'letter-spacing':'.12em'};

  /* running lines */
  for (const ln of LINES) {
    const col = ln.main ? C_MAIN : C_RELIEF;
    g.appendChild(el('line', {x1:106, y1:ln.y, x2:X_STUB[1]+18, y2:ln.y,
      stroke: ln.main ? '#0e1c30' : '#0c2226', 'stroke-width':10}));
    g.appendChild(el('line', {x1:106, y1:ln.y, x2:X_STUB[1]+18, y2:ln.y,
      stroke: col, 'stroke-width':1.25, opacity:0.5}));
    g.appendChild(el('text', Object.assign({x:120, y:ln.y-15, fill:col, opacity:0.85,
      'font-size':11}, capFont),
      (ln.dir === 'up' ? '→ ' : '← ') + ln.name));
    /* direction arrowhead at the right end */
    const ax = X_STUB[1] + 26, half = ln.y;
    g.appendChild(el('polygon', {points: ln.dir === 'up'
        ? `${ax},${half} ${ax-7},${half-4} ${ax-7},${half+4}`
        : `${ax-7},${half} ${ax},${half-4} ${ax},${half+4}`,
      fill: col, opacity:0.55}));
  }

  /* Henley branch line */
  g.appendChild(el('line', {x1:240, y1:64, x2:470, y2:64,
    stroke:'#0c2226', 'stroke-width':10}));

/* ── Operator colours ── */
const OPS = {
  GW:{bg:'#0b9d6c',fg:'#04160f',ab:'GWR'},  XR:{bg:'#9d7fd8',fg:'#120a20',ab:'EL'},
  XC:{bg:'#e05570',fg:'#1d060b',ab:'XC'},   HX:{bg:'#8a5fd6',fg:'#12081f',ab:'HEX'},
  AW:{bg:'#c05fc0',fg:'#1a061a',ab:'TfW'},  GB:{bg:'#f0a835',fg:'#1d1403',ab:'GBRf'},
  DW:{bg:'#f04a4a',fg:'#1c0505',ab:'DB'},   FL:{bg:'#4fae62',fg:'#07130a',ab:'FLR'},
  ZZ:{bg:'#f07b3c',fg:'#1a0a02',ab:'COL'},  ZN:{bg:'#e8c34a',fg:'#171102',ab:'NR'},
};
const isFrtHc = hc => hc && '45678'.indexOf(hc[0]) >= 0;
function opInfo(t) {
  const o = t && OPS[t.op_code];
  if (o) return o;
  if (t && (t.passenger === false || isFrtHc(t.headcode)))
    return {bg:'#7d8f4a', fg:'#111504', ab:'FRT'};
  return {bg:'#3c4c60', fg:'#dfe7f0', ab:(t && t.op_code) || '?'};
}
function frtClass(hc) {
  const c = hc ? hc[0] : '';
  return c==='4' ? 'Intermodal' : c==='6' ? 'Heavy freight' : c==='7' ? 'Freight'
       : c==='8' ? 'Light engine' : c==='5' ? 'Empty stock' : 'Freight';
}
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function destAbbr(d) {
  if (!d) return '';
  if (DEST_ABBR[d]) return DEST_ABBR[d];

  return (w.slice(0, 3) || '').toUpperCase();

function shortPlace(name) {
  if (!name) return '';
  return String(name)
    .replace('London Paddington', 'Paddington')
    .replace(' Temple Meads', '').replace(' Foregate Street', '')

/* ── Time helpers ── */
function trainMs(t) {
  if (t.house_pass_ts) return t.house_pass_ts * 1000;
  if (!t.twy_sched) return 0;
  let ms = new Date(t.twy_sched).getTime();
  if (!t.twy_actual && t.late_min > 0) ms += t.late_min * 60000;
  return ms;
}
const fmtHM = v => {
  const d = new Date(v);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
};
const fmtHMS = v => {
  const d = new Date(v);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB',
    {hour:'2-digit', minute:'2-digit', second:'2-digit'});
};

let hcTrain = {};      // headcode → train (schedule/identity join)
let tdPos = {};        // headcode → live berth fix
let nrccMsgs = [];
let lastTd = 0;
const passLog = [];    // {ms, hc, op, dest, key} newest first
const logged = {};     // uid → true

let calibApplied = {}; // line key -> seconds currently being added to house_pass_ts server-side

function trackKey(t) {
  if (!t.direction || !t.track) return null;
  return (t.direction === 'up' ? 'u' : 'd') + (t.track === 'Main' ? 'm' : 'r');
}

/* ── Fetches ── */
function fetchTrains() {
  fetch('/api/trains').then(r => r.json()).then(d => {
    trains = d.trains || [];
    hcTrain = {};
    for (const t of trains) if (t.headcode) hcTrain[t.headcode] = t;
    harvestLog();
    render();
  }).catch(() => {});
}
function fetchTd() {
  fetch('/api/td-live').then(r => r.json()).then(d => {
    tdPos = {};
    for (const p of (d.positions || [])) {
      if ((p.area === 'D1' || p.area === 'D6') && p.age_s < 420) tdPos[p.headcode] = p;
    }
    lastTd = Date.now();
    const dot = document.getElementById('feed-dot');
    dot.classList.remove('stale');
    dot.classList.add('on');
    setTimeout(() => dot.classList.remove('on'), 450);
    renderPanel();
  }).catch(() => {});
}
function fetchNrcc() {
  fetch('/api/nrcc').then(r => r.json()).then(d => {
    nrccMsgs = d.messages || [];
    renderInfo();
  }).catch(() => {});
}

/* ── Passing log ── */
function harvestLog() {
  const now = Date.now();
  for (const t of trains) {
    const ms = trainMs(t);
    if (!ms || ms > now - 5000 || ms < now - 30 * 60000) continue;
    if (!(t.twy_actual || t.confirmed)) continue;
    if (logged[t.uid]) continue;   // cancelled-but-confirmed trains still passed
    logged[t.uid] = true;
    const frt = t.passenger === false || isFrtHc(t.headcode);
    passLog.unshift({
      ms, hc: t.headcode, op: opInfo(t),
      dest: frt ? (t.dest ? shortPlace(t.dest) : frtClass(t.headcode))
                : shortPlace(t.dest || '—'),
      key: trackKey(t) || '--',
    });
  }
  passLog.sort((a, b) => b.ms - a.ms);
  if (passLog.length > 12) passLog.length = 12;
}

/* ── Berth occupancy overlay ── */
function renderPanel() {
  const layer = document.getElementById('trains-layer');
  while (layer.firstChild) layer.removeChild(layer.firstChild);

  /* group occupants by cell */
  const byCell = new Map();
  const reading = [];
  let houseGlow = false;
  for (const hc in tdPos) {
    const p = tdPos[hc];
    if (READ_SET[p.berth]) { reading.push(p); continue; }
    const cell = BERTH_CELL[p.berth];
    if (!cell) continue;
    if (!byCell.has(cell)) byCell.set(cell, []);
    byCell.get(cell).push(p);
    if (HOUSE_BERTHS[p.berth] && p.age_s < 90) houseGlow = true;
  }

  byCell.forEach((occ, cell) => {
    occ.sort((a, b) => a.age_s - b.age_s);
    occ.slice(0, 3).forEach((p, i) => drawOccupant(layer, cell, p, i));
  });

  /* Reading box chips */
  reading.sort((a, b) => a.age_s - b.age_s);
  reading.slice(0, 10).forEach((p, i) => {
    const t = hcTrain[p.headcode];
    const op = opInfo(t || {headcode: p.headcode});
    const y = 148 + i * 18;
    const g = el('g', {});
    g.appendChild(el('rect', {x:40, y, width:60, height:15, rx:2.5,
      fill:op.bg, opacity: p.age_s > 180 ? 0.5 : 0.92}));
    g.appendChild(el('text', {x:70, y:y+11, 'text-anchor':'middle', fill:op.fg,
      'font-size':10, 'font-family':"'IBM Plex Mono',monospace",
      'font-weight':600}, p.headcode));
    layer.appendChild(g);
  });
  if (reading.length > 10) {
    layer.appendChild(el('text', {x:70, y:336, 'text-anchor':'middle', fill:'#7286a0',
      'font-size':9, 'font-family':"'IBM Plex Mono',monospace"},
      '+' + (reading.length - 10) + ' more'));
  }

  const star = document.getElementById('house-star');
  if (star) {
    star.setAttribute('fill', houseGlow ? '#ffe27a' : C_AMBER);
    star.setAttribute('font-size', houseGlow ? 23 : 16);
  }
}

function drawOccupant(layer, cell, p, stackIdx) {
  const t = hcTrain[p.headcode];
  const op = opInfo(t || {headcode: p.headcode});
  const dim = p.age_s > 180;
  const held = t && t.held;
  /* extra occupants stack downwards into the inter-row gap; branch cells
     stack upwards so they don't bleed into the Up Relief row below */
  const y = cell.y - 10 + stackIdx * (cell.key === 'br' ? -23 : 23);
  const g = el('g', {});
  const rect = el('rect', {x:cell.x, y, width:cell.w, height:20, rx:3,
    fill:op.bg, opacity: dim ? 0.55 : 1});
  if (held) {
    rect.setAttribute('stroke', C_AMBER);
    rect.setAttribute('stroke-width', 1.5);
    rect.setAttribute('stroke-dasharray', '4,3');
  }
  g.appendChild(rect);
  g.appendChild(el('text', {x:cell.x + cell.w/2, y:y+14, 'text-anchor':'middle',
    fill:op.fg, 'font-size': cell.w < 30 ? 10.5 : 12,
    'font-family':"'Barlow Condensed',sans-serif",
    'font-weight':700, 'letter-spacing': cell.w < 30 ? '0' : '.05em'}, p.headcode));
  /* direction chevron on the leading edge (up rows → east/right) — only on cells
     wide enough that the centred headcode won't collide with it (row direction is
     also shown by the line label and the arrowhead at the line end) */
  const ln = LINE_OF[cell.key];
  const dir = (ln && cell.w >= 42) ? ln.dir : null;
  if (dir) {
    const cx = dir === 'up' ? cell.x + cell.w - 6 : cell.x + 6;
    const pts = dir === 'up'
      ? `${cx-4},${y+5} ${cx+2},${y+10} ${cx-4},${y+15}`
      : `${cx+4},${y+5} ${cx-2},${y+10} ${cx+4},${y+15}`;
    g.appendChild(el('polygon', {points:pts, fill:op.fg, opacity:0.65}));
  }
  /* destination abbreviation under the cell (matched trains, first occupant;
     skipped on branch/stabling cells where it collides with station furniture) */
  if (t && stackIdx === 0 && cell.key !== 'br' && cell.key !== 'st') {
    const frt = t.passenger === false || isFrtHc(t.headcode);
    const ab = frt ? (t.dest ? destAbbr(t.dest) : 'FRT') : destAbbr(t.dest);
    if (ab) g.appendChild(el('text', {x:cell.x + cell.w/2, y:cell.y + 21,
      'text-anchor':'middle', fill:op.bg, 'font-size':8.5, opacity:0.85,
      'font-family':"'Barlow Condensed',sans-serif", 'font-weight':600,
      'letter-spacing':'.06em'}, (held ? '⏸ ' : '') + ab));
  }
  layer.appendChild(g);
}

/* ── Approaching list ── */
function render() {
  renderAppr();
  renderLog();

// "NOW" window is asymmetric around the predicted pass: starts a bit later on
// approach (train needs to be genuinely close) and holds a bit longer after
// passing (gives time to register it before it vanishes).
const NOW_LEAD_MS = 20000;   // flashing starts this long BEFORE predicted pass
const NOW_TAIL_MS = 30000;   // flashing continues this long AFTER predicted pass

function hasPassedHouse(t) {
  // Ground truth from the live berth fix's signed distance (+ west, - east):
  // an UP train (west→east) has passed once it reads negative; a DOWN train
  // (east→west) has passed once it reads positive. Immediate, no timer —
  // used to drop a train off the approaching list the moment TD shows it in
  // the section beyond the house, instead of waiting on a fixed countdown.
  const lp = tdPos[t.headcode];
  if (!lp || lp.age_s > 150 || lp.dist_mi == null) return false;
  return t.direction === 'up' ? lp.dist_mi < -0.05 : lp.dist_mi > 0.05;
}

function renderAppr() {
  const body = document.getElementById('appr-body');
  const now = Date.now();
  const list = [];
  for (const t of trains) {
    // A train whose Twyford call is cancelled but which is physically running
    // (a live TD berth fix) still passes the house — it just doesn't stop — so
    // it belongs on the panel (and shows on the berth map).  Only drop trains
    // cancelled with no physical presence (never ran / turned back short).
    const live = tdPos[t.headcode];
    if (t.cancelled && !(live && live.age_s < 300)) continue;
    if (hasPassedHouse(t)) continue;
    const ms = trainMs(t);
    // Matches the NOW window below so nothing lingers showing a stale/negative
    // countdown once it drops out of NOW.
    if (!ms || ms < now - NOW_TAIL_MS || ms > now + 45 * 60000) continue;
    list.push(t);
  }
  list.sort((a, b) => trainMs(a) - trainMs(b));
  document.getElementById('appr-cnt').textContent =
    list.length ? list.length + ' in next 45 min' : '';
  if (!list.length) {
    body.innerHTML = '<div id="appr-empty">NO TRAINS DUE</div>';
    return;
  }
  body.innerHTML = list.slice(0, 6).map(t => {
    const op   = opInfo(t);
    const ms   = trainMs(t);
    const diff = ms - now;
    const frt  = t.passenger === false || isFrtHc(t.headcode);
    const dest = frt ? (t.dest ? shortPlace(t.dest) : frtClass(t.headcode))
                     : shortPlace(t.dest || t.headcode);
    const key  = trackKey(t) || '--';
    const chip = (key[0] === 'u' ? '→' : '←') + (key[1] === 'm' ? 'M' : 'R');

    // "NOW" asserts the train is physically at the house — only claim it with
    // live evidence (a recent TD berth fix or a recorded actual pass).  A purely
    // scheduled train whose booked time has elapsed but that the berth feed
    // can't see (so it's absent from the map) is shown as a muted "DUE" instead
    // of pulsing NOW.
    const lp = tdPos[t.headcode];
    const sighted = (lp && lp.age_s < 150) || !!t.twy_actual;
    let eta, etaCls = '';
    if (t.at_station)        { eta = 'AT STN'; etaCls = 'warn'; }
    else if (t.held)         { eta = 'HELD';   etaCls = 'warn'; }
    else if (diff >= -NOW_TAIL_MS && diff <= NOW_LEAD_MS) {
      if (sighted)           { eta = 'NOW';    etaCls = 'now'; }
      else                   { eta = 'DUE';    etaCls = 'due'; }
    }
    else if (diff < 90000)   { eta = Math.round(diff/1000) + '<span class="u">s</span>'; }
    else                     { eta = Math.round(diff/60000) + '<span class="u">min</span>'; }

    /* sched + punctuality (twy_actual is a forecast until it's in the past) */
    const schedT = t.twy_sched ? fmtHM(t.twy_sched) : '—';
    const actMs  = t.twy_actual ? new Date(t.twy_actual).getTime() : 0;
    let stat;
    if (actMs && actMs <= now + 20000)
                              stat = '<span class="ontime">✓ ' + fmtHM(t.twy_actual) + '</span>';
    else if (actMs)           stat = (t.late_min >= 1)
                                ? '<span class="late">+' + t.late_min + '</span>'
                                : '<span class="ontime">on time</span>';
    else if (t.late_min == null) stat = '<span class="est">no rt</span>';
    else if (t.late_min >= 1) stat = '<span class="late">+' + t.late_min + '</span>';
    else                      stat = '<span class="ontime">on time</span>';
    /* Twyford call cancelled but the train is physically running through */
    if (t.cancelled) stat = '<span class="cancel">✗ not stopping</span>';

    /* live berth fix */
    const p = tdPos[t.headcode];
    let live;
    if (p && p.dist_mi != null && p.age_s < 150) {
      const mi = Math.abs(p.dist_mi);
      live = '<span class="live">● ' + esc(p.berth) + ' · ' +
        (mi < 0.35 ? 'at house' :
          (p.place ? esc(placeName(p.place)) + ' · ' : '') + mi.toFixed(1) + ' mi') +
        '</span>';
    } else if (p && p.age_s < 150) {
      live = '<span class="live">● ' + esc(p.berth) + '</span>';
    } else if (t.td_dist_mi != null && !t.twy_actual) {
      live = '<span class="live">● ' + Math.abs(t.td_dist_mi).toFixed(1) +
             ' mi</span> <span class="lbl">' + esc(t.td_berth || '') + '</span>';
    } else {
      live = '<span class="est">~ schedule</span>';
    }

    const sub = [t.op_name || op.ab,
                 t.origin ? 'from ' + shortPlace(t.origin) : '',
                 t.call_type === 'STOP' ? 'stops' + (t.platform ? ' p' + t.platform : '') : '',
                 t.source === 'td' ? 'TD-only' : '']
                .filter(Boolean).join(' · ');

    return '<div class="ap-row">' +
      '<div class="ap-eta ' + etaCls + '">' + eta + '</div>' +
      '<div class="ap-chip ' + (key[1] === 'm' ? 'm' : 'r') + '">' + chip + '</div>' +
      '<div class="op-pill" style="background:' + op.bg + ';color:' + op.fg + '">' +
        esc(t.headcode || '') + '</div>' +
      '<div class="ap-name"><div class="ap-dest">' + esc(dest) + '</div>' +
        '<div class="ap-sub">' + esc(sub) + '</div></div>' +
      '<div class="ap-sched">' + schedT + ' ' + stat + '</div>' +
      '<div class="ap-live">' + live + '</div>' +
    '</div>';
  }).join('');
}

/* ── Log + info panes ── */
function renderLog() {
  const body = document.getElementById('log-body');
  document.getElementById('log-cnt').textContent =
    passLog.length ? passLog.length + ' in last 30 min' : '';
  if (!passLog.length) {
    body.innerHTML = '<div id="log-empty">Nothing logged yet this session</div>';
    return;
  }
  body.innerHTML = passLog.slice(0, 8).map(e => {
    const lnCls = e.key[1] === 'm' ? 'm' : 'r';
    const lnTxt = (e.key[0] === 'u' ? '↑' : '↓') + (e.key[1] === 'm' ? 'M' : 'R');
    return '<div class="log-row"><span class="t">' + fmtHMS(e.ms) + '</span> ' +
      '<span class="ln ' + lnCls + '">' + lnTxt + '</span> ' +
      '<span class="hcc">' + esc(e.hc) + '</span> ' +
      '<span class="d">' + esc(e.dest) + '</span></div>';
  }).join('');
}

function renderInfo() {
  const nb = document.getElementById('nrcc-body');
  if (nrccMsgs.length) {
    nb.innerHTML = nrccMsgs.slice(0, 1).map(m =>
      '⚠ ' + esc(String(m).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 130))
    ).join('<br>');
  } else {
    nb.innerHTML = '<span class="none">No disruption reported</span>';
  }
  const now = Date.now();
  let hour = 0, frt = 0;
  for (const t of trains) {
    const ms = trainMs(t);
    if (ms > now && ms < now + 3600000 && !t.cancelled) {
      hour++;
      if (t.passenger === false || isFrtHc(t.headcode)) frt++;
    }
  }
  document.getElementById('st-hour').textContent = hour + ' trains';
  document.getElementById('st-frt').textContent = frt;
  let liveN = 0;
  for (const hc in tdPos) if (tdPos[hc].age_s < 150) liveN++;
  document.getElementById('st-live').textContent = liveN;
}

/* ── Calibration ("heard it pass" button) ──
   Records the exact moment a train is heard passing the house against the
   model's predicted house_pass_ts for whichever train on that line is
   currently nearest in time — building up a per-line/direction bias that
   can later correct the ETA formula. Server timestamps the press itself
   (avoids client clock skew against the server-computed prediction). */
function toggleCalib() {
  const panel = document.getElementById('calib-panel');
  const on = panel.classList.toggle('show');
  document.getElementById('cal-toggle').classList.toggle('active', on);
}

function physicalLineOf(hc) {
  // Ground truth from the live TD berth, not the schedule's booked Main/Relief —
  // a train can switch line at a junction near the house (e.g. Down Main to Down
  // Relief at Ruscombe Jn) after RTT/CIF already tagged it with its booked track.
  const p = tdPos[hc];
  if (!p) return null;
  const cell = BERTH_CELL[p.berth];
  const ln = cell && LINE_OF[cell.key];
  return ln ? ln.key : null;
}

function pickCalibCandidate(lineKey) {
  const now = Date.now();
  // 1) Prefer a live sighting that is PHYSICALLY on this line right now — this
  //    is what "I heard it pass on line X" actually means, and it's immune to
  //    a late line change the booked schedule doesn't know about.
  let bestLive = null, bestAge = Infinity;
  for (const hc in tdPos) {
    if (physicalLineOf(hc) !== lineKey) continue;
    const age = tdPos[hc].age_s;
    if (age < 90 && age < bestAge) { bestAge = age; bestLive = hc; }
  }
  if (bestLive) return hcTrain[bestLive] || {headcode: bestLive};
  // 2) No live fix on this line yet — fall back to the nearest-in-time train
  //    booked for this line by schedule.
  let best = null, bestDiff = Infinity;
  for (const t of trains) {
    if (trackKey(t) !== lineKey) continue;
    const ms = trainMs(t);
    if (!ms) continue;
    const diff = Math.abs(ms - now);
    if (diff < bestDiff && diff < 4 * 60000) { bestDiff = diff; best = t; }
  }
  return best;
}

function logCalibration(lineKey) {
  const t = pickCalibCandidate(lineKey);
  const lp = t ? tdPos[t.headcode] : null;
  const params = new URLSearchParams({line: lineKey});
  if (t) {
    params.set('headcode', t.headcode || '');
    params.set('dest', t.dest || '');
    if (t.house_pass_ts) params.set('predicted_ts', String(t.house_pass_ts));
    if (t.twy_sched) {
      const s = Date.parse(t.twy_sched);
      if (!isNaN(s)) params.set('sched_ts', String(Math.round(s / 1000)));
    }
    params.set('confirmed', t.confirmed ? '1' : '0');
  }
  if (lp) {
    params.set('sighted', lp.age_s < 150 ? '1' : '0');
    params.set('td_berth', lp.berth || '');
    if (lp.dist_mi != null) params.set('dist_mi', String(lp.dist_mi));
  }
  fetch('/api/calibrate?' + params.toString()).then(r => r.json()).then(d => {
    if (d && d.entry) {
      calibLog.unshift(d.entry);
      if (calibLog.length > 300) calibLog.length = 300;
      renderCalib();
      fetchCalibration();   // pick up the server's freshly recomputed applied offset
    }
  }).catch(() => {});
  const btn = document.getElementById('cal-btn-' + lineKey);
  if (btn) { btn.classList.add('flash'); setTimeout(() => btn.classList.remove('flash'), 350); }
}

function renderCalib() {
  const statsEl = document.getElementById('cal-stats');
  const byLine = {ur: [], dr: [], um: [], dm: []};
  for (const e of calibLog) if (e.offset_s != null && byLine[e.line]) byLine[e.line].push(e.offset_s);
  statsEl.innerHTML = ['ur', 'dr', 'um', 'dm'].map(ln => {
    const offs = byLine[ln];
    const n = offs.length;
    if (!n) return '<span>' + ln.toUpperCase() + ' –</span>';
    const applied = calibApplied[ln];
    if (applied != null) {
      // Matches the server's applied correction (median, once n >= calibMinN)
      return '<span>' + ln.toUpperCase() + ' <b>' + (applied >= 0 ? '+' : '') +
        applied.toFixed(1) + 's ✓</b> (n=' + n + ')</span>';
    }
    return '<span>' + ln.toUpperCase() + ' (n=' + n + ', need ' + calibMinN + ')</span>';
  }).join('');

  const list = document.getElementById('cal-list');
  if (!calibLog.length) {
    list.innerHTML = '<div id="cal-empty">No presses logged yet</div>';
    return;
  }
  list.innerHTML = calibLog.slice(0, 6).map(e => {
    const d = new Date(e.ts * 1000);
    const t = d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const lnCls = (e.line === 'um' || e.line === 'dm') ? 'm' : 'r';
    let off = '<span class="est">no prediction</span>';
    if (e.offset_s != null) {
      const cls = e.offset_s >= 0 ? 'off-p' : 'off-n';
      off = '<span class="' + cls + '">' + (e.offset_s >= 0 ? '+' : '') + e.offset_s.toFixed(1) + 's</span>';
    }
    return '<div class="cal-row"><span class="t">' + t + '</span> ' +
      '<span class="ln ' + lnCls + '">' + e.line.toUpperCase() + '</span> ' +
      esc(e.headcode || '—') + ' ' + off + '</div>';
  }).join('');
}

function fetchCalibration() {
  fetch('/api/calibration').then(r => r.json()).then(d => {
    calibLog = (d.entries || []).slice().reverse();
    calibApplied = d.applied || {};
    calibMinN = d.min_n || calibMinN;
    renderCalib();
  }).catch(() => {});
}

/* ── Clock / scale ── */
function tick() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) +
    '<span class="sec">' + String(d.getSeconds()).padStart(2, '0') + '</span>';
  document.getElementById('topdate').textContent =
    d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
  if (lastTd && Date.now() - lastTd > 30000)
    document.getElementById('feed-dot').classList.add('stale');
  renderAppr();
  renderInfo();
}
function scaleToWindow() {
  const sc = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
  document.body.style.transformOrigin = '0 0';
  document.body.style.transform = 'scale(' + sc + ')';
  document.body.style.left = Math.round((window.innerWidth  - 1280 * sc) / 2) + 'px';
  document.body.style.top  = Math.round((window.innerHeight - 720 * sc) / 2) + 'px';
}
window.addEventListener('resize', scaleToWindow);

/* ── Boot ── */
scaleToWindow();
drawStatic();
fetchTrains(); fetchTd(); fetchNrcc(); fetchCalibration();
setInterval(fetchTrains, 15000);
setInterval(fetchTd, 5000);
setInterval(fetchNrcc, 300000);
setInterval(tick, 1000);
tick();
</script>
</body>
