<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>Lineside — Twyford</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   LINESIDE TWYFORD — signalbox panel for the enthusiast, close-up.
   Fixed 1280×720 canvas, scaled to fill the window.
   Schematic x-axis is TRUE DISTANCE from the house (SMART/BPLAN chainage):
   + = west (Reading, LEFT) · − = east (Maidenhead/London, RIGHT).
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:       #05070b;
  --panel:    #090d14;
  --rule:     #141b28;
  --text:     #dbe4ee;
  --dim:      #7286a0;
  --faint:    #35455c;
  --amber:    #ffb000;
  --ontime:   #46c97e;
  --late:     #ff9f43;
  --cancel:   #ff5f56;
  --live:     #35d07f;
  --relief:   #3fb7c4;
  --main-ln:  #6f9fd8;
  --cond: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --body: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); overflow: hidden; }
body {
  width: 1280px; height: 720px; position: absolute;
  color: var(--text); font-family: var(--body); font-size: 14px;
}
@media (hover: hover) and (pointer: fine) { body.hidecursor * { cursor: none; } }

/* ── Topbar ── */
#topbar {
  height: 42px; display: flex; align-items: center; gap: 18px;
  padding: 0 18px; border-bottom: 1px solid var(--rule);
}
#topbar .title {
  font-family: var(--cond); font-weight: 700; font-size: 24px;
  letter-spacing: .12em; color: var(--amber);
}
#topbar .subtitle {
  font-family: var(--cond); font-weight: 500; font-size: 15px;
  letter-spacing: .14em; color: var(--dim);
}
#topbar .fill { flex: 1; }
#feed-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--faint); transition: background .3s;
}
#feed-dot.on { background: var(--live); }
#topdate {
  font-family: var(--cond); font-weight: 500; font-size: 16px;
  letter-spacing: .06em; color: var(--dim);
}
#clock {
  font-family: var(--mono); font-weight: 600; font-size: 26px;
  font-variant-numeric: tabular-nums;
}
#clock .sec { color: var(--faint); font-size: 17px; }

/* ── Schematic ── */
#schematic { position: relative; height: 296px; border-bottom: 1px solid var(--rule);
  background:
    radial-gradient(1100px 340px at 50% -80px, rgba(63,183,196,0.05), transparent 70%),
    var(--panel);
}
#track-svg { position: absolute; inset: 0; }

/* ── Line detail columns ── */
#cols { display: flex; height: 236px; border-bottom: 1px solid var(--rule); }
.col { flex: 1; min-width: 0; border-right: 1px solid var(--rule);
       display: flex; flex-direction: column; }
.col:last-child { border-right: none; }
.col-hdr {
  height: 26px; flex: 0 0 auto;
  display: flex; align-items: center; gap: 7px; padding: 0 12px;
  font-family: var(--cond); font-weight: 600; font-size: 15px;
  letter-spacing: .12em;
  border-bottom: 1px solid var(--rule);
  background: rgba(255,255,255,0.015);
}
.col[data-ln="relief"] .col-hdr { color: var(--relief); }
.col[data-ln="main"]   .col-hdr { color: var(--main-ln); }
.col-body { flex: 1; min-height: 0; padding: 8px 12px 6px; display: flex; flex-direction: column; }
.col-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-family: var(--cond); font-size: 16px; letter-spacing: .14em; color: var(--faint);
}
.nx-destrow { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.nx-dest {
  font-family: var(--cond); font-weight: 700; font-size: 30px; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
}
.nx-dest.cancelled { text-decoration: line-through; color: var(--cancel); }
.nx-eta {
  margin-left: auto; flex-shrink: 0;
  font-family: var(--cond); font-weight: 700; font-size: 30px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.nx-eta .u { font-size: 15px; color: var(--dim); font-weight: 600; }
.nx-eta.now { color: var(--amber); animation: pulse 1.2s infinite; }
.nx-eta.warn { color: var(--late); font-size: 21px; }
@keyframes pulse { 50% { opacity: .5; } }
.nx-oprow {
  display: flex; align-items: center; gap: 8px; margin-top: 5px;
  font-size: 13px; color: var(--dim);
  white-space: nowrap; overflow: hidden;
}
.op-pill {
  font-family: var(--cond); font-weight: 600; font-size: 12px;
  letter-spacing: .04em; padding: 1px 7px; border-radius: 3px; flex-shrink: 0;
}
.nx-hc { font-family: var(--mono); font-size: 12px; color: var(--dim); flex-shrink: 0; }
.nx-meta {
  margin-top: 6px; font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
  color: var(--dim); font-variant-numeric: tabular-nums;
}
.nx-meta .lbl { color: var(--faint); }
.nx-meta .ontime { color: var(--ontime); }
.nx-meta .late { color: var(--late); }
.nx-meta .cancel { color: var(--cancel); }
.nx-meta .live { color: var(--live); }
.nx-meta .est { color: var(--faint); font-style: italic; }
.nx-follow {
  margin-top: auto; border-top: 1px solid var(--rule); padding-top: 5px;
  font-size: 12px; color: var(--faint); line-height: 1.7;
  font-variant-numeric: tabular-nums;
  white-space: nowrap; overflow: hidden;
}
.nx-follow b { color: var(--dim); font-weight: 500; }
.nx-follow .fhc { font-family: var(--mono); font-size: 11px; }

/* ── Bottom strip: log + alerts ── */
#bottom { display: flex; height: 145px; }
#log-pane { flex: 1.6; border-right: 1px solid var(--rule); padding: 7px 14px 6px;
            display: flex; flex-direction: column; min-width: 0; }
#info-pane { flex: 1; padding: 7px 14px 6px; display: flex; flex-direction: column; min-width: 0; }
.pane-hdr {
  font-family: var(--cond); font-weight: 600; font-size: 13px;
  letter-spacing: .16em; color: var(--faint); margin-bottom: 4px;
  display: flex; gap: 10px; align-items: baseline;
}
.pane-hdr .cnt { font-family: var(--mono); font-size: 11px; }
#log-body { flex: 1; overflow: hidden; column-count: 2; column-gap: 22px; }
.log-row {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
}
.log-row .t { color: var(--text); }
.log-row .ln { font-size: 11px; }
.log-row .ln.r { color: var(--relief); }
.log-row .ln.m { color: var(--main-ln); }
.log-row .d { color: var(--dim); font-family: var(--body); font-size: 12.5px; }
.log-row .hcc { color: var(--faint); }
#log-empty { color: var(--faint); font-size: 12px; font-style: italic; }
#nrcc-body { flex: 1; overflow: hidden; font-size: 12.5px; line-height: 1.45; color: var(--late); }
#nrcc-body .none { color: var(--faint); font-style: italic; }
#stats-row {
  border-top: 1px solid var(--rule); margin-top: 4px; padding-top: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--faint);
  display: flex; gap: 16px; font-variant-numeric: tabular-nums;
}
#stats-row b { color: var(--dim); font-weight: 500; }
</style>
</head>
<body>

<div id="topbar">
  <span class="title">LINESIDE</span>
  <span class="subtitle">TWYFORD · READING ⇄ MAIDENHEAD · TD D1/D6</span>
  <span class="fill"></span>
  <span id="topdate">—</span>
  <span id="clock">--:--<span class="sec">--</span></span>
  <span id="feed-dot"></span>
</div>

<div id="schematic">
  <svg id="track-svg" viewBox="0 0 1280 296" xmlns="http://www.w3.org/2000/svg">
    <g id="static-layer"></g>
    <g id="trains-layer"></g>
  </svg>
</div>

<div id="cols">
  <div class="col" data-ln="relief" id="col-ur">
    <div class="col-hdr">→ UP RELIEF</div>
    <div class="col-body" id="body-ur"></div>
  </div>
  <div class="col" data-ln="relief" id="col-dr">
    <div class="col-hdr">← DOWN RELIEF</div>
    <div class="col-body" id="body-dr"></div>
  </div>
  <div class="col" data-ln="main" id="col-um">
    <div class="col-hdr">→ UP MAIN</div>
    <div class="col-body" id="body-um"></div>
  </div>
  <div class="col" data-ln="main" id="col-dm">
    <div class="col-hdr">← DOWN MAIN</div>
    <div class="col-body" id="body-dm"></div>
  </div>
</div>

<div id="bottom">
  <div id="log-pane">
    <div class="pane-hdr">PASSING LOG <span class="cnt" id="log-cnt"></span></div>
    <div id="log-body"><div id="log-empty">Nothing logged yet this session</div></div>
  </div>
  <div id="info-pane">
    <div class="pane-hdr">NETWORK MESSAGES</div>
    <div id="nrcc-body"><span class="none">No disruption reported</span></div>
    <div id="stats-row">
      <span>next hour <b id="st-hour">–</b></span>
      <span>freight <b id="st-frt">–</b></span>
      <span>live fixes <b id="st-live">–</b></span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Geometry: true distance → x ─────────────────────────────────────
   dist_mi: + = west of house (Reading side, LEFT); − = east (RIGHT).   */
const PX_PER_MI = 99, HOUSE_X = 565;
const X_MIN = 16, X_MAX = 1264;
const xOf = mi => HOUSE_X - mi * PX_PER_MI;
const inView = mi => { const x = xOf(mi); return x > X_MIN - 8 && x < X_MAX + 8; };

/* Track rows, physical order from the house (top = nearest) */
const ROWS = [
  {key:'ur', y:104, name:'UP RELIEF',   cls:'relief', dir:'up',   main:false},
  {key:'dr', y:148, name:'DOWN RELIEF', cls:'relief', dir:'down', main:false},
  {key:'um', y:192, name:'UP MAIN',     cls:'main',   dir:'up',   main:true},
  {key:'dm', y:236, name:'DOWN MAIN',   cls:'main',   dir:'down', main:true},
];
const ROW_Y = {ur:104, dr:148, um:192, dm:236};

/* Landmarks (mi from house) — SMART anchors + waypoints for flavour */
const LANDMARKS = [
  {mi:  5.1, big: true,  label: 'READING'},
  {mi:  2.6, big: false, label: 'Sonning Cutting'},
  {mi:  0.25,big: false, label: ''},          // Twyford station box drawn separately
  {mi: -1.4, big: false, label: 'Ruscombe'},
  {mi: -3.7, big: false, label: 'Waltham'},
  {mi: -6.7, big: true,  label: 'MAIDENHEAD'},
];

const C_RELIEF = '#3fb7c4', C_MAIN = '#6f9fd8', C_AMBER = '#ffb000';
const SVGNS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}

function drawStatic() {
  const g = document.getElementById('static-layer');
  // landmark verticals + labels
  for (const lm of LANDMARKS) {
    if (!lm.label) continue;
    const x = xOf(lm.mi);
    g.appendChild(el('line', {x1:x, y1:34, x2:x, y2:262,
      stroke:'#101a28', 'stroke-width':1, 'stroke-dasharray':'2,6'}));
    g.appendChild(el('text', {x:x, y:24, fill: lm.big ? '#41597a' : '#2a3c54',
      'font-size': lm.big ? 13 : 11, 'text-anchor':'middle',
      'font-family':"'Barlow Condensed',sans-serif", 'font-weight':600,
      'letter-spacing':'.12em'}, lm.label));
  }
  // mile ticks every mile
  for (let mi = -6; mi <= 5; mi++) {
    const x = xOf(mi);
    g.appendChild(el('line', {x1:x, y1:256, x2:x, y2:262, stroke:'#22334a', 'stroke-width':1}));
    g.appendChild(el('text', {x:x, y:276, fill:'#2a3c54', 'font-size':10,
      'text-anchor':'middle', 'font-family':"'IBM Plex Mono',monospace"},
      mi === 0 ? '★' : Math.abs(mi) + 'mi'));
  }
  // tracks
  for (const r of ROWS) {
    const col = r.main ? C_MAIN : C_RELIEF;
    g.appendChild(el('line', {x1:X_MIN, y1:r.y, x2:X_MAX, y2:r.y,
      stroke: r.main ? '#0e1c30' : '#0c2226', 'stroke-width':9}));
    g.appendChild(el('line', {x1:X_MIN, y1:r.y, x2:X_MAX, y2:r.y,
      stroke: col, 'stroke-width':1.5, opacity:0.65}));
    // labels each side, above the blip envelope so trains never hide them
    for (const anchor of [[X_MIN+4,'start'],[X_MAX-4,'end']]) {
      g.appendChild(el('text', {x:anchor[0], y:r.y-16, fill:col, opacity:0.8,
        'font-size':10, 'text-anchor':anchor[1],
        'font-family':"'Barlow Condensed',sans-serif", 'font-weight':600,
        'letter-spacing':'.1em'},
        (r.dir === 'up' ? '→ ' : '← ') + r.name));
    }
  }
  // direction hints
  g.appendChild(el('text', {x:X_MIN+4, y:292, fill:'#41597a', 'font-size':11,
    'font-family':"'Barlow Condensed',sans-serif", 'letter-spacing':'.1em'},
    '← WEST · READING'));
  g.appendChild(el('text', {x:X_MAX-4, y:292, fill:'#41597a', 'font-size':11,
    'text-anchor':'end', 'font-family':"'Barlow Condensed',sans-serif",
    'letter-spacing':'.1em'}, 'LONDON · EAST →'));
  // Twyford station: platforms on the relief pair
  const sx1 = xOf(0.45), sx2 = xOf(0.08);
  g.appendChild(el('rect', {x:sx1, y:86, width:sx2-sx1, height:80, rx:3,
    fill:'#0b1520', 'fill-opacity':0.45, stroke:'#274058', 'stroke-width':1}));
  g.appendChild(el('rect', {x:sx1+2, y:92,  width:sx2-sx1-4, height:6, fill:'#16283a'}));
  g.appendChild(el('rect', {x:sx1+2, y:156, width:sx2-sx1-4, height:6, fill:'#16283a'}));
  g.appendChild(el('text', {x:(sx1+sx2)/2, y:81, fill:'#41597a', 'font-size':12,
    'text-anchor':'middle', 'font-family':"'Barlow Condensed',sans-serif",
    'font-weight':600, 'letter-spacing':'.14em'}, 'TWYFORD'));
  // the house
  g.appendChild(el('line', {x1:HOUSE_X, y1:40, x2:HOUSE_X, y2:258,
    stroke:C_AMBER, 'stroke-width':1, 'stroke-dasharray':'4,4', opacity:0.55}));
  const star = el('text', {x:HOUSE_X, y:46, fill:C_AMBER, 'font-size':17,
    'text-anchor':'middle', id:'house-star'}, '★');
  g.appendChild(star);
  g.appendChild(el('text', {x:HOUSE_X+6, y:274, fill:'#8a6a10', 'font-size':10,
    'font-family':"'Barlow Condensed',sans-serif", 'letter-spacing':'.12em'},
    'HOUSE'));
}

/* ── Operator colours ── */
const OPS = {
  GW:{bg:'#0b9d6c',fg:'#04160f',ab:'GWR'},  XR:{bg:'#9d7fd8',fg:'#120a20',ab:'EL'},
  XC:{bg:'#e05570',fg:'#1d060b',ab:'XC'},   HX:{bg:'#8a5fd6',fg:'#12081f',ab:'HEX'},
  AW:{bg:'#c05fc0',fg:'#1a061a',ab:'TfW'},  GB:{bg:'#f0a835',fg:'#1d1403',ab:'GBRf'},
  DW:{bg:'#f04a4a',fg:'#1c0505',ab:'DB'},   FL:{bg:'#4fae62',fg:'#07130a',ab:'FLR'},
  ZZ:{bg:'#f07b3c',fg:'#1a0a02',ab:'COL'},  ZN:{bg:'#e8c34a',fg:'#171102',ab:'NR'},
};
const isFrtHc = hc => hc && '45678'.indexOf(hc[0]) >= 0;
function opInfo(t) {
  const o = OPS[t.op_code];
  if (o) return o;
  if (t.passenger === false || isFrtHc(t.headcode))
    return {bg:'#7d8f4a', fg:'#111504', ab:'FRT'};
  return {bg:'#3c4c60', fg:'#dfe7f0', ab:(t.op_code || '?')};
}
function frtClass(hc) {
  const c = hc ? hc[0] : '';
  return c==='4' ? 'Intermodal' : c==='6' ? 'Heavy freight' : c==='7' ? 'Freight'
       : c==='8' ? 'Light engine' : c==='5' ? 'Empty stock' : 'Freight';
}
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ── Names ── */
const DEST_ABBR = {
  'London Paddington':'PAD','Paddington':'PAD','London Paddington (EL)':'PAD',
  'Bristol Temple Meads':'BRI','Bristol Parkway':'BPW','Cardiff Central':'CDF',
  'Swansea':'SWA','Carmarthen':'CMN','Exeter St Davids':'EXD','Penzance':'PNZ',
  'Plymouth':'PLY','Paignton':'PGN','Oxford':'OXF','Hereford':'HFD',
  'Great Malvern':'GMV','Worcester Shrub Hill':'WOS','Worcester Foregate Street':'WOF',
  'Weston-super-Mare':'WSM','Taunton':'TAU','Newbury':'NBY','Bedwyn':'BDW',
  'Cheltenham Spa':'CNM','Gloucester':'GCR','Didcot Parkway':'DID','Swindon':'SWI',
  'Reading':'RDG','Maidenhead':'MAI','Slough':'SLO','Ealing Broadway':'EAL',
  'Abbey Wood':'ABW','Shenfield':'SHF','Heathrow Terminal 4':'HT4',
  'Heathrow Terminal 5':'HT5','Heathrow Terminals 1-3':'HT1','Twyford':'TWY',
};
function destAbbr(d) {
  if (!d) return '???';
  if (DEST_ABBR[d]) return DEST_ABBR[d];
  const w = d.split(/[\s\-]/)[0].replace(/[^A-Za-z]/g, '');
  return (w.slice(0, 3) || '???').toUpperCase();
}
function shortPlace(name) {
  if (!name) return '';
  return String(name)
    .replace('London Paddington', 'Paddington')
    .replace(' Temple Meads', '').replace(' Foregate Street', '')
    .replace(' Shrub Hill', '').replace(' St Davids', '')
    .replace('Heathrow Terminals 1-3', 'Heathrow T2/3')
    .replace('Heathrow Terminal ', 'Heathrow T')
    .replace('-super-Mare', '');
}
const STANME = {
  MAIDENHED:'Maidenhead', MDNHDMIDS:'Maidenhead', 'MDNHD CS':'Maidenhead',
  TWYFORD:'Twyford', READNG:'Reading', READGWEST:'Reading W', READWTORJ:'Reading',
  RDGSPURJN:'Reading', TILEHURST:'Tilehurst', PANGBORNE:'Pangbourne',
  'GORING&ST':'Goring', SLOUGH:'Slough', BURNHAM:'Burnham', TAPLOW:'Taplow',
  LANGLEY:'Langley', IVER:'Iver', 'W DRAYTON':'W Drayton', 'HAYES&HAR':'Hayes',
  SOUTHALL:'Southall', HANWELL:'Hanwell', 'KEN BG LP':'Kennet Br',
  'KEN BG JN':'Kennet Br', HENLEYONT:'Henley',
};
const placeName = s => !s ? '' : (STANME[s] ||
  (s.indexOf('LHR') === 0 ? 'Heathrow' : s.charAt(0) + s.slice(1).toLowerCase()));

/* ── Time helpers ── */
function trainMs(t) {
  if (t.house_pass_ts) return t.house_pass_ts * 1000;
  if (!t.twy_sched) return 0;
  let ms = new Date(t.twy_sched).getTime();
  if (!t.twy_actual && t.late_min > 0) ms += t.late_min * 60000;
  return ms;
}
const fmtHM = v => {
  const d = new Date(v);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
};
const fmtHMS = v => {
  const d = new Date(v);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB',
    {hour:'2-digit', minute:'2-digit', second:'2-digit'});
};

/* ── State ── */
let trains = [];
let tdPos = {};        // headcode → live berth fix
let nrccMsgs = [];
let lastTd = 0;
const passLog = [];    // {ms, hc, op, dest, key} newest first
const logged = {};     // uid → true

function trackKey(t) {
  if (!t.direction || !t.track) return null;
  return (t.direction === 'up' ? 'u' : 'd') + (t.track === 'Main' ? 'm' : 'r');
}

/* ── Fetches ── */
function fetchTrains() {
  fetch('/api/trains').then(r => r.json()).then(d => {
    trains = d.trains || [];
    harvestLog();
    render();
  }).catch(() => {});
}
function fetchTd() {
  fetch('/api/td-live').then(r => r.json()).then(d => {
    tdPos = {};
    for (const p of (d.positions || [])) {
      if (p.age_s < 300) tdPos[p.headcode] = p;
    }
    lastTd = Date.now();
    const dot = document.getElementById('feed-dot');
    dot.classList.add('on');
    setTimeout(() => dot.classList.remove('on'), 450);
    renderSchematic();
  }).catch(() => {});
}
function fetchNrcc() {
  fetch('/api/nrcc').then(r => r.json()).then(d => {
    nrccMsgs = d.messages || [];
    renderInfo();
  }).catch(() => {});
}

/* ── Passing log ── */
function harvestLog() {
  const now = Date.now();
  for (const t of trains) {
    const ms = trainMs(t);
    if (!ms || ms > now - 5000 || ms < now - 30 * 60000) continue;
    if (!(t.twy_actual || t.confirmed)) continue;
    if (t.cancelled || logged[t.uid]) continue;
    logged[t.uid] = true;
    const frt = t.passenger === false || isFrtHc(t.headcode);
    passLog.unshift({
      ms, hc: t.headcode, op: opInfo(t),
      dest: frt ? (t.dest ? shortPlace(t.dest) : frtClass(t.headcode))
                : shortPlace(t.dest || '—'),
      key: trackKey(t) || '--',
    });
  }
  passLog.sort((a, b) => b.ms - a.ms);
  if (passLog.length > 12) passLog.length = 12;
}

/* ── Schematic trains ── */
function renderSchematic() {
  const layer = document.getElementById('trains-layer');
  while (layer.firstChild) layer.removeChild(layer.firstChild);
  const now = Date.now();
  const shown = {};
  const W = 62, H = 26;

  // schedule-known trains (live berth pos preferred, else time-estimated pos)
  for (const t of trains) {
    if (t.cancelled) continue;
    const key = trackKey(t);
    if (!key) continue;
    let mi = null, live = false;
    const p = tdPos[t.headcode];
    if (p && p.dist_mi != null && p.age_s < 150) { mi = p.dist_mi; live = true; }
    else {
      const ms = trainMs(t);
      if (!ms) continue;
      const dtH = (ms - now) / 3600000;
      if (dtH < -0.08 || dtH > 0.5) continue;
      const mph = t.track === 'Main'
        ? (t.passenger === false ? 50 : 90) : (t.passenger === false ? 35 : 60);
      mi = (t.direction === 'up' ? 1 : -1) * dtH * mph;
    }
    if (mi == null || !inView(mi)) continue;
    const frt = t.passenger === false || isFrtHc(t.headcode);
    shown[t.headcode] = {
      hc: t.headcode, mi, live, key,
      held: !!t.held, stn: !!t.at_station,
      op: opInfo(t),
      lab: frt ? (t.dest ? destAbbr(t.dest) : 'FRT') : destAbbr(t.dest),
    };
  }
  // TD-only blips (position ground truth, direction from berth step)
  for (const hc in tdPos) {
    if (shown[hc]) continue;
    const p = tdPos[hc];
    if (p.dist_mi == null || p.age_s > 150 || !inView(p.dist_mi)) continue;
    let dir = null;
    const fb = parseInt(p.from_berth, 10), tb = parseInt(p.berth, 10);
    if (!isNaN(fb) && !isNaN(tb) && fb !== tb) dir = tb > fb ? 'down' : 'up';
    if (p.line !== 'Main' && p.line !== 'Relief') continue;
    if (!dir) continue;
    const frt = isFrtHc(hc);
    shown[hc] = {
      hc, mi: p.dist_mi, live: true,
      key: (dir === 'up' ? 'u' : 'd') + (p.line === 'Main' ? 'm' : 'r'),
      held: false, stn: false,
      op: frt ? {bg:'#7d8f4a', fg:'#111504', ab:'FRT'} : {bg:'#3c4c60', fg:'#dfe7f0', ab:'?'},
      lab: hc,
    };
  }

  // declutter per row
  const byRow = {};
  for (const hc in shown) {
    const tr = shown[hc];
    tr.x = Math.max(X_MIN + W/2, Math.min(X_MAX - W/2, xOf(tr.mi)));
    (byRow[tr.key] = byRow[tr.key] || []).push(tr);
  }
  let houseGlow = false;
  for (const key in byRow) {
    const grp = byRow[key].sort((a, b) => a.x - b.x);
    for (let i = 1; i < grp.length; i++) {
      if (grp[i].x - grp[i-1].x < W + 4) grp[i].x = grp[i-1].x + W + 4;
    }
    for (const tr of grp) {
      if (Math.abs(tr.mi) < 0.35 && tr.live) houseGlow = true;
      drawBlip(layer, tr, W, H);
    }
  }
  const star = document.getElementById('house-star');
  if (star) {
    star.setAttribute('fill', houseGlow ? '#ffe27a' : C_AMBER);
    star.setAttribute('font-size', houseGlow ? 24 : 17);
  }
}

function drawBlip(layer, tr, W, H) {
  const y = ROW_Y[tr.key];
  if (!y) return;
  const g = el('g', {transform: `translate(${tr.x - W/2},${y - H/2})`});
  const rect = el('rect', {width:W, height:H, rx:4,
    fill: tr.held || tr.stn ? '#3a2a10' : tr.op.bg,
    opacity: tr.live ? 1 : 0.42});
  if (tr.live) { rect.setAttribute('stroke', '#35d07f'); rect.setAttribute('stroke-width', 1); }
  else { rect.setAttribute('stroke', tr.op.bg); rect.setAttribute('stroke-dasharray', '3,2'); }
  g.appendChild(rect);
  g.appendChild(el('text', {x:W/2, y:11.5, 'text-anchor':'middle',
    fill: tr.held || tr.stn ? '#ffb864' : tr.op.fg, 'font-size':10.5,
    'font-family':"'Barlow Condensed',sans-serif", 'font-weight':700,
    'letter-spacing':'.05em'}, (tr.held ? '⏸' : '') + tr.lab));
  g.appendChild(el('text', {x:W/2, y:22, 'text-anchor':'middle',
    fill: tr.held || tr.stn ? '#c89a58' : tr.op.fg, 'font-size':8.5, opacity:0.8,
    'font-family':"'IBM Plex Mono',monospace"}, tr.hc));
  // travel-direction arrow: up → east (right), down → west (left)
  const right = tr.key[0] === 'u';
  const ax = right ? W + 9 : -9, half = H / 2;
  g.appendChild(el('polygon', {
    points: right
      ? `${ax-6},${half-4} ${ax},${half} ${ax-6},${half+4}`
      : `${ax+6},${half-4} ${ax},${half} ${ax+6},${half+4}`,
    fill: tr.op.bg, opacity: tr.live ? 0.9 : 0.45}));
  layer.appendChild(g);
}

/* ── Detail columns ── */
function render() {
  const now = Date.now();
  const byKey = {ur:[], dr:[], um:[], dm:[]};
  for (const t of trains) {
    const k = trackKey(t);
    if (!k || !byKey[k]) continue;
    const ms = trainMs(t);
    if (!ms || ms < now - 60000 || ms > now + 65 * 60000) continue;
    if (t.cancelled) continue;
    byKey[k].push(t);
  }
  for (const k of ['ur','dr','um','dm']) {
    byKey[k].sort((a, b) => trainMs(a) - trainMs(b));
    renderCol(k, byKey[k], now);
  }
  renderLog();
  renderInfo();
  renderSchematic();
}

function renderCol(key, list, now) {
  const body = document.getElementById('body-' + key);
  const t = list[0];
  if (!t) { body.innerHTML = '<div class="col-empty">NO TRAIN DUE</div>'; return; }

  const op  = opInfo(t);
  const ms  = trainMs(t);
  const diff = ms - now;
  const frt = t.passenger === false || isFrtHc(t.headcode);
  const dest = frt ? (t.dest ? shortPlace(t.dest) : frtClass(t.headcode))
                   : shortPlace(t.dest || t.headcode);

  let etaHtml, etaCls = '';
  if (t.at_station)      { etaHtml = 'AT STN'; etaCls = 'warn'; }
  else if (t.held)       { etaHtml = 'HELD';   etaCls = 'warn'; }
  else if (diff <= 25000){ etaHtml = 'NOW';    etaCls = 'now'; }
  else if (diff < 90000) { etaHtml = Math.round(diff/1000) + '<span class="u">s</span>'; }
  else                   { etaHtml = Math.round(diff/60000) + '<span class="u">min</span>'; }

  /* meta lines */
  const rows = [];
  const schedT = t.twy_sched ? fmtHM(t.twy_sched) : '—';
  /* twy_actual carries RTT's realtime FORECAST until the pass happens —
     only show the confirmation tick once the time is actually in the past */
  let stat;
  const actMs = t.twy_actual ? new Date(t.twy_actual).getTime() : 0;
  if (actMs && actMs <= now + 20000)
                            stat = '<span class="ontime">✓ ' + fmtHM(t.twy_actual) + '</span>';
  else if (actMs)           stat = (t.late_min >= 1)
                              ? '<span class="late">exp ' + fmtHM(actMs) + ' (+' + t.late_min + ')</span>'
                              : '<span class="ontime">exp ' + fmtHM(actMs) + ' · on time</span>';
  else if (t.late_min == null) stat = '<span class="est">no rt data</span>';
  else if (t.late_min >= 1) stat = '<span class="late">exp ' + fmtHM(ms) + ' (+' + t.late_min + ')</span>';
  else                      stat = '<span class="ontime">on time</span>';
  rows.push('<span class="lbl">sched</span> ' + schedT + '  ' + stat);

  const bits2 = [];
  bits2.push(t.call_type === 'STOP'
    ? 'stops' + (t.platform ? ' · plat ' + esc(t.platform) : '') : 'passes');
  if (t.num_veh) bits2.push(t.num_veh + ' veh');
  if (frt) bits2.push(frtClass(t.headcode).toLowerCase());
  if (t.source === 'td') bits2.push('TD-only');
  rows.push('<span class="lbl">' + bits2.join(' · ') + '</span>');

  const p = tdPos[t.headcode];
  if (p && p.dist_mi != null && p.age_s < 150) {
    const mi = Math.abs(p.dist_mi);
    rows.push('<span class="live">● ' +
      (mi < 0.35 ? 'passing the house' :
        (p.place ? esc(placeName(p.place)) + ' · ' : '') + mi.toFixed(1) + ' mi') +
      '</span> <span class="lbl">berth ' + esc(p.berth) + '</span>');
  } else if (t.td_dist_mi != null && !t.twy_actual) {
    rows.push('<span class="live">● ' + Math.abs(t.td_dist_mi).toFixed(1) +
      ' mi</span> <span class="lbl">berth ' + esc(t.td_berth || '?') + '</span>');
  } else {
    rows.push('<span class="est">no live fix</span>');
  }

  /* follow-on */
  const fol = list.slice(1, 3).map(n => {
    const nd = (n.passenger === false || isFrtHc(n.headcode))
      ? (n.dest ? destAbbr(n.dest) : 'FRT') : destAbbr(n.dest);
    return '<b>' + fmtHM(trainMs(n)) + '</b> ' + esc(nd) +
           ' <span class="fhc">' + esc(n.headcode) + '</span>';
  }).join(' &nbsp;·&nbsp; ');

  body.innerHTML =
    '<div class="nx-destrow">' +
      '<span class="nx-dest' + (t.cancelled ? ' cancelled' : '') + '">' + esc(dest) + '</span>' +
      '<span class="nx-eta ' + etaCls + '">' + etaHtml + '</span>' +
    '</div>' +
    '<div class="nx-oprow">' +
      '<span class="op-pill" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.ab) + '</span>' +
      '<span class="nx-hc">' + esc(t.headcode) + '</span>' +
      (t.origin ? '<span>from ' + esc(shortPlace(t.origin)) + '</span>' : '') +
    '</div>' +
    '<div class="nx-meta">' + rows.join('<br>') + '</div>' +
    (fol ? '<div class="nx-follow">then ' + fol + '</div>' : '');
}

/* ── Log + info panes ── */
function renderLog() {
  const body = document.getElementById('log-body');
  document.getElementById('log-cnt').textContent =
    passLog.length ? passLog.length + ' in last 30 min' : '';
  if (!passLog.length) {
    body.innerHTML = '<div id="log-empty">Nothing logged yet this session</div>';
    return;
  }
  body.innerHTML = passLog.slice(0, 10).map(e => {
    const lnCls = e.key[1] === 'm' ? 'm' : 'r';
    const lnTxt = (e.key[0] === 'u' ? '↑' : '↓') + (e.key[1] === 'm' ? 'M' : 'R');
    return '<div class="log-row"><span class="t">' + fmtHMS(e.ms) + '</span> ' +
      '<span class="ln ' + lnCls + '">' + lnTxt + '</span> ' +
      '<span class="hcc">' + esc(e.hc) + '</span> ' +
      '<span class="d">' + esc(e.dest) + '</span></div>';
  }).join('');
}

function renderInfo() {
  const nb = document.getElementById('nrcc-body');
  if (nrccMsgs.length) {
    nb.innerHTML = nrccMsgs.slice(0, 2).map(m =>
      '⚠ ' + esc(String(m).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 150))
    ).join('<br>');
  } else {
    nb.innerHTML = '<span class="none">No disruption reported</span>';
  }
  const now = Date.now();
  let hour = 0, frt = 0;
  for (const t of trains) {
    const ms = trainMs(t);
    if (ms > now && ms < now + 3600000 && !t.cancelled) {
      hour++;
      if (t.passenger === false || isFrtHc(t.headcode)) frt++;
    }
  }
  document.getElementById('st-hour').textContent = hour + ' trains';
  document.getElementById('st-frt').textContent = frt;
  let liveN = 0;
  for (const hc in tdPos) if (tdPos[hc].age_s < 150) liveN++;
  document.getElementById('st-live').textContent = liveN;
}

/* ── Clock / scale ── */
function tick() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) +
    '<span class="sec">' + String(d.getSeconds()).padStart(2, '0') + '</span>';
  document.getElementById('topdate').textContent =
    d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
  render();
}
function scaleToWindow() {
  const sc = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
  document.body.style.transformOrigin = '0 0';
  document.body.style.transform = 'scale(' + sc + ')';
  document.body.style.left = Math.round((window.innerWidth  - 1280 * sc) / 2) + 'px';
  document.body.style.top  = Math.round((window.innerHeight - 720 * sc) / 2) + 'px';
}
window.addEventListener('resize', scaleToWindow);

/* ── Boot ── */
document.body.classList.add('hidecursor');
scaleToWindow();
drawStatic();
fetchTrains(); fetchTd(); fetchNrcc();
setInterval(fetchTrains, 15000);
setInterval(fetchTd, 5000);
setInterval(fetchNrcc, 300000);
setInterval(tick, 1000);
tick();
</script>
</body>
</html>
