<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>Lineside — Twyford</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:800px;height:480px;overflow:hidden;background:#07090f;color:#c0d0e0;
  font-family:'Segoe UI',Arial,sans-serif;font-size:14px;position:absolute}

/* ── Topbar ── */
#topbar{display:flex;align-items:center;justify-content:space-between;
  height:36px;padding:0 12px;background:#0d1219;border-bottom:1px solid #1a2535;
  font-size:12px;color:#4a7a9a}
#topbar .title{font-size:14px;font-weight:600;color:#7aaccc;letter-spacing:.05em}
#topbar .clock{font-size:16px;font-weight:300;color:#c0d0e0;font-variant-numeric:tabular-nums}
#refresh-dot{width:6px;height:6px;border-radius:50%;background:#1e4a2a;margin-left:6px;
  transition:background .3s}
#refresh-dot.active{background:#3ddc84}

/* ── Alert / recent strip ── */
#alert-strip{height:28px;display:flex;align-items:center;padding:0 10px;gap:8px;
  background:#0a0e17;border-bottom:1px solid #141c2a;overflow:hidden;transition:background .4s}
#alert-strip.nrcc-mode{background:#1a0e00}
.alert-label{font-size:9px;color:#3a5a7a;text-transform:uppercase;letter-spacing:.08em;
  white-space:nowrap;flex-shrink:0}
#alert-content{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden;min-width:0}
.rc-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:2px;
  font-size:10px;font-weight:700;letter-spacing:.03em;flex-shrink:0}
.rc-info{font-size:11px;color:#7090a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-time{font-size:10px;color:#3a5a7a;white-space:nowrap;flex-shrink:0}
.nrcc-text{font-size:10px;color:#e0a040;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Track SVG container ── */
#track-wrap{position:relative;width:800px;height:210px;background:#07090f}
#track-svg{position:absolute;top:0;left:0;width:800px;height:210px}

/* ── Next train panel (four-column) ── */
#next-wrap{height:165px;display:flex;flex-direction:column;border-top:1px solid #141c2a}
#next-cols{display:flex;flex:1;min-height:0}
.next-col{flex:1;display:flex;flex-direction:column;border-right:1px solid #141c2a}
.next-col:last-child{border-right:none}
.nc-hdr{height:22px;display:flex;align-items:center;padding:0 10px;
  background:#080f17;border-bottom:1px solid #0e1a28;font-size:10px;
  color:#3a6a8a;letter-spacing:.06em;font-weight:600;flex-shrink:0}
.nc-empty{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#1e3a5a;letter-spacing:.05em}
.nc-card{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:0 10px;gap:3px;min-height:0}
.nc-dest-row{display:flex;align-items:center;gap:6px}
.nc-badge{width:28px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:2px;font-size:9px;font-weight:700;flex-shrink:0}
.nc-dest{font-size:13px;font-weight:600;color:#d8eaf8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nc-conf{font-size:9px;flex-shrink:0}
.nc-conf.live{color:#2a9a50}
.nc-conf.trust{color:#7a9a50}
.nc-conf.est{color:#8a7020}
.nc-conf.held{color:#c05000}
.nc-sub{display:flex;align-items:center;gap:8px;font-size:10px;color:#4a7090}
.nc-hc{font-family:'Courier New',monospace;color:#6090b0}
.nc-track{color:#3a6080}
.nc-pos{color:#3a6a8a;font-size:9px}
.nc-eta-row{display:flex;align-items:baseline;gap:4px}
.nc-eta{font-size:20px;font-weight:300;color:#e8f4ff;font-variant-numeric:tabular-nums}
.nc-eta-unit{font-size:10px;color:#5a8090}

/* ── Approach bar ── */
#approach-bar{height:41px;display:flex;align-items:center;padding:0 8px;gap:6px;
  background:#07090f;border-top:1px solid #141c2a}
.appr-end{font-size:9px;color:#3a5a7a;white-space:nowrap;flex-shrink:0}
#appr-track{flex:1;position:relative;height:26px;background:#0a1020;
  border-radius:3px;border:1px solid #1a2a3a}
.appr-house-mark{position:absolute;top:0;bottom:0;width:1px;background:rgba(90,130,50,.6)}
.appr-twy-lbl{position:absolute;font-size:7px;color:#6a8a30;top:50%;
  transform:translateY(-50%) translateX(3px);pointer-events:none;white-space:nowrap}
.appr-dot{position:absolute;height:20px;min-width:30px;padding:0 3px;border-radius:3px;
  top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;overflow:hidden}
.appr-dot-dir{font-size:7px;color:rgba(255,255,255,.65);line-height:1}
.appr-dot-dest{font-size:8px;font-weight:700;color:#fff;line-height:1}
</style>
</head>
<body>

<div id="topbar">
  <span class="title">Lineside · Twyford</span>
  <span style="display:flex;align-items:center">
    <span id="clock" class="clock">--:--</span>
    <span id="refresh-dot"></span>
  </span>
</div>

<div id="alert-strip">
  <span class="alert-label" id="alert-label">Last</span>
  <div id="alert-content"><span class="rc-info" style="color:#1e3a5a">—</span></div>
</div>

<div id="track-wrap">
  <!--
    SVG layout (800×210). X-axis = real distance from the house (Twyford), from
    SMART/CA berth positions: + = WEST (toward Reading, LEFT), − = EAST (toward
    Maidenhead/London, RIGHT). House centred at x=400, ~51 px/mile.
      distToX(mi) = 400 − mi*51.1   →  Reading(+5.1)≈x139, Maidenhead(−6.7)≈x742.
    Track rows (nearest-to-house first, top→bottom):
      Up Relief y=38, Down Relief y=78, Up Main y=118, Down Main y=158.
    UP trains travel west→east (left→right, arrow →); DOWN east→west (arrow ←).
  -->
  <svg id="track-svg" viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-sm"><feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- Edge direction hints -->
    <text x="5" y="13" fill="#2a4a70" font-size="9" font-family="Arial">← West</text>
    <text x="795" y="13" fill="#2a4a70" font-size="9" font-family="Arial" text-anchor="end">East →</text>

    <!-- Landmark guide lines + labels (positioned by distToX) -->
    <g id="landmarks"></g>

    <!-- Track labels: left (anchor start) and right (anchor end) -->
    <text x="5" y="41"  fill="#1f6070" font-size="8" font-family="Arial">↑ RELIEF</text>
    <text x="5" y="81"  fill="#1f6070" font-size="8" font-family="Arial">↓ RELIEF</text>
    <text x="5" y="121" fill="#2a5888" font-size="8" font-family="Arial">↑ MAIN</text>
    <text x="5" y="161" fill="#2a5888" font-size="8" font-family="Arial">↓ MAIN</text>
    <text x="795" y="41"  fill="#1f6070" font-size="8" font-family="Arial" text-anchor="end">↑R</text>
    <text x="795" y="81"  fill="#1f6070" font-size="8" font-family="Arial" text-anchor="end">↓R</text>
    <text x="795" y="121" fill="#2a5888" font-size="8" font-family="Arial" text-anchor="end">↑M</text>
    <text x="795" y="161" fill="#2a5888" font-size="8" font-family="Arial" text-anchor="end">↓M</text>

    <!-- Up Relief track (y=38) -->
    <line x1="55" y1="38" x2="745" y2="38" stroke="#122a30" stroke-width="7"/>
    <line x1="55" y1="38" x2="745" y2="38" stroke="#1f6070" stroke-width="2"/>
    <!-- Down Relief track (y=78) -->
    <line x1="55" y1="78" x2="745" y2="78" stroke="#122a30" stroke-width="7"/>
    <line x1="55" y1="78" x2="745" y2="78" stroke="#1f6070" stroke-width="2"/>
    <!-- Up Main track (y=118) -->
    <line x1="55" y1="118" x2="745" y2="118" stroke="#152a45" stroke-width="7"/>
    <line x1="55" y1="118" x2="745" y2="118" stroke="#2a5888" stroke-width="2"/>
    <!-- Down Main track (y=158) -->
    <line x1="55" y1="158" x2="745" y2="158" stroke="#152a45" stroke-width="7"/>
    <line x1="55" y1="158" x2="745" y2="158" stroke="#2a5888" stroke-width="2"/>

    <!-- Twyford station box (Relief tracks), centred on the house at x=400 -->
    <rect id="stn-box" x="360" y="24" width="80" height="68" rx="3"
          fill="#0a1822" stroke="#2a4a6a" stroke-width="1"/>
    <text x="400" y="57" fill="#3a7090" font-size="8" font-family="Arial"
          text-anchor="middle" letter-spacing=".06em">TWYFORD</text>
    <rect x="360" y="34" width="80" height="8" rx="1" fill="#0e2030" stroke="none"/>
    <rect x="360" y="74" width="80" height="8" rx="1" fill="#0e2030" stroke="none"/>

    <!-- House / crossover marker at x=400 (the house is ~200 m east of the station) -->
    <line x1="400" y1="20" x2="400" y2="182"
          stroke="#4a6030" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="400" y="196" fill="#ffd080" font-size="20" text-anchor="middle"
          filter="url(#glow)" id="house-star">★</text>
    <text x="400" y="208" fill="#7a6020" font-size="7" font-family="Arial"
          text-anchor="middle">HOUSE</text>

    <!-- Train icons layer (dynamic) -->
    <g id="trains-layer"></g>
  </svg>
</div>

<div id="next-wrap">
  <div id="next-cols">
    <div class="next-col" id="col-ur">
      <div class="nc-hdr">↑ Up Relief</div>
      <div class="nc-empty" id="nur-empty">No trains</div>
      <div class="nc-card" id="nur-card" style="display:none"></div>
    </div>
    <div class="next-col" id="col-dr">
      <div class="nc-hdr">↓ Dn Relief</div>
      <div class="nc-empty" id="ndr-empty">No trains</div>
      <div class="nc-card" id="ndr-card" style="display:none"></div>
    </div>
    <div class="next-col" id="col-um">
      <div class="nc-hdr">↑ Up Main</div>
      <div class="nc-empty" id="num-empty">No trains</div>
      <div class="nc-card" id="num-card" style="display:none"></div>
    </div>
    <div class="next-col" id="col-dm">
      <div class="nc-hdr">↓ Dn Main</div>
      <div class="nc-empty" id="ndm-empty">No trains</div>
      <div class="nc-card" id="ndm-card" style="display:none"></div>
    </div>
  </div>
</div>

<div id="approach-bar">
  <span class="appr-end">RDG</span>
  <div id="appr-track">
    <div class="appr-house-mark" id="appr-house" style="left:43.5%"></div>
    <span class="appr-twy-lbl" id="appr-twy" style="left:43.5%">TWY★</span>
    <div id="appr-dots"></div>
  </div>
  <span class="appr-end">MDH</span>
</div>

<script>
'use strict';

// ── Operator colour table ──────────────────────────────────────────────────
var OPS = {
  GW:{bg:'#007a4d',fg:'#fff',abbr:'GWR'},
  XR:{bg:'#7156a5',fg:'#fff',abbr:'ELN'},
  XC:{bg:'#a61530',fg:'#fff',abbr:'XC '},
  HX:{bg:'#532885',fg:'#fff',abbr:'HEX'},
  GB:{bg:'#1e3050',fg:'#c8d8f0',abbr:'GBRf'},
  DW:{bg:'#db0a17',fg:'#fff',abbr:'DB '},
  FL:{bg:'#1a6b2a',fg:'#fff',abbr:'FL '},
  ZZ:{bg:'#f05a24',fg:'#fff',abbr:'COL'},
  ZN:{bg:'#d4ac0d',fg:'#111',abbr:'NR '},
  AW:{bg:'#8c3b8c',fg:'#fff',abbr:'TfW'},
  EM:{bg:'#334f8d',fg:'#fff',abbr:'EMR'},
};
function opStyle(code, isPassenger) {
  if (isPassenger === false) return OPS[code] || {bg:'#2d3d1a',fg:'#a0c060',abbr:'FRT'};
  return OPS[code] || {bg:'#2a3a4a',fg:'#c0d0e0',abbr:(code||'??').slice(0,3)};
}

// ── Destination abbreviation ───────────────────────────────────────────────
var DEST_ABBR = {
  'London Paddington':'PAD','Paddington':'PAD','London Paddington (EL)':'PAD',
  'Bristol Temple Meads':'BRI','Bristol Parkway':'BPW',
  'Cardiff Central':'CDF','Swansea':'SWA','Carmarthen':'CAR',
  'Exeter St Davids':'EXD','Penzance':'PNZ','Plymouth':'PLY',
  'Paignton':'PGN','Torquay':'TRQ',
  'Oxford':'OXF','Banbury':'BAN','Hereford':'HFD',
  'Great Malvern':'GMV','Worcester Shrub Hill':'WOS','Worcester Foregate Street':'WOF',
  'Weston-super-Mare':'WSM','Taunton':'TAU','Newbury':'NBY',
  'Cheltenham Spa':'CNM','Gloucester':'GCR',
  'Didcot Parkway':'DID','Swindon':'SWI',
  'Reading':'RDG','Maidenhead':'MAI','Slough':'SLO',
  'Ealing Broadway':'EAL','Abbey Wood':'ABW','Shenfield':'SHF',
  'Heathrow Terminal 4':'HT4','Heathrow Terminal 5':'HT5','Heathrow Terminals 1-3':'HT1',
  'Minehead':'MHD','Weymouth':'WEY',
};
function destAbbr(dest) {
  if (!dest) return '???';
  if (DEST_ABBR[dest]) return DEST_ABBR[dest];
  var parts = dest.split(/[\s\-]/);
  var first = parts[0].replace(/[^A-Za-z]/g,'');
  return (first.slice(0,3)).toUpperCase() || '???';
}
function placeName(s) {
  if (!s) return '';
  var m = {'MAIDENHED':'Maidenhead','MDNHDMIDS':'Maidenhead','MDNHD CS':'Maidenhead',
    'TWYFORD':'Twyford','READNG':'Reading','READGWEST':'Reading','READWTORJ':'Reading',
    'RDGSPURJN':'Reading','TILEHURST':'Tilehurst','PANGBORNE':'Pangbourne','GORING&ST':'Goring',
    'CHOLSEY':'Cholsey','SLOUGH':'Slough','BURNHAM':'Burnham','TAPLOW':'Taplow','LANGLEY':'Langley',
    'IVER':'Iver','W DRAYTON':'W.Drayton','HAYES&HAR':'Hayes','SOUTHALL':'Southall','HANWELL':'Hanwell',
    'AIRPORTJN':'Airport Jn','STOCKLYJN':'Stockley','HENLEYONT':'Henley'};
  if (m[s]) return m[s];
  if (s.indexOf('LHR') === 0) return 'Heathrow';
  return s.charAt(0) + s.slice(1).toLowerCase();
}

// ── Distance (signed miles from house) → SVG x ──────────────────────────────
// dist_mi: + = WEST (Reading, LEFT) ; − = EAST (Maidenhead/London, RIGHT).
var HOUSE_X = 400, PX_PER_MI = 51.1;
var X_MIN = 55, X_MAX = 745;
function distToX(mi) { return HOUSE_X - mi * PX_PER_MI; }
function inView(mi) { var x = distToX(mi); return x >= X_MIN - 4 && x <= X_MAX + 4; }

// Estimated signed distance (miles) from a schedule ETA when no live berth fix.
function schedDist(msUntilHouse, direction, isMain, isFreight) {
  var mph = isMain ? (isFreight ? 50 : 90) : (isFreight ? 35 : 60);
  var miles = (msUntilHouse / 3600000) * mph;       // future +, past −
  return (direction === 'up' ? 1 : -1) * miles;     // up west(+), down east(−)
}

// Track y-centre. nearest-to-house order: Up Relief, Down Relief, Up Main, Down Main.
function trackY(direction, isMain) {
  if (direction === 'up') return isMain ? 118 : 38;
  return isMain ? 158 : 78;
}

// ── Track classification ────────────────────────────────────────────────────
function isMainTrack(t) { return t.track === 'Main'; }  // backend authoritative

// ── Landmarks (drawn once, positioned by distToX) ──────────────────────────
var LANDMARKS = [
  {mi: 5.1,  label: 'Reading'},
  {mi: 0.0,  label: ''},          // house — drawn separately
  {mi: -6.7, label: 'Maidenhead'},
];
function drawLandmarks() {
  var g = document.getElementById('landmarks');
  if (!g) return;
  var svgNS = 'http://www.w3.org/2000/svg', html = '';
  LANDMARKS.forEach(function(lm){
    if (!lm.label) return;
    var x = Math.round(distToX(lm.mi));
    if (x < X_MIN || x > X_MAX) return;
    var line = document.createElementNS(svgNS,'line');
    line.setAttribute('x1',x); line.setAttribute('y1','22');
    line.setAttribute('x2',x); line.setAttribute('y2','178');
    line.setAttribute('stroke','#10202c'); line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','2,5');
    g.appendChild(line);
    var txt = document.createElementNS(svgNS,'text');
    txt.setAttribute('x',x); txt.setAttribute('y','14');
    txt.setAttribute('fill','#2a4a70'); txt.setAttribute('font-size','8');
    txt.setAttribute('font-family','Arial'); txt.setAttribute('text-anchor','middle');
    txt.textContent = lm.label;
    g.appendChild(txt);
  });
}

// ── Time helpers ───────────────────────────────────────────────────────────
function fmtHHMM(iso) {
  var d = new Date(iso);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtEta(ms) {
  if (ms <= 0) return {val:'now', unit:''};
  var s = Math.round(ms / 1000);
  if (s < 60) return {val:s, unit:'s'};
  var m = Math.floor(s / 60), r = s % 60;
  if (r === 0) return {val:m, unit:'m'};
  return {val: m + 'm ' + r, unit:'s'};
}

// ── State ──────────────────────────────────────────────────────────────────
var trains = [];
var tdPositions = {};  // headcode → {berth, dist_mi, line, place, ts, age_s, from_berth}
var nrccMsgs = [];
var alertMode = 'recent';
var alertCycle = 0;

// ── Scale to fill window ───────────────────────────────────────────────────
function scaleToWindow() {
  var sx = window.innerWidth / 800, sy = window.innerHeight / 480;
  var sc = Math.min(sx, sy);
  document.body.style.transformOrigin = '0 0';
  document.body.style.transform = 'scale(' + sc + ')';
  document.body.style.left = Math.round((window.innerWidth  - 800 * sc) / 2) + 'px';
  document.body.style.top  = Math.round((window.innerHeight - 480 * sc) / 2) + 'px';
}
window.addEventListener('resize', scaleToWindow);
scaleToWindow();

// ── Fetches ──────────────────────────────────────────────────────────────
function fetchTrains() {
  fetch('/api/trains')
    .then(function(r){ return r.json(); })
    .then(function(d){ trains = d.trains || []; render(); })
    .catch(function(){});
}
function fetchTdLive() {
  fetch('/api/td-live')
    .then(function(r){ return r.json(); })
    .then(function(d){
      tdPositions = {};
      (d.positions || []).forEach(function(p){
        if (p.age_s < 600) {
          tdPositions[p.headcode] = {berth:p.berth, dist_mi:p.dist_mi, line:p.line,
            place:p.place, ts:p.ts, age_s:p.age_s, from_berth:p.from_berth};
        }
      });
      renderHouseStar();
      renderTrackTrains();
      renderApproachBar(Date.now());
      flashDot();
    })
    .catch(function(){});
}
function fetchNrcc() {
  fetch('/api/nrcc')
    .then(function(r){ return r.json(); })
    .then(function(d){ nrccMsgs = d.messages || []; renderAlert(); })
    .catch(function(){});
}

// ── Clock ──────────────────────────────────────────────────────────────────
function renderClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  alertCycle++;
  if (nrccMsgs.length > 0 && alertCycle % 16 === 0) {
    alertMode = alertMode === 'recent' ? 'nrcc' : 'recent';
    renderAlert();
  }
}
function flashDot() {
  var dot = document.getElementById('refresh-dot');
  dot.classList.add('active');
  setTimeout(function(){ dot.classList.remove('active'); }, 400);
}

// Live position (signed miles from house) for a train, or null. Prefers a fresh
// SMART/CA berth fix; otherwise estimates from the schedule ETA.
function trainDist(t, now) {
  var td = tdPositions[t.headcode];
  if (td && td.age_s < 150 && td.dist_mi != null) return {mi: td.dist_mi, live: true, place: td.place};
  var houseTs = t.house_pass_ts ? t.house_pass_ts * 1000
              : new Date(t.twy_actual || t.twy_sched).getTime();
  if (!houseTs) return null;
  return {mi: schedDist(houseTs - now, t.direction, isMainTrack(t), t.passenger === false),
          live: false, place: ''};
}

// ── House star: glow when a train is within ~0.4 mi ─────────────────────────
function renderHouseStar() {
  var atHouse = Object.keys(tdPositions).some(function(hc){
    var p = tdPositions[hc];
    return p.dist_mi != null && Math.abs(p.dist_mi) < 0.4 && p.age_s < 60;
  });
  var star = document.getElementById('house-star');
  if (star) {
    star.setAttribute('fill', atHouse ? '#ffd080' : '#3a3010');
    star.setAttribute('filter', atHouse ? 'url(#glow)' : '');
  }
}

// ── Render train icons on the SVG track ─────────────────────────────────────
function renderTrackTrains() {
  var layer = document.getElementById('trains-layer');
  var now = Date.now();
  var svgNS = 'http://www.w3.org/2000/svg';
  while (layer.firstChild) layer.removeChild(layer.firstChild);

  var shown = {};
  var W = 46, H = 22;

  // 1) RTT-identified trains
  trains.forEach(function(t){
    if (t.cancelled) return;
    var d = trainDist(t, now);
    if (!d || !inView(d.mi)) return;
    var dir = t.direction;
    if (!dir) return;
    shown[t.headcode] = {
      headcode: t.headcode,
      dest: t.passenger === false ? freightLabel(t.headcode) : destAbbr(t.dest),
      mi: d.mi, op: opStyle(t.op_code, t.passenger),
      direction: dir, isMain: isMainTrack(t),
      live: d.live, held: t.held, cancelled: t.cancelled,
    };
  });

  // 2) Live TD trains with no RTT identity (positioned by SMART/CA — accurate)
  Object.keys(tdPositions).forEach(function(hc){
    if (shown[hc]) return;
    var p = tdPositions[hc];
    if (p.age_s > 120 || p.dist_mi == null || !inView(p.dist_mi)) return;
    var fb = parseInt(p.from_berth, 10), tb = parseInt(p.berth, 10);
    // direction from berth step: numbers increase westbound (down), decrease eastbound (up)
    var dir = (!isNaN(fb) && !isNaN(tb) && fb !== tb) ? (tb > fb ? 'down' : 'up') : null;
    if (!dir) return;
    var isMain = p.line ? (p.line === 'Main') : (hc[0] === '1');
    var c = hc[0], frt = '456789'.indexOf(c) >= 0;
    shown[hc] = {
      headcode: hc, dest: frt ? freightLabel(hc) : hc,
      mi: p.dist_mi, op: frt ? {bg:'#2d3d1a',fg:'#a0c060',abbr:'FRT'} : {bg:'#1a2a3a',fg:'#8aa0b8',abbr:'?'},
      direction: dir, isMain: isMain, live: true, held: false, cancelled: false,
    };
  });

  // Compute x; declutter overlaps per track (no two labels on the same line overlap)
  var byTrack = {};
  Object.keys(shown).forEach(function(hc){
    var tr = shown[hc];
    tr.x = Math.max(X_MIN, Math.min(X_MAX, distToX(tr.mi)));
    var key = tr.direction + ':' + (tr.isMain ? 'M' : 'R');
    (byTrack[key] = byTrack[key] || []).push(tr);
  });
  Object.keys(byTrack).forEach(function(key){
    var grp = byTrack[key].sort(function(a,b){ return a.x - b.x; });
    for (var i = 1; i < grp.length; i++) {
      if (grp[i].x - grp[i-1].x < W + 3) grp[i].x = grp[i-1].x + W + 3;
      if (grp[i].x > X_MAX) grp[i].hidden = true;
    }
  });

  Object.keys(shown).forEach(function(hc){
    var tr = shown[hc];
    if (tr.hidden) return;
    var y = trackY(tr.direction, tr.isMain);
    var g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', 'translate(' + (tr.x - W/2) + ',' + (y - H/2) + ')');

    var bg = document.createElementNS(svgNS, 'rect');
    bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('rx', '3');
    bg.setAttribute('fill', tr.cancelled ? '#2a0f0f' : (tr.held ? '#3a2a10' : tr.op.bg));
    bg.setAttribute('opacity', tr.live ? '1' : '0.5');
    if (!tr.live) { bg.setAttribute('stroke', tr.op.bg); bg.setAttribute('stroke-dasharray', '2,2'); }
    if (tr.live)  { bg.setAttribute('stroke', '#2a9a50'); bg.setAttribute('stroke-width', '1'); }
    g.appendChild(bg);

    var t1 = document.createElementNS(svgNS, 'text');
    t1.setAttribute('x', W/2); t1.setAttribute('y', '10'); t1.setAttribute('text-anchor', 'middle');
    t1.setAttribute('fill', tr.op.fg); t1.setAttribute('font-size', '9');
    t1.setAttribute('font-family', 'Arial'); t1.setAttribute('font-weight', '700');
    t1.textContent = tr.held ? '⏸' + tr.dest : tr.dest;
    g.appendChild(t1);

    var t2 = document.createElementNS(svgNS, 'text');
    t2.setAttribute('x', W/2); t2.setAttribute('y', '19'); t2.setAttribute('text-anchor', 'middle');
    t2.setAttribute('fill', tr.op.fg); t2.setAttribute('font-size', '7');
    t2.setAttribute('font-family', 'Courier New'); t2.setAttribute('opacity', '0.7');
    t2.textContent = tr.headcode;
    g.appendChild(t2);

    // Direction arrow: UP travels right (→), DOWN travels left (←)
    var isDown = tr.direction === 'down';
    var arr = document.createElementNS(svgNS, 'polygon');
    var ax = isDown ? -6 : W + 6, ay = H/2;
    arr.setAttribute('points', isDown
      ? (ax+5)+','+(ay-3)+' '+ax+','+ay+' '+(ax+5)+','+(ay+3)
      : (ax-5)+','+(ay-3)+' '+ax+','+ay+' '+(ax-5)+','+(ay+3));
    arr.setAttribute('fill', tr.op.bg);
    arr.setAttribute('opacity', tr.live ? '0.85' : '0.4');
    g.appendChild(arr);

    layer.appendChild(g);
  });
}

function freightLabel(hc) {
  var c = hc ? hc[0] : '';
  return c === '4' ? 'H.FRT' : c === '6' ? 'I.FRT' : c === '7' ? 'FRT'
       : c === '8' ? 'L.LCO' : c === '5' ? 'ECS' : 'FRT';
}

// ── Alert strip (last train / NRCC) ─────────────────────────────────────────
function renderAlert() {
  var strip = document.getElementById('alert-strip');
  var label = document.getElementById('alert-label');
  var content = document.getElementById('alert-content');

  if (alertMode === 'nrcc' && nrccMsgs.length > 0) {
    strip.classList.add('nrcc-mode');
    label.textContent = 'Alert';
    var msg = nrccMsgs[0].replace(/\s+/g, ' ').trim();
    content.innerHTML = '<span class="nrcc-text">⚠ ' + esc(msg.slice(0, 120)) + (msg.length > 120 ? '…' : '') + '</span>';
    return;
  }
  strip.classList.remove('nrcc-mode');
  label.textContent = 'Last';

  var now = Date.now();
  var recent = trains.filter(function(t){
    var ms = (t.house_pass_ts ? t.house_pass_ts * 1000 : 0)
          || new Date(t.twy_actual || t.twy_sched).getTime();
    return ms > 0 && ms < now - 30000 && ms > now - 20 * 60000;
  }).sort(function(a, b){
    var ta = a.house_pass_ts ? a.house_pass_ts * 1000 : new Date(a.twy_actual || a.twy_sched).getTime();
    var tb = b.house_pass_ts ? b.house_pass_ts * 1000 : new Date(b.twy_actual || b.twy_sched).getTime();
    return tb - ta;
  });

  var t = recent[0];
  if (!t) { content.innerHTML = '<span class="rc-info" style="color:#1e3a5a">—</span>'; return; }
  var op = opStyle(t.op_code, t.passenger);
  var ms = t.house_pass_ts ? t.house_pass_ts * 1000 : new Date(t.twy_actual || t.twy_sched).getTime();
  var agoS = Math.round((now - ms) / 1000);
  var agoStr = agoS < 60 ? agoS + 's ago' : Math.round(agoS/60) + 'm ago';
  var dest = t.passenger === false ? (t.headcode[0]==='6'?'Intermodal':'Freight') : (t.dest||'');
  var actStr = t.twy_actual ? ' · ✓ ' + fmtHHMM(t.twy_actual) : '';
  var dirStr = t.direction === 'down' ? '↓' : '↑';
  content.innerHTML =
    '<span class="rc-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</span>' +
    '<span class="rc-info">' + dirStr + ' ' + esc(t.headcode) + '  ' + esc(dest) + esc(actStr) + '</span>' +
    '<span class="rc-time">' + esc(agoStr) + '</span>';
}

// ── Next-train panel (four columns, one per line) ───────────────────────────
function render() {
  var now = Date.now();
  var upcoming = trains.filter(function(t){
    if (t.cancelled) return false;
    var ms = t.house_pass_ts ? t.house_pass_ts * 1000
            : new Date(t.twy_actual || t.twy_sched).getTime();
    return ms > now - 60000 && ms < now + 30 * 60000;
  }).sort(function(a, b){
    var ta = a.house_pass_ts ? a.house_pass_ts*1000 : new Date(a.twy_actual||a.twy_sched).getTime();
    var tb = b.house_pass_ts ? b.house_pass_ts*1000 : new Date(b.twy_actual||b.twy_sched).getTime();
    return ta - tb;
  });

  var upRelief   = upcoming.filter(function(t){ return t.direction==='up'   && !isMainTrack(t); });
  var downRelief = upcoming.filter(function(t){ return t.direction==='down' && !isMainTrack(t); });
  var upMain     = upcoming.filter(function(t){ return t.direction==='up'   &&  isMainTrack(t); });
  var downMain   = upcoming.filter(function(t){ return t.direction==='down' &&  isMainTrack(t); });

  renderCol('nur', upRelief[0]   || null, now);
  renderCol('ndr', downRelief[0] || null, now);
  renderCol('num', upMain[0]     || null, now);
  renderCol('ndm', downMain[0]   || null, now);

  renderApproachBar(now);
  renderAlert();
  renderTrackTrains();
}

function renderCol(prefix, t, now) {
  var empty = document.getElementById(prefix + '-empty');
  var card  = document.getElementById(prefix + '-card');
  if (!t) { empty.style.display = 'flex'; card.style.display = 'none'; return; }
  empty.style.display = 'none'; card.style.display = 'flex';

  var op = opStyle(t.op_code, t.passenger);
  var houseMs = t.house_pass_ts ? t.house_pass_ts * 1000
               : new Date(t.twy_actual || t.twy_sched).getTime();
  var eta = houseMs - now;
  var isEst = !t.confirmed;
  var d = trainDist(t, now);
  var dest = t.passenger === false ? freightLabel(t.headcode) : destAbbr(t.dest);

  var confClass = t.held ? 'held' : (d && d.live ? 'live' : (t.confirmed ? 'trust' : 'est'));
  var confText  = t.held ? '⏸ held' : (d && d.live ? '● live' : (t.confirmed ? '✓' : '~est'));

  var etaObj;
  if (t.twy_actual && houseMs < now) etaObj = {val:'passed', unit:''};
  else if (t.held)                   etaObj = {val:'held', unit:''};
  else                               etaObj = fmtEta(eta);

  // position line: real place + miles when live, else call type
  var posStr;
  if (d && d.live) {
    posStr = (Math.abs(d.mi) < 0.4 ? 'passing' : Math.abs(d.mi).toFixed(1) + ' mi')
           + (d.place ? ' · ' + esc(placeName(d.place)) : '');
  } else {
    posStr = t.call_type === 'STOP' ? 'Stops' : 'Passes';
  }
  var late = t.late_min;
  var lateStr = (t.cancelled) ? '<span style="color:#c03030">Cancelled</span>'
    : (late === null || late === undefined || isEst) ? ''
    : late === 0 ? '<span style="color:#2a9a50">On time</span>'
    : '<span style="color:#c06020">+' + late + 'm</span>';

  card.innerHTML =
    '<div class="nc-dest-row">' +
      '<div class="nc-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</div>' +
      '<div class="nc-dest">' + esc(dest) + '</div>' +
      '<div class="nc-conf ' + confClass + '">' + esc(confText) + '</div>' +
    '</div>' +
    '<div class="nc-sub">' +
      '<span class="nc-hc">' + esc(t.headcode) + '</span>' +
      '<span class="nc-pos">' + posStr + '</span>' +
      (lateStr ? '<span>' + lateStr + '</span>' : '') +
    '</div>' +
    '<div class="nc-eta-row">' +
      '<span class="nc-eta">' + esc(String(etaObj.val)) + '</span>' +
      (etaObj.unit ? '<span class="nc-eta-unit">' + esc(etaObj.unit) + '</span>' : '') +
    '</div>';
}

// ── Approach bar ─────────────────────────────────────────────────────────────
// Reading(+5.1mi) at 2%, Maidenhead(−6.7mi) at 98%, house(0) at 43.5%.
var APPR_W = 5.1, APPR_E = -6.7;
function apprPct(mi) {
  var pct = 2 + (APPR_W - mi) / (APPR_W - APPR_E) * 96;
  return Math.max(1.5, Math.min(98.5, pct));
}
function renderApproachBar(now) {
  var dots = document.getElementById('appr-dots');
  if (!dots) return;
  var house = document.getElementById('appr-house');
  var twy = document.getElementById('appr-twy');
  var hp = apprPct(0).toFixed(1) + '%';
  if (house) house.style.left = hp;
  if (twy) twy.style.left = hp;

  var html = '';
  trains.forEach(function(t){
    if (t.cancelled) return;
    var houseMs = (t.house_pass_ts || 0) * 1000;
    if (!houseMs) return;
    var dtSec = (houseMs - now) / 1000;
    if (dtSec < -300 || dtSec > 2400) return;          // 5 min past → 40 min future
    var d = trainDist(t, now);
    if (!d) return;
    var pct = t.at_station ? apprPct(0) : apprPct(d.mi);
    var op = opStyle(t.op_code, t.passenger);
    var border = t.at_station ? '2px solid #d08000'
               : t.held       ? '2px solid #c05000'
               : d.live        ? '2px solid #2a9a50'
               :                 '1px solid rgba(255,255,255,.25)';
    var dir  = (t.direction === 'up' ? '↑' : '↓') + (isMainTrack(t) ? 'M' : 'R');
    var dest = t.passenger === false
      ? (t.headcode && t.headcode[0]==='6' ? 'IFT' : 'FRT')
      : destAbbr(t.dest).slice(0, 3);
    html += '<div class="appr-dot" style="left:' + pct.toFixed(1) + '%;' +
      'background:' + op.bg + ';border:' + border + '">' +
      '<div class="appr-dot-dir">' + esc(dir) + '</div>' +
      '<div class="appr-dot-dest">' + esc(dest) + '</div>' +
      '</div>';
  });
  dots.innerHTML = html;
}

// ── Boot ───────────────────────────────────────────────────────────────────
drawLandmarks();
setInterval(renderClock, 1000);
renderClock();

fetchTrains();
fetchTdLive();
fetchNrcc();

setInterval(fetchTrains,  15000);
setInterval(fetchTdLive,   5000);
setInterval(fetchNrcc, 300000);
setInterval(function(){ render(); }, 1000);
</script>
