<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now — Twyford</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   NOW — kitchen ambient display. One glance: nearest plane overhead,
   nearest train on the line. Sky (cool blue) on the left, rail (warm
   amber) on the right, meeting at a glowing seam down the middle —
   two domains, one board, read-across-the-room scale throughout.
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:        #05070a;
  --rule:      #161c26;
  --text:      #edf1f6;
  --text-dim:  #8b99ab;
  --text-faint:#3d4a5c;
  --air:       #6fc3f0;
  --air-dim:   #2f5b78;
  --air-glow:  rgba(111,195,240,0.16);
  --rail:      #ffb000;
  --rail-dim:  #8a6a2a;
  --rail-glow: rgba(255,176,0,0.14);
  --ontime:    #46c97e;
  --late:      #ff9f43;
  --cancel:    #ff5f56;
  --live:      #35d07f;
  --relief:    #3fb7c4;
  --main-ln:   #6f9fd8;
  --cond: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --body: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  overflow: hidden;
}
@media (hover: hover) and (pointer: fine) { body.hidecursor * { cursor: none; } }
body {
  display: flex; flex-direction: column;
  background-image:
    radial-gradient(1100px 480px at 22% -12%, var(--air-glow), transparent 60%),
    radial-gradient(1100px 480px at 78% -12%, var(--rail-glow), transparent 60%),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.006) 0 1px, transparent 1px 7px);
}

/* ── Header ─────────────────────────────────────────────── */
header {
  flex: 0 0 auto;
  display: flex; align-items: baseline; justify-content: center;
  gap: 1.4vw; position: relative;
  padding: 1.1vh 0 0.9vh;
  border-bottom: 1px solid var(--rule);
}
#back {
  position: absolute; left: 1.6vw; top: 50%; transform: translateY(-50%);
  font-family: var(--cond); font-weight: 600;
  font-size: clamp(13px, 2vh, 22px);
  color: var(--text-faint); text-decoration: none; letter-spacing: 0.04em;
}
#back:active, #back:hover { color: var(--text-dim); }
#title {
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(15px, 2.4vh, 26px);
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--text-faint);
}
#clock {
  font-family: var(--mono); font-weight: 500;
  font-size: clamp(22px, 4vh, 42px);
  font-variant-numeric: tabular-nums;
  color: var(--text); line-height: 1;
}
#clock .sec { color: var(--text-faint); font-size: 0.6em; }
#date {
  font-family: var(--body); font-weight: 500;
  font-size: clamp(12px, 1.8vh, 20px);
  color: var(--text-dim); letter-spacing: 0.03em;
}

/* ── Split ──────────────────────────────────────────────── */
#split { flex: 1 1 auto; min-height: 0; display: flex; position: relative; }
/* The seam is two abutting gradients (blue fading in from the left half,
   amber fading in from the right half) plus a bright core line and a soft
   blurred glow bar behind it — a real "meeting point" rather than a plain
   rule, since that's the one visual element that has to read as deliberate
   from across a kitchen. */
#seam {
  position: absolute; left: 50%; top: 4%; bottom: 4%; width: 3px;
  transform: translateX(-1.5px);
  background: linear-gradient(180deg,
    transparent, var(--air) 12%, rgba(230,235,240,0.9) 50%, var(--rail) 88%, transparent);
  border-radius: 2px;
  box-shadow: 0 0 14px 1px rgba(230,235,240,0.18);
}
#seam::before {
  content: ''; position: absolute; inset: -6px -14px;
  background: linear-gradient(90deg, var(--air-glow), transparent 45%, transparent 55%, var(--rail-glow));
  filter: blur(6px);
  z-index: -1;
}
#seam::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  width: 64px; height: 64px; border-radius: 50%; transform: translate(-50%,-50%);
  background: radial-gradient(circle, rgba(235,240,245,0.16), transparent 70%);
}
.pane {
  flex: 1 1 50%; min-width: 0; min-height: 0; overflow: hidden;
  display: flex; flex-direction: column;
  padding: 1.2vh 2.2vw;
  opacity: 0; transform: translateY(10px);
  animation: rise 0.7s cubic-bezier(.2,.8,.3,1) forwards;
}
#air-pane { animation-delay: 0.05s; }
#rail-pane { animation-delay: 0.18s; }
@keyframes rise { to { opacity: 1; transform: translateY(0); } }

.pane-label {
  flex: 0 0 auto;
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(14px, 2.6vh, 27px);
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 1.2vh;
  display: flex; align-items: center; gap: 0.5em;
}
.pane-label svg { width: 1.15em; height: 1.15em; flex: 0 0 auto; }
#air-pane .pane-label { color: var(--air); }
#air-pane .pane-label svg { filter: drop-shadow(0 0 6px rgba(111,195,240,0.5)); }
#rail-pane .pane-label { color: var(--rail); }
#rail-pane .pane-label svg { filter: drop-shadow(0 0 6px rgba(255,176,0,0.45)); }

/* ═══ Aircraft pane ═══ */
#air-content { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
.ac-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1vh; color: var(--text-faint); text-align: center;
}
.ac-empty .glyph { font-size: clamp(40px, 10vh, 120px); opacity: 0.5; }
.ac-empty .msg {
  font-family: var(--cond); font-weight: 500; letter-spacing: 0.1em;
  font-size: clamp(17px, 3.4vh, 38px); text-transform: uppercase;
}

.ac-header {
  flex: 0 0 auto; display: flex; align-items: center; gap: 1.2vw;
  padding: 1.6vh 1.6vw; border-radius: 12px; margin-bottom: 2vh;
}
.ac-logo {
  height: clamp(34px, 8vh, 84px); max-width: 26%; object-fit: contain;
  background: #ffffff; border-radius: 8px; padding: 0.6em 1em;
  box-shadow: 0 1px 4px rgba(0,0,0,0.35);
}
.ac-flight-num { font-family: var(--cond); font-weight: 700; font-size: clamp(38px, 10vh, 150px); line-height: 0.95; letter-spacing: 0.01em; }
.ac-airline-name { font-family: var(--body); font-size: clamp(15px, 3vh, 38px); opacity: 0.85; margin-top: 0.3vh; }
.ac-type-right { text-align: right; font-family: var(--body); font-size: clamp(13px, 2.3vh, 26px); line-height: 1.55; opacity: 0.9; }

.ac-route { flex: 1 1 auto; min-height: 0; padding: 1vh 1.6vw 2vh; display: flex; gap: 1.8vw; align-items: center; overflow: hidden; }
.ac-route-main { flex: 1; min-width: 0; overflow: hidden; }
.ac-airport {
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(26px, 7vh, 96px); line-height: 1.14;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ac-iata { font-size: 0.55em; opacity: 0.5; font-weight: 500; }
.ac-route-arrow { font-family: var(--mono); font-size: clamp(14px, 2.8vh, 32px); color: var(--air-dim); padding: 0.4vh 0; }
.ac-times { font-family: var(--mono); font-size: clamp(14px, 2.7vh, 32px); color: var(--air); margin-top: 0.4vh; }
.ac-times .early { color: var(--relief); } .ac-times .late { color: var(--late); } .ac-times .ontime { color: var(--ontime); }
.ac-route-loading { font-size: clamp(14px, 2.4vh, 26px); color: var(--text-faint); font-style: italic; align-self: center; }
.ac-flight-info { text-align: right; font-family: var(--mono); font-size: clamp(13px, 2.4vh, 28px); color: var(--text-dim); align-self: center; white-space: nowrap; }
.ac-flight-info div + div { margin-top: 0.8vh; }

.ac-stats {
  flex: 0 0 auto; width: 100%; box-sizing: border-box; overflow: hidden;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1vw;
}
.ac-stat-card {
  min-width: 0;
  background: rgba(111,195,240,0.05); border: 1px solid rgba(111,195,240,0.14);
  border-radius: 12px; padding: 2vh 0.6vw;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 0.8vh;
  text-align: center;
}
.ac-stat-label { font-family: var(--cond); font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; font-size: clamp(10px, 1.5vh, 17px); color: var(--air-dim); }
.ac-stat-value {
  font-family: var(--mono); font-weight: 500; font-size: clamp(26px, 6vh, 80px); line-height: 1;
  color: var(--text); display: flex; align-items: center; gap: 0.08em;
  max-width: 100%; overflow: hidden; white-space: nowrap;
}
.ac-stat-unit { font-family: var(--body); font-size: clamp(10px, 1.6vh, 18px); color: var(--text-faint); }
.ac-heading-arrow { display: inline-block; font-size: 0.55em; transition: transform 0.4s; }

/* ═══ Trains pane ═══ */
#rail-content { flex: 1 1 auto; min-height: 0; display: grid; grid-template-rows: repeat(4, 1fr); gap: 0.9vh; }
.track {
  position: relative; min-height: 0;
  display: grid; grid-template-columns: clamp(60px, 7.2vw, 120px) 1fr auto;
  align-items: stretch; gap: 0 1.1vw;
  padding: 0.8vh 0.6vw 0.8vh 0;
  border-radius: 10px;
  background: rgba(255,255,255,0.025);
  overflow: hidden;
}
.track::before {
  content: ''; position: absolute; left: 0; top: 6%; bottom: 6%;
  width: 5px; border-radius: 3px;
  background: var(--spine, var(--text-faint)); opacity: 0.95; transition: background .6s;
}
@keyframes sweep {
  0%   { transform: translateX(-100%); opacity: 0.5; }
  100% { transform: translateX(120%);  opacity: 0; }
}
.track.passing::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(100deg, transparent 20%, rgba(255,176,0,0.14) 48%, transparent 76%);
  animation: sweep 2.4s linear infinite; pointer-events: none;
}
.t-id { display: flex; flex-direction: column; justify-content: center; padding-left: clamp(10px, 1.3vw, 20px); gap: 0.3vh; }
.t-id .arrow { font-family: var(--cond); font-weight: 700; line-height: 0.8; font-size: clamp(17px, 3.8vh, 40px); color: var(--ln-color); }
.t-id .name { font-family: var(--cond); font-weight: 600; font-size: clamp(10px, 2.1vh, 21px); line-height: 1.05; letter-spacing: 0.06em; color: var(--ln-color); }
.track[data-ln="relief"] { --ln-color: var(--relief); }
.track[data-ln="main"]   { --ln-color: var(--main-ln); }
.t-main { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 0.4vh; }
.t-dest {
  font-family: var(--cond); font-weight: 700; font-size: clamp(24px, 7vh, 92px); line-height: 0.98;
  text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-dest .cancelled { text-decoration: line-through; color: var(--cancel); }
.t-sub {
  display: flex; flex-wrap: wrap; align-items: baseline; row-gap: 0.15em; column-gap: 0.7vw;
  font-size: clamp(10px, 1.8vh, 19px); color: var(--text-dim);
  max-height: 2.6em; overflow: hidden;
}
.t-sub .op { font-family: var(--cond); font-weight: 600; letter-spacing: 0.04em; padding: 0.06em 0.5em; border-radius: 0.25em; font-size: 0.8em; }
.t-sub .hc { font-family: var(--mono); font-size: 0.74em; color: var(--text-faint); }
.t-sub .livepos { color: var(--live); }
.t-sub .livepos::before { content: '● '; font-size: 0.7em; }
.t-eta { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 0.2vh; min-width: clamp(90px, 11vw, 190px); padding-right: 0.8vw; }
.t-count { font-family: var(--cond); font-weight: 700; font-size: clamp(28px, 8.8vh, 118px); line-height: 0.85; font-variant-numeric: tabular-nums; color: var(--text); display: flex; align-items: baseline; gap: 0.1em; }
.t-count .unit { font-size: 0.32em; font-weight: 600; color: var(--text-dim); letter-spacing: 0.05em; }
.t-count.now  { color: var(--rail); }
.t-count.stn, .t-count.held { color: var(--late); font-size: clamp(19px, 5.2vh, 54px); }
.t-count.gone { color: var(--text-faint); font-size: clamp(16px, 4vh, 42px); }
@keyframes pulse { 50% { opacity: 0.55; } }
.t-count.now { animation: pulse 1.2s ease-in-out infinite; }
.t-status { font-size: clamp(11px, 2vh, 20px); font-variant-numeric: tabular-nums; color: var(--text-dim); }
.t-status .ontime { color: var(--ontime); } .t-status .late { color: var(--late); } .t-status .cancel { color: var(--cancel); } .t-status .est { color: var(--text-faint); }
.t-empty { grid-column: 2 / 4; display: flex; align-items: center; font-family: var(--cond); font-weight: 500; font-size: clamp(16px, 3.2vh, 32px); letter-spacing: 0.1em; color: var(--text-faint); }

/* ── Alert strip ────────────────────────────────────────── */
#alert {
  flex: 0 0 auto; display: none; align-items: center; gap: 1vw;
  padding: 0.8vh 2vw; background: rgba(255,159,67,0.09);
  border-top: 1px solid rgba(255,159,67,0.3);
  font-size: clamp(11px, 1.8vh, 18px); color: var(--late);
}
#alert.show { display: flex; }
#alert .tag { font-family: var(--cond); font-weight: 700; letter-spacing: 0.08em; flex: 0 0 auto; }
#alert .msg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Narrow / portrait: stack instead of split ─────────────── */
@media (max-aspect-ratio: 95/100) {
  #split { flex-direction: column; }
  #seam {
    left: 5%; right: 5%; top: 50%; bottom: auto; width: auto; height: 3px;
    transform: translateY(-1.5px);
    background: linear-gradient(90deg,
      transparent, var(--air) 12%, rgba(230,235,240,0.9) 50%, var(--rail) 88%, transparent);
    box-shadow: 0 0 14px 1px rgba(230,235,240,0.18);
  }
  #seam::before { inset: -14px -6px; background: linear-gradient(180deg, var(--air-glow), transparent 45%, transparent 55%, var(--rail-glow)); }
  /* Each pane gets a hard-capped share of the real (dynamic, chrome-shrunk)
     viewport height, and clips anything that still doesn't fit (see .pane
     overflow:hidden above) rather than spilling into the other pane —
     confirmed bug on iPhone Safari, whose address bar eats into 100vh. */
  .pane { flex: 0 1 50%; padding: 0.8vh 3.2vw; }
  .pane-label { margin-bottom: 0.6vh; font-size: clamp(12px, 2vh, 18px); }

  /* Portrait squeezes both header+route+stats into ~half a (chrome-shrunk)
     phone viewport, so aircraft text can't scale off the same generous vh
     ratios as the wide-screen layout — it's sized in absolute terms here to
     actually fit, rather than relying on .ac-route's overflow:hidden to
     paper over content that's simply too tall for the box (confirmed bug:
     route text bleeding into the header and stat cards on iPhone). */
  .ac-header { gap: 2.4vw; padding: 0.8vh 3.2vw; margin-bottom: 0.6vh; border-radius: 8px; }
  .ac-logo { height: clamp(22px, 4vh, 34px); }
  .ac-flight-num { font-size: clamp(20px, 3.6vh, 36px); }
  .ac-airline-name { font-size: clamp(10px, 1.6vh, 15px); margin-top: 0.1vh; }
  .ac-type-right { font-size: clamp(8px, 1.3vh, 12px); line-height: 1.4; }

  .ac-route { padding: 0.4vh 3.2vw; gap: 2.4vw; }
  .ac-airport { font-size: clamp(14px, 2.6vh, 24px); line-height: 1.05; }
  .ac-route-arrow { font-size: clamp(9px, 1.3vh, 13px); padding: 0.1vh 0; }
  .ac-times { font-size: clamp(9px, 1.5vh, 14px); margin-top: 0.1vh; }
  .ac-route-loading { font-size: clamp(10px, 1.5vh, 14px); }
  .ac-flight-info { font-size: clamp(8px, 1.3vh, 12px); }
  .ac-flight-info div + div { margin-top: 0.3vh; }

  .ac-stats { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 0.8vh 3vw; }
  .ac-stat-card { padding: 0.6vh 1vw; border-radius: 8px; gap: 0.2vh; }
  .ac-stat-label { font-size: clamp(8px, 1.1vh, 11px); }
  .ac-stat-value { font-size: clamp(16px, 3vh, 30px); }
  .ac-stat-unit { font-size: clamp(8px, 1.1vh, 11px); }

  #rail-content { gap: 0.8vh; }
  .t-dest { font-size: clamp(18px, 4.6vh, 44px); }
  .t-count { font-size: clamp(20px, 5vh, 48px); }
  .t-sub { font-size: clamp(9px, 1.5vh, 14px); }
}
</style>
</head>
<body>

<header>
  <a id="back" href="/" onmousedown="window.location.href='/'">←</a>
  <span id="title">Now</span>
  <span id="clock">--:--<span class="sec">--</span></span>
  <span id="date">—</span>
</header>

<div id="split">
  <div id="seam"></div>
  <section id="air-pane" class="pane">
    <div class="pane-label">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2.5 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
      Nearest Aircraft
    </div>
    <div id="air-content"><div class="ac-empty"><div class="glyph">✈</div><div class="msg">Loading…</div></div></div>
  </section>
  <section id="rail-pane" class="pane">
    <div class="pane-label">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2c-4 0-8 .5-8 4v9.5A3.5 3.5 0 0 0 7.5 19L6 20.5v.5h2.23l2-2H14l2 2h2v-.5L16.5 19a3.5 3.5 0 0 0 3.5-3.5V6c0-3.5-4-4-8-4zM7.5 17A1.5 1.5 0 1 1 7.5 14a1.5 1.5 0 0 1 0 3zm4.5-7H6V6h6v4zm2 0V6h6v4h-6zm4.5 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
      Nearest Trains
    </div>
    <div id="rail-content"></div>
  </section>
</div>

<div id="alert"><span class="tag">⚠ DISRUPTION</span><span class="msg" id="alert-msg"></span></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   Shared
   ═══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
document.body.classList.add('hidecursor');

function tick() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) +
    '<span class="sec">' + String(d.getSeconds()).padStart(2, '0') + '</span>';
  document.getElementById('date').textContent =
    d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  renderTrains();
}

/* ═══════════════════════════════════════════════════════════════
   AIRCRAFT — nearest commercial aircraft, focus-mode style
   ═══════════════════════════════════════════════════════════════ */
const CFG_LAT = 51.4741, CFG_LON = -0.8647, CFG_NAME = 'Twyford', CFG_DIST = 100;

const AIRLINES = {
  'BAW':{iata:'BA', name:'British Airways',      bg:'#002157',fg:'#ffffff'},
  'SHT':{iata:'BA', name:'BA Shuttle',           bg:'#002157',fg:'#ffffff'},
  'CFE':{iata:'BA', name:'BA CityFlyer',         bg:'#002157',fg:'#ffffff'},
  'EFW':{iata:'A0', name:'BA Euroflyer',         bg:'#002157',fg:'#ffffff'},
  'EZY':{iata:'U2', name:'easyJet',              bg:'#f37029',fg:'#ffffff'},
  'EJU':{iata:'U2', name:'easyJet Europe',       bg:'#f37029',fg:'#ffffff'},
  'EZS':{iata:'DS', name:'easyJet Switzerland',  bg:'#f37029',fg:'#ffffff'},
  'EIN':{iata:'EI', name:'Aer Lingus',           bg:'#00693e',fg:'#ffffff'},
  'EAI':{iata:'EI', name:'Emerald Airlines',     bg:'#00693e',fg:'#ffffff'},
  'RYR':{iata:'FR', name:'Ryanair',              bg:'#073da4',fg:'#ffffff'},
  'VIR':{iata:'VS', name:'Virgin Atlantic',      bg:'#e20026',fg:'#ffffff'},
  'TOM':{iata:'BY', name:'TUI Airways',          bg:'#e20026',fg:'#ffffff'},
  'TFL':{iata:'OR', name:'TUI fly Netherlands',  bg:'#e20026',fg:'#ffffff'},
  'EXS':{iata:'LS', name:'Jet2',                 bg:'#00418b',fg:'#ffffff'},
  'DLH':{iata:'LH', name:'Lufthansa',            bg:'#05164d',fg:'#f9c901'},
  'LHX':{iata:'VL', name:'Lufthansa City',       bg:'#05164d',fg:'#f9c901'},
  'AFR':{iata:'AF', name:'Air France',           bg:'#002395',fg:'#ffffff'},
  'KLM':{iata:'KL', name:'KLM',                  bg:'#00a1de',fg:'#ffffff'},
  'SWR':{iata:'LX', name:'Swiss',                bg:'#e30613',fg:'#ffffff'},

let aircraft = [];
const routeCache = {}, routeInFlight = {}, acInfoCache = {}, extraAirports = {};

function calcDist(lat, lon) {
  const dLat = (lat - CFG_LAT) * Math.PI / 180;
  const dLon = (lon - CFG_LON) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(CFG_LAT * Math.PI / 180) * Math.cos(lat * Math.PI / 180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return 3440.065 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function iataFlight(route) {
  if (route.operated_ident) {
    const pfx = route.operated_ident.substring(0, 3);
    const al = AIRLINES[pfx];
    if (al) return al.iata + route.operated_ident.substring(3);
  }
  if (route.iata_flight) {
    const m = route.iata_flight.match(/^[A-Z]{2}\d+/);
    return m ? m[0] : route.iata_flight;
  }
  return '';
}
function airportName(iata) {
  if (!iata) return '';
  if (AIRPORTS[iata]) return AIRPORTS[iata];
  const extra = extraAirports[iata];
  if (extra === undefined) {
    extraAirports[iata] = null;
    fetchAirportName(iata);
  }
  return extra || iata;
}
function fetchAirportName(iata) {
  fetch('/api/airport-name?iata=' + encodeURIComponent(iata))
    .then(r => r.json()).then(r => { extraAirports[iata] = r.name || ''; if (r.name) renderAircraft(); })
    .catch(() => { extraAirports[iata] = null; });
}
function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function fmtEte(s) {
  const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
  return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
}
function fmtTimeLine(label, sched, est) {
  if (!sched && !est) return null;
  const schedStr = sched ? fmtTime(sched) : '', estStr = est ? fmtTime(est) : '';
  let deltaHtml = '';
  if (sched && est) {
    const deltaMins = Math.round((est - sched) / 60);
    if (Math.abs(deltaMins) <= 1) deltaHtml = ' <span class="ontime">on time</span>';
    else if (deltaMins > 0) deltaHtml = ' <span class="late">+' + deltaMins + 'm</span>';
    else deltaHtml = ' <span class="early">' + (-deltaMins) + 'm early</span>';
  }
  if (schedStr && estStr && schedStr !== estStr) return label + ' ' + schedStr + ' → ' + estStr + deltaHtml;
  return label + ' ' + (schedStr || estStr) + deltaHtml;
}
function fetchRoute(cs) {
  if (routeInFlight[cs] || routeCache[cs]) return;
  routeInFlight[cs] = true;
  fetch('/api/flight-route?cs=' + encodeURIComponent(cs)).then(r => r.json()).then(r => {
    routeInFlight[cs] = false;
    if (!r.orig || !r.dest) r._notFound = true;
    routeCache[cs] = r;
    renderAircraft();
  }).catch(() => { routeInFlight[cs] = false; });
}
function fetchAircraftInfo(hex) {
  if (acInfoCache[hex] !== undefined) return;
  acInfoCache[hex] = {};
  fetch('/api/aircraft-info?hex=' + encodeURIComponent(hex)).then(r => r.json()).then(info => {
    acInfoCache[hex] = {year: info.built || '', label: info.built_label || 'Built'};
    renderAircraft();
  }).catch(() => { delete acInfoCache[hex]; });
}

function renderAircraft() {
  const el = document.getElementById('air-content');
  const commercial = aircraft.filter(ac => {
    const cs = (ac.flight || '').trim();
    return cs.length >= 4 && AIRLINES[cs.substring(0, 3)];
  });
  commercial.sort((a, b) => a._dist - b._dist);
  const ac = commercial[0];

  if (!ac) {
    el.innerHTML = '<div class="ac-empty"><div class="glyph">✈</div><div class="msg">No aircraft nearby</div></div>';
    return;
  }

  const cs = (ac.flight || '').trim();
  const icao = cs.substring(0, 3);
  const al = AIRLINES[icao];
  const bg = al ? al.bg : '#0a1520', fg = al ? al.fg : '#e8eaf0';
  const route = routeCache[cs];
  const iataFlt = route ? iataFlight(route) : '';
  const dispFlt = iataFlt || cs;
  const alName = al ? al.name : icao;
  const logoHtml = al
    ? '<img class="ac-logo" src="/api/airline-logo?iata=' + encodeURIComponent(al.iata) + '" onerror="this.style.display=\'none\'">'
    : '';

  let routeHtml;
  if (route && route.orig && route.dest) {
    const origCity = airportName(route.orig_iata) || route.orig;
    const destCity = airportName(route.dest_iata) || route.dest;
    const origIata = route.orig_iata ? ' <span class="ac-iata">' + route.orig_iata + '</span>' : '';
    const destIata = route.dest_iata ? ' <span class="ac-iata">' + route.dest_iata + '</span>' : '';
    const depLine = fmtTimeLine('Dep', route.depart_sched, route.depart_est);
    const arrLine = fmtTimeLine('Arr', route.arrive_sched, route.arrive_est);
    const eteStr = route.ete_s ? fmtEte(route.ete_s) : '';
    const distStr = route.distance_nm ? route.distance_nm.toLocaleString() + ' nm' : '';
    const infoParts = [eteStr, distStr].filter(Boolean);
    const infoHtml = infoParts.length
      ? '<div class="ac-flight-info">' + infoParts.map(p => '<div>' + p + '</div>').join('') + '</div>' : '';
    routeHtml =
      '<div class="ac-route-main">' +
        '<div class="ac-airport">' + esc(origCity) + origIata + '</div>' +
        (depLine ? '<div class="ac-times">' + depLine + '</div>' : '') +
        '<div class="ac-route-arrow">↓</div>' +
        '<div class="ac-airport">' + esc(destCity) + destIata + '</div>' +
        (arrLine ? '<div class="ac-times">' + arrLine + '</div>' : '') +
      '</div>' + infoHtml;
  } else if (route && route._notFound) {
    routeHtml = '<div class="ac-route-loading">No route information available</div>';
  } else {
    routeHtml = '<div class="ac-route-loading">Route information loading…</div>';
    if (cs && !routeCache[cs]) fetchRoute(cs);
  }

  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const altFt = typeof ac.alt_baro === 'number' ? ac.alt_baro : null;
  const altM = altFt != null ? Math.round(altFt * 0.3048) : null;
  const kph = ac.gs ? Math.round(ac.gs * 1.852) : null;
  const hdg = ac.track != null ? Math.round(ac.track) : null;
  const hdgDir = hdg != null ? dirs[Math.round(hdg / 22.5) % 16] : '—';
  const arrowHtml = hdg != null ? '<span class="ac-heading-arrow" style="transform:rotate(' + hdg + 'deg)">↑</span>' : '';
  const distKm = Math.round(ac._dist * 1.852);

  const cached = acInfoCache[ac.hex];
  const acParts = [];
  const acType = AC_TYPES[ac.t] || ac.t || '';
  if (acType) acParts.push(esc(acType));
  if (ac.r) acParts.push(esc(ac.r));
  if (cached && cached.year) acParts.push(esc((cached.label || 'Built') + ' ' + cached.year));

  el.innerHTML =
    '<div class="ac-header" style="background:' + bg + ';color:' + fg + '">' +
      logoHtml +
      '<div style="flex:1;min-width:0">' +
        '<div class="ac-flight-num">' + esc(dispFlt) + '</div>' +
        '<div class="ac-airline-name">' + esc(alName) + '</div>' +
      '</div>' +
      (acParts.length ? '<div class="ac-type-right">' + acParts.map(p => '<div>' + p + '</div>').join('') + '</div>' : '') +
    '</div>' +
    '<div class="ac-route">' + routeHtml + '</div>' +
    '<div class="ac-stats">' +
      '<div class="ac-stat-card"><div class="ac-stat-label">Altitude</div><div class="ac-stat-value">' + (altM != null ? altM.toLocaleString() : '—') + '</div><div class="ac-stat-unit">metres</div></div>' +
      '<div class="ac-stat-card"><div class="ac-stat-label">Speed</div><div class="ac-stat-value">' + (kph != null ? kph : '—') + '</div><div class="ac-stat-unit">kph</div></div>' +
      '<div class="ac-stat-card"><div class="ac-stat-label">Heading</div><div class="ac-stat-value">' + hdgDir + arrowHtml + '</div><div class="ac-stat-unit">' + (hdg != null ? hdg + '°' : '') + '</div></div>' +
      '<div class="ac-stat-card"><div class="ac-stat-label">Distance</div><div class="ac-stat-value">' + distKm + '</div><div class="ac-stat-unit">km from ' + CFG_NAME + '</div></div>' +
    '</div>';

  el.querySelectorAll('.ac-stat-value').forEach(v => fitText(v, 14));
  el.querySelectorAll('.ac-airport').forEach(v => fitText(v, 16));
  fitText(el.querySelector('.ac-flight-num'), 18);

  fetchAircraftInfo(ac.hex);
}

function fetchAircraft() {
  const url = '/api/flights?lat=' + CFG_LAT.toFixed(4) + '&lon=' + CFG_LON.toFixed(4) + '&dist=' + CFG_DIST + '&focus=1';
  fetch(url).then(r => r.json()).then(data => {
    aircraft = (data.ac || []).filter(ac => ac.lat && ac.lon && typeof ac.alt_baro === 'number' && ac.alt_baro > 500);
    aircraft.forEach(ac => { ac._dist = calcDist(ac.lat, ac.lon); });
    renderAircraft();
  }).catch(() => {});
}

/* ═══════════════════════════════════════════════════════════════
   TRAINS — Twyford trackboard, 4 running lines
   ═══════════════════════════════════════════════════════════════ */
const OPS = {
  GW: {bg:'#0b9d6c', fg:'#04160f', name:'GWR'},
  XR: {bg:'#9d7fd8', fg:'#120a20', name:'Elizabeth line'},
  XC: {bg:'#e05570', fg:'#1d060b', name:'CrossCountry'},
  HX: {bg:'#8a5fd6', fg:'#12081f', name:'Heathrow Exp'},
  AW: {bg:'#c05fc0', fg:'#1a061a', name:'TfW'},
  GB: {bg:'#f0a835', fg:'#1d1403', name:'GBRf'},
  DW: {bg:'#f04a4a', fg:'#1c0505', name:'DB Cargo'},
  FL: {bg:'#4fae62', fg:'#07130a', name:'Freightliner'},
  ZZ: {bg:'#f07b3c', fg:'#1a0a02', name:'Colas'},
  ZN: {bg:'#e8c34a', fg:'#171102', name:'Network Rail'},
};
function opInfo(t) {
  const o = OPS[t.op_code];
  if (o) return o;
  if (isEcsHc(t.headcode))
    return {bg:'#4a7d9d', fg:'#04121a', name:'ECS'};
  if (t.passenger === false || isFreightHc(t.headcode))
    return {bg:'#7d8f4a', fg:'#111504', name:'Freight'};
  return {bg:'#3c4c60', fg:'#dfe7f0', name: t.op_name || t.op_code || ''};
}
function isFreightHc(hc) { return hc && '4678'.indexOf(hc[0]) >= 0; }
function isEcsHc(hc) { return hc && hc[0] === '5'; }
function freightClass(hc) {
  const c = hc ? hc[0] : '';
  return c === '4' ? 'Freight · intermodal'
       : c === '6' ? 'Freight · heavy haul'
       : c === '7' ? 'Freight'
       : c === '8' ? 'Light engine'
       : c === '5' ? 'Empty stock' : 'Freight';
}
function shortPlace(name) {
  if (!name) return '';
  return String(name)
    .replace('London Paddington', 'Paddington')
    .replace(' Temple Meads', '').replace(' Foregate Street', '').replace(' Shrub Hill', '')
    .replace(' St Davids', '')
    .replace('Heathrow Terminals 1-3', 'Heathrow T2/3').replace('Heathrow Terminal ', 'Heathrow T')
    .replace('-super-Mare', '').replace(' International', ' Intl');
}
const STANME = {
  MAIDENHED:'Maidenhead', MDNHDMIDS:'Maidenhead', 'MDNHD CS':'Maidenhead',
  TWYFORD:'Twyford', READNG:'Reading', READGWEST:'Reading West',
  READWTORJ:'Reading', RDGSPURJN:'Reading', TILEHURST:'Tilehurst',
  PANGBORNE:'Pangbourne', 'GORING&ST':'Goring', CHOLSEY:'Cholsey',
  SLOUGH:'Slough', BURNHAM:'Burnham', TAPLOW:'Taplow', LANGLEY:'Langley',
  IVER:'Iver', 'W DRAYTON':'West Drayton', 'HAYES&HAR':'Hayes',
  SOUTHALL:'Southall', HANWELL:'Hanwell', AIRPORTJN:'Airport Jn',
  STOCKLYJN:'Stockley Jn', HENLEYONT:'Henley', 'KEN BG LP':'Kennet Bridge',
  'KEN BG JN':'Kennet Bridge',
};
function placeName(s) {
  if (!s) return '';
  if (STANME[s]) return STANME[s];
  if (s.indexOf('LHR') === 0) return 'Heathrow';
  return s.charAt(0) + s.slice(1).toLowerCase();
}
function trainMs(t) {
  if (t.house_pass_ts) return t.house_pass_ts * 1000;
  if (!t.twy_sched) return 0;
  let ms = new Date(t.twy_sched).getTime();
  if (!t.twy_actual && t.late_min > 0) ms += t.late_min * 60000;
  return ms;
}
/* Shrink-to-fit for destination text — this page's huge base font size
   (tuned for short place names like "Reading") would otherwise hard-clip
   longer ones ("Cheltenham Spa" → "CHELTENHAM S…") with no way to read the
   rest. Starts from the CSS clamp()-resolved size and steps down until the
   text actually fits its box, rather than fighting the layout with a fixed
   smaller size that wastes space on every short name. */
function fitText(el, minPx) {
  if (!el) return;
  minPx = minPx || 15;
  el.style.fontSize = '';
  let size = parseFloat(getComputedStyle(el).fontSize);
  let guard = 24;
  while (el.scrollWidth > el.clientWidth + 1 && size > minPx && guard-- > 0) {
    size -= 2;
    el.style.fontSize = size + 'px';
  }
}
function fmtHM(msOrIso) {
  const d = new Date(msOrIso);
  return isNaN(d) ? '—' : d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function trackKey(t) {
  if (!t.direction || !t.track) return null;
  return (t.direction === 'up' ? 'u' : 'd') + (t.track === 'Main' ? 'm' : 'r');
}
function graceMs(t) {
  if (t.at_station) return 600000; // dwelling at the platform — stay current until it actually departs
  if (t.twy_actual) return t.direction === 'up' ? 45000 : 20000;
  return 100000;
}

let trains = [], nrccMsgs = [], lastFetch = 0;
const KEYS = ['ur', 'dr', 'um', 'dm'];
const LINE_META = {
  ur: {arrow:'→', name:'UP RELIEF',   ln:'relief'},
  dr: {arrow:'←', name:'DOWN RELIEF', ln:'relief'},
  um: {arrow:'→', name:'UP MAIN',     ln:'main'},
  dm: {arrow:'←', name:'DOWN MAIN',   ln:'main'},
};

function fetchTrains() {
  fetch('/api/trains').then(r => r.json()).then(d => {
    trains = d.trains || [];
    lastFetch = Date.now();
    renderTrains();
  }).catch(() => {});
}
function fetchNrcc() {
  fetch('/api/nrcc').then(r => r.json()).then(d => {
    nrccMsgs = d.messages || [];
    renderAlert();
  }).catch(() => {});
}
function renderAlert() {
  const el = document.getElementById('alert');
  if (!nrccMsgs.length) { el.classList.remove('show'); return; }
  const msg = String(nrccMsgs[0]).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  document.getElementById('alert-msg').textContent = msg;
  el.classList.add('show');
}

function renderTrains() {
  const now = Date.now();
  const byKey = {ur:[], dr:[], um:[], dm:[]};
  for (const t of trains) {
    const k = trackKey(t);
    if (!k || !byKey[k]) continue;
    const ms = trainMs(t);
    if (!ms || ms > now + 65 * 60000) continue;
    if (ms < now - 150000) continue;
    byKey[k].push(t);
  }
  for (const k of KEYS) {
    byKey[k].sort((a, b) => trainMs(a) - trainMs(b));
    renderTrack(k, byKey[k], now);
  }
}

function renderTrack(key, list, now) {
  let row = document.getElementById('row-' + key);
  if (!row) return;
  const main = document.getElementById('main-' + key);
  const eta = document.getElementById('eta-' + key);

  const live = list.filter(t => !t.cancelled);
  let t = null;
  for (const c of live) {
    if (trainMs(c) >= now - graceMs(c)) { t = c; break; }
  }
  if (!t) {
    row.style.setProperty('--spine', 'var(--text-faint)');
    row.classList.remove('passing');
    main.innerHTML = '<div class="t-empty">NO TRAIN DUE</div>';
    eta.innerHTML = '';
    return;
  }

  const op = opInfo(t);
  const ms = trainMs(t);
  const diff = ms - now;
  const frt = t.passenger === false || isFreightHc(t.headcode) || isEcsHc(t.headcode);
  row.style.setProperty('--spine', op.bg);

  let destTxt, fromTxt;
  if (frt) {
    destTxt = t.dest ? shortPlace(t.dest) : freightClass(t.headcode);
    fromTxt = t.origin ? 'from ' + shortPlace(t.origin) : freightClass(t.headcode);
  } else {
    destTxt = t.dest ? shortPlace(t.dest) : (t.headcode || '—');
    fromTxt = t.origin ? 'from ' + shortPlace(t.origin) : '';
  }
  destTxt = t.cancelled ? '<span class="cancelled">' + esc(destTxt) + '</span>' : esc(destTxt);

  let liveHtml = '';
  if (t.td_dist_mi != null && t.td_berth_age < 150 && !t.twy_actual) {
    const mi = Math.abs(t.td_dist_mi);
    const pl = placeName(t.td_place);
    liveHtml = '<span class="livepos">' + (mi < 0.4 ? 'passing now' : (pl ? esc(pl) + ' · ' : '') + mi.toFixed(1) + ' mi') + '</span>';
  }
  const stock = (t.stock_type && !frt) ? t.stock_type : '';
  const veh = (t.num_veh && !frt) ? t.num_veh + ' coaches' : '';

  // Live position goes right after the operator badge, not at the end — on
  // this page's narrower columns the sub-line routinely doesn't have room
  // for everything, and "where it actually is right now" is the one piece
  // of dynamic information worth protecting from being clipped off first.
  // Headcode goes last: least useful for an at-a-glance kitchen display.
  main.innerHTML =
    '<div class="t-dest">' + destTxt + '</div>' +
    '<div class="t-sub">' +
      '<span class="op" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.name) + '</span>' +
      liveHtml +
      (fromTxt ? '<span>' + esc(fromTxt) + '</span>' : '') +
      (stock ? '<span>' + esc(stock) + '</span>' : '') +
      (veh ? '<span>' + veh + '</span>' : '') +
      '<span class="hc">' + esc(t.headcode || '') + '</span>' +
    '</div>';
  fitText(main.querySelector('.t-dest'));

  let countHtml, countCls = '', passing = false;
  if (t.cancelled) { countHtml = 'CANC'; countCls = 'gone'; }
  else if (t.at_station) { countHtml = 'AT STN'; countCls = 'stn'; }
  else if (t.held) { countHtml = 'HELD'; countCls = 'held'; }
  else if (diff <= 25000 && diff > -45000) { countHtml = 'NOW'; countCls = 'now'; passing = true; }
  else if (diff <= 0) { countHtml = 'PASSED'; countCls = 'gone'; }
  else if (diff < 90000) { countHtml = Math.max(1, Math.round(diff / 1000)) + '<span class="unit">sec</span>'; }
  else { countHtml = Math.round(diff / 60000) + '<span class="unit">min</span>'; }
  row.classList.toggle('passing', passing);

  let statusHtml;
  if (t.cancelled) statusHtml = '<span class="cancel">cancelled</span>';
  else {
    const bits = [fmtHM(ms)];
    if (!t.twy_actual) {
      if (t.late_min == null) bits.push('<span class="est">estimated</span>');
      else if (t.late_min >= 1) bits.push('<span class="late">+' + t.late_min + ' min</span>');
      else bits.push('<span class="ontime">on time</span>');
    }
    statusHtml = bits.join(' · ');
  }
  eta.innerHTML = '<div class="t-count ' + countCls + '">' + countHtml + '</div><div class="t-status">' + statusHtml + '</div>';
}

/* Build the 4 track rows once */
(function buildTracks() {
  const wrap = document.getElementById('rail-content');
  wrap.innerHTML = KEYS.map(k => {
    const m = LINE_META[k];
    return '<section class="track" data-ln="' + m.ln + '" id="row-' + k + '">' +
      '<div class="t-id"><div class="arrow">' + m.arrow + '</div><div class="name">' + m.name + '</div></div>' +
      '<div class="t-main" id="main-' + k + '"></div>' +
      '<div class="t-eta" id="eta-' + k + '"></div>' +
    '</section>';
  }).join('');
})();

/* ═══════════════════════════════════════════════════════════════
   Boot
   ═══════════════════════════════════════════════════════════════ */
fetchAircraft();
fetchTrains();
fetchNrcc();
setInterval(fetchAircraft, 20000);
setInterval(fetchTrains, 15000);
setInterval(fetchNrcc, 300000);
setInterval(tick, 1000);
tick();
</script>
</body>
</html>
