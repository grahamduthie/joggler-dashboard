<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trains — Twyford</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   TWYFORD TRACKBOARD — kitchen monitor, read-across-the-room
   Four rows = the four running lines, in physical order from the house:
   Up Relief (nearest) · Down Relief · Up Main · Down Main (farthest).
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:        #07090d;
  --bg-row:    #0a0d13;
  --bg-row-2:  #090c11;
  --rule:      #161c26;
  --text:      #edf1f6;
  --text-dim:  #8b99ab;
  --text-faint:#3d4a5c;
  --amber:     #ffb000;
  --ontime:    #46c97e;
  --late:      #ff9f43;
  --cancel:    #ff5f56;
  --live:      #35d07f;
  --relief:    #3fb7c4;
  --main-ln:   #6f9fd8;
  --cond: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --body: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  overflow: hidden;
}
@media (hover: hover) and (pointer: fine) { body.hidecursor * { cursor: none; } }

body {
  display: flex; flex-direction: column;
  /* faint vertical grain so black isn't dead flat */
  background-image:
    linear-gradient(180deg, rgba(255,176,0,0.025) 0%, rgba(0,0,0,0) 8%),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.006) 0 1px, transparent 1px 7px);
}

/* ── Header ─────────────────────────────────────────────── */
header {
  flex: 0 0 auto;
  display: flex; align-items: baseline; gap: 2.2vw;
  padding: 1.1vh 2vw 0.9vh;
  border-bottom: 1px solid var(--rule);
}
#back {
  font-family: var(--cond); font-weight: 600;
  font-size: clamp(14px, 2.4vh, 26px);
  color: var(--text-faint); text-decoration: none;
  letter-spacing: 0.04em; align-self: center;
}
#back:active, #back:hover { color: var(--text-dim); }
#title {
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(20px, 4.4vh, 46px);
  letter-spacing: 0.10em;
  color: var(--amber);
  line-height: 1;
}
#title small {
  font-weight: 500; color: var(--text-dim); letter-spacing: 0.14em;
  font-size: 0.52em; margin-left: 1vw;
}
#spacer { flex: 1; }
#stale {
  font-family: var(--cond); font-weight: 600; letter-spacing: .1em;
  font-size: clamp(11px, 2vh, 20px); color: var(--cancel);
  visibility: hidden;
}
#clock {
  font-family: var(--mono); font-weight: 500;
  font-size: clamp(20px, 4.2vh, 44px);
  font-variant-numeric: tabular-nums;
  color: var(--text); line-height: 1;
}
#clock .sec { color: var(--text-faint); font-size: 0.62em; }

/* ── Board ──────────────────────────────────────────────── */
main {
  flex: 1 1 auto; min-height: 0;
  display: grid;
  grid-template-rows: repeat(4, 1fr);
}
.track {
  position: relative;
  display: grid;
  grid-template-columns: clamp(84px, 11vw, 170px) 1fr auto;
  align-items: stretch;
  gap: 0 1.6vw;
  padding: 0 2vw 0 0;
  border-bottom: 1px solid var(--rule);
  background: var(--bg-row);
  overflow: hidden;
}
.track:nth-child(even) { background: var(--bg-row-2); }
.track:last-child { border-bottom: none; }

/* operator colour spine */
.track::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: clamp(4px, 0.5vw, 8px);
  background: var(--spine, var(--text-faint));
  opacity: 0.95;
  transition: background .6s;
}

/* passing sweep */
@keyframes sweep {
  0%   { transform: translateX(-100%); opacity: 0.5; }
  100% { transform: translateX(120%);  opacity: 0; }
}
.track.passing::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(100deg, transparent 20%, rgba(255,176,0,0.14) 48%, transparent 76%);
  animation: sweep 2.4s linear infinite;
  pointer-events: none;
}

/* track identity column */
.t-id {
  display: flex; flex-direction: column; justify-content: center;
  padding-left: clamp(12px, 1.6vw, 26px);
  border-right: 1px solid var(--rule);
  gap: 0.4vh;
}
.t-id .arrow {
  font-family: var(--cond); font-weight: 700; line-height: 0.8;
  font-size: clamp(18px, 3.6vh, 40px);
  color: var(--ln-color);
}
.t-id .name {
  font-family: var(--cond); font-weight: 600;
  font-size: clamp(15px, 2.9vh, 32px);
  line-height: 0.95;
  letter-spacing: 0.09em;
  color: var(--ln-color);
}
.t-id .dirword {
  font-family: var(--body); font-weight: 400;
  font-size: clamp(9px, 1.5vh, 16px);
  letter-spacing: 0.06em;
  color: var(--text-faint);
}
.track[data-ln="relief"] { --ln-color: var(--relief); }
.track[data-ln="main"]   { --ln-color: var(--main-ln); }

/* main info column */
.t-main {
  min-width: 0;
  display: flex; flex-direction: column; justify-content: center;
  gap: 0.5vh;
  padding: 0.8vh 0;
}
.t-dest {
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(26px, 8.4vh, 96px);
  line-height: 0.92;
  letter-spacing: 0.015em;
  text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-dest .cancelled { text-decoration: line-through; color: var(--cancel); }
.t-sub {
  display: flex; align-items: baseline; gap: 1.1vw;
  font-size: clamp(12px, 2.6vh, 28px);
  color: var(--text-dim);
  white-space: nowrap; overflow: hidden;
}
.t-sub .op {
  font-family: var(--cond); font-weight: 600; letter-spacing: 0.05em;
  padding: 0.1em 0.5em;
  border-radius: 0.25em;
  font-size: 0.82em;
  transform: translateY(-0.08em);
}
.t-sub .hc { font-family: var(--mono); font-size: 0.78em; color: var(--text-faint); }
.t-sub .livepos { color: var(--live); }
.t-sub .livepos::before { content: '● '; font-size: 0.7em; }
.t-next {
  font-size: clamp(10px, 2vh, 21px);
  color: var(--text-faint);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
}
.t-next b { color: var(--text-dim); font-weight: 500; }
.t-next .sep { margin: 0 0.5em; color: var(--rule); }

/* countdown column */
.t-eta {
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  gap: 0.2vh;
  min-width: clamp(120px, 15vw, 300px);
}
.t-count {
  font-family: var(--cond); font-weight: 700;
  font-size: clamp(38px, 12.5vh, 150px);
  line-height: 0.85;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
  color: var(--text);
  display: flex; align-items: baseline; gap: 0.12em;
}
.t-count .unit {
  font-size: 0.32em; font-weight: 600; color: var(--text-dim);
  letter-spacing: 0.06em;
}
.t-count.now    { color: var(--amber); }
.t-count.stn,
.t-count.held   { color: var(--late); font-size: clamp(28px, 7.5vh, 92px); }
.t-count.gone   { color: var(--text-faint); font-size: clamp(24px, 6vh, 72px); }
@keyframes pulse { 50% { opacity: 0.55; } }
.t-count.now { animation: pulse 1.2s ease-in-out infinite; }
.t-status {
  font-size: clamp(11px, 2.2vh, 24px);
  font-variant-numeric: tabular-nums;
  color: var(--text-dim);
}
.t-status .ontime { color: var(--ontime); }
.t-status .late   { color: var(--late); }
.t-status .cancel { color: var(--cancel); }
.t-status .est    { color: var(--text-faint); }

/* empty state */
.t-empty {
  grid-column: 2 / 4;
  display: flex; align-items: center;
  font-family: var(--cond); font-weight: 500;
  font-size: clamp(16px, 3.4vh, 38px);
  letter-spacing: 0.12em;
  color: var(--text-faint);
}

/* ── Alert strip ────────────────────────────────────────── */
#alert {
  flex: 0 0 auto;
  display: none;
  align-items: center; gap: 1vw;
  padding: 0.8vh 2vw;
  background: #241503;
  border-top: 1px solid #4a3005;
  color: var(--amber);
  font-size: clamp(11px, 2.2vh, 22px);
  white-space: nowrap; overflow: hidden;
}
#alert.show { display: flex; }
#alert .tag {
  font-family: var(--cond); font-weight: 700; letter-spacing: 0.1em;
  flex-shrink: 0;
}
#alert .msg { overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<header>
  <a id="back" href="/" onmousedown="window.location.href='/'">←</a>
  <div id="title">TWYFORD <small>GREAT WESTERN MAIN LINE</small></div>
  <div id="spacer"></div>
  <div id="stale">NO DATA</div>
  <div id="clock">--:--<span class="sec">--</span></div>
</header>

<main id="board">
  <section class="track" data-key="ur" data-ln="relief" id="row-ur">
    <div class="t-id"><div class="arrow">→</div><div class="name">UP RELIEF</div><div class="dirword">to London</div></div>
    <div class="t-main" id="main-ur"></div>
    <div class="t-eta" id="eta-ur"></div>
  </section>
  <section class="track" data-key="dr" data-ln="relief" id="row-dr">
    <div class="t-id"><div class="arrow">←</div><div class="name">DOWN RELIEF</div><div class="dirword">from London</div></div>
    <div class="t-main" id="main-dr"></div>
    <div class="t-eta" id="eta-dr"></div>
  </section>
  <section class="track" data-key="um" data-ln="main" id="row-um">
    <div class="t-id"><div class="arrow">→</div><div class="name">UP MAIN</div><div class="dirword">to London · fast</div></div>
    <div class="t-main" id="main-um"></div>
    <div class="t-eta" id="eta-um"></div>
  </section>
  <section class="track" data-key="dm" data-ln="main" id="row-dm">
    <div class="t-id"><div class="arrow">←</div><div class="name">DOWN MAIN</div><div class="dirword">from London · fast</div></div>
    <div class="t-main" id="main-dm"></div>
    <div class="t-eta" id="eta-dm"></div>
  </section>
</main>

<div id="alert"><span class="tag">⚠ DISRUPTION</span><span class="msg" id="alert-msg"></span></div>

<script>
'use strict';

/* ── Operator branding (brightened for dark bg) ─────────── */
const OPS = {
  GW: {bg:'#0b9d6c', fg:'#04160f', name:'GWR'},
  XR: {bg:'#9d7fd8', fg:'#120a20', name:'Elizabeth line'},
  XC: {bg:'#e05570', fg:'#1d060b', name:'CrossCountry'},
  HX: {bg:'#8a5fd6', fg:'#12081f', name:'Heathrow Exp'},
  AW: {bg:'#c05fc0', fg:'#1a061a', name:'TfW'},
  GB: {bg:'#f0a835', fg:'#1d1403', name:'GBRf'},
  DW: {bg:'#f04a4a', fg:'#1c0505', name:'DB Cargo'},
  FL: {bg:'#4fae62', fg:'#07130a', name:'Freightliner'},
  ZZ: {bg:'#f07b3c', fg:'#1a0a02', name:'Colas'},
  ZN: {bg:'#e8c34a', fg:'#171102', name:'Network Rail'},
};
function opInfo(t) {
  const o = OPS[t.op_code];
  if (o) return o;
  if (t.passenger === false || isFreightHc(t.headcode))
    return {bg:'#7d8f4a', fg:'#111504', name:'Freight'};
  return {bg:'#3c4c60', fg:'#dfe7f0', name: t.op_name || t.op_code || ''};
}
function isFreightHc(hc) { return hc && '45678'.indexOf(hc[0]) >= 0; }
function freightClass(hc) {
  const c = hc ? hc[0] : '';
  return c === '4' ? 'Freight · intermodal'
       : c === '6' ? 'Freight · heavy haul'
       : c === '7' ? 'Freight'
       : c === '8' ? 'Light engine'
       : c === '5' ? 'Empty stock' : 'Freight';
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Place shortening ───────────────────────────────────── */
function shortPlace(name) {
  if (!name) return '';
  return String(name)
    .replace('London Paddington', 'Paddington')
    .replace(' Temple Meads', '')
    .replace(' Foregate Street', '').replace(' Shrub Hill', '')
    .replace(' St Davids', '')
    .replace('Heathrow Terminals 1-3', 'Heathrow T2/3')
    .replace('Heathrow Terminal ', 'Heathrow T')
    .replace('-super-Mare', '')
    .replace(' International', ' Intl');
}
const STANME = {
  MAIDENHED:'Maidenhead', MDNHDMIDS:'Maidenhead', 'MDNHD CS':'Maidenhead',
  TWYFORD:'Twyford', READNG:'Reading', READGWEST:'Reading West',
  READWTORJ:'Reading', RDGSPURJN:'Reading', TILEHURST:'Tilehurst',
  PANGBORNE:'Pangbourne', 'GORING&ST':'Goring', CHOLSEY:'Cholsey',
  SLOUGH:'Slough', BURNHAM:'Burnham', TAPLOW:'Taplow', LANGLEY:'Langley',
  IVER:'Iver', 'W DRAYTON':'West Drayton', 'HAYES&HAR':'Hayes',
  SOUTHALL:'Southall', HANWELL:'Hanwell', AIRPORTJN:'Airport Jn',
  STOCKLYJN:'Stockley Jn', HENLEYONT:'Henley', 'KEN BG LP':'Kennet Bridge',
  'KEN BG JN':'Kennet Bridge',
};
function placeName(s) {
  if (!s) return '';
  if (STANME[s]) return STANME[s];
  if (s.indexOf('LHR') === 0) return 'Heathrow';
  return s.charAt(0) + s.slice(1).toLowerCase();
}

/* ── Time helpers ───────────────────────────────────────── */
function trainMs(t) {
  if (t.house_pass_ts) return t.house_pass_ts * 1000;
  if (!t.twy_sched) return 0;
  let ms = new Date(t.twy_sched).getTime();
  if (!t.twy_actual && t.late_min > 0) ms += t.late_min * 60000;
  return ms;
}
function fmtHM(msOrIso) {
  const d = new Date(msOrIso);
  return isNaN(d) ? '—'
    : d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

/* ── State ──────────────────────────────────────────────── */
let trains = [];
let lastFetch = 0;
let nrccMsgs = [];

function fetchTrains() {
  fetch('/api/trains').then(r => r.json()).then(d => {
    trains = d.trains || [];
    lastFetch = Date.now();
    render();
  }).catch(() => {});
}
function fetchNrcc() {
  fetch('/api/nrcc').then(r => r.json()).then(d => {
    nrccMsgs = d.messages || [];
    renderAlert();
  }).catch(() => {});
}

/* ── Per-track selection ────────────────────────────────── */
function trackKey(t) {
  if (!t.direction || !t.track) return null;
  return (t.direction === 'up' ? 'u' : 'd') + (t.track === 'Main' ? 'm' : 'r');
}
/* grace: how long a train stays "current" after its pass moment */
function graceMs(t) {
  if (t.twy_actual) return t.direction === 'up' ? 45000 : 20000;
  return 100000;
}

/* ── Rendering ──────────────────────────────────────────── */
const KEYS = ['ur', 'dr', 'um', 'dm'];

function render() {
  const now = Date.now();
  const byKey = {ur:[], dr:[], um:[], dm:[]};
  for (const t of trains) {
    const k = trackKey(t);
    if (!k || !byKey[k]) continue;
    const ms = trainMs(t);
    if (!ms || ms > now + 65 * 60000) continue;
    if (ms < now - 150000) continue;
    byKey[k].push(t);
  }
  for (const k of KEYS) {
    byKey[k].sort((a, b) => trainMs(a) - trainMs(b));
    renderTrack(k, byKey[k], now);
  }
  document.getElementById('stale').style.visibility =
    (now - lastFetch > 60000) ? 'visible' : 'hidden';
}

function renderTrack(key, list, now) {
  const row  = document.getElementById('row-' + key);
  const main = document.getElementById('main-' + key);
  const eta  = document.getElementById('eta-' + key);

  /* headline: first non-cancelled still within its grace window */
  const live = list.filter(t => !t.cancelled);
  let t = null;
  for (const c of live) {
    if (trainMs(c) >= now - graceMs(c)) { t = c; break; }
  }
  if (!t) {
    row.style.setProperty('--spine', 'var(--text-faint)');
    row.classList.remove('passing');
    main.innerHTML = '<div class="t-empty">NO TRAIN DUE</div>';
    eta.innerHTML = '';
    return;
  }

  const op   = opInfo(t);
  const ms   = trainMs(t);
  const diff = ms - now;
  const frt  = t.passenger === false || isFreightHc(t.headcode);

  row.style.setProperty('--spine', op.bg);

  /* destination + origin */
  let destTxt, fromTxt;
  if (frt) {
    destTxt = t.dest ? shortPlace(t.dest) : freightClass(t.headcode);
    fromTxt = t.origin ? 'from ' + shortPlace(t.origin) : freightClass(t.headcode);
  } else {
    destTxt = t.dest ? shortPlace(t.dest) : (t.headcode || '—');
    fromTxt = t.origin ? 'from ' + shortPlace(t.origin) : '';
  }
  if (t.cancelled) destTxt = '<span class="cancelled">' + esc(destTxt) + '</span>';
  else destTxt = esc(destTxt);

  /* live position */
  let liveHtml = '';
  if (t.td_dist_mi != null && t.td_berth_age < 150 && !t.twy_actual) {
    const mi = Math.abs(t.td_dist_mi);
    const pl = placeName(t.td_place);
    liveHtml = '<span class="livepos">' +
      (mi < 0.4 ? 'passing now' : (pl ? esc(pl) + ' · ' : '') + mi.toFixed(1) + ' mi') +
      '</span>';
  }

  const veh = (t.num_veh && !frt) ? t.num_veh + ' coaches' : '';
  const stopTxt = t.call_type === 'STOP' ? 'calls at Twyford' : '';

  /* follow-on trains */
  const nexts = live.slice(live.indexOf(t) + 1, live.indexOf(t) + 3);
  let nextHtml = '';
  if (nexts.length) {
    nextHtml = 'then ' + nexts.map(n => {
      const nd = n.passenger === false || isFreightHc(n.headcode)
        ? (n.dest ? shortPlace(n.dest) : freightClass(n.headcode))
        : shortPlace(n.dest || n.headcode);
      return '<b>' + fmtHM(trainMs(n)) + '</b>&nbsp;' + esc(nd);
    }).join('<span class="sep">|</span>');
  }

  main.innerHTML =
    '<div class="t-dest">' + destTxt + '</div>' +
    '<div class="t-sub">' +
      '<span class="op" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.name) + '</span>' +
      (fromTxt ? '<span>' + esc(fromTxt) + '</span>' : '') +
      (stopTxt ? '<span>' + stopTxt + '</span>' : '') +
      (veh ? '<span>' + veh + '</span>' : '') +
      liveHtml +
      '<span class="hc">' + esc(t.headcode || '') + '</span>' +
    '</div>' +
    (nextHtml ? '<div class="t-next">' + nextHtml + '</div>' : '');

  /* countdown + status */
  let countHtml, countCls = '', passing = false;
  if (t.cancelled) {
    countHtml = 'CANC'; countCls = 'gone';
  } else if (t.at_station) {
    countHtml = 'AT STATION'; countCls = 'stn';
  } else if (t.held) {
    countHtml = 'HELD'; countCls = 'held';
  } else if (diff <= 25000 && diff > -45000) {
    countHtml = 'NOW'; countCls = 'now'; passing = true;
  } else if (diff <= 0) {
    countHtml = 'PASSED'; countCls = 'gone';
  } else if (diff < 90000) {
    countHtml = Math.max(1, Math.round(diff / 1000)) + '<span class="unit">sec</span>';
  } else {
    countHtml = Math.round(diff / 60000) + '<span class="unit">min</span>';
  }
  row.classList.toggle('passing', passing);

  let statusHtml;
  if (t.cancelled) {
    statusHtml = '<span class="cancel">cancelled</span>';
  } else {
    const bits = [];
    bits.push(fmtHM(ms));
    if (t.twy_actual) { /* confirmed */ }
    else if (t.late_min == null) bits.push('<span class="est">estimated</span>');
    else if (t.late_min >= 1) bits.push('<span class="late">+' + t.late_min + ' min</span>');
    else bits.push('<span class="ontime">on time</span>');
    statusHtml = bits.join(' · ');
  }
  eta.innerHTML =
    '<div class="t-count ' + countCls + '">' + countHtml + '</div>' +
    '<div class="t-status">' + statusHtml + '</div>';
}

/* ── Alert strip ────────────────────────────────────────── */
function renderAlert() {
  const el = document.getElementById('alert');
  if (!nrccMsgs.length) { el.classList.remove('show'); return; }
  const msg = String(nrccMsgs[0]).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  document.getElementById('alert-msg').textContent = msg;
  el.classList.add('show');
}

/* ── Clock ──────────────────────────────────────────────── */
function tick() {
  const d = new Date();
  document.getElementById('clock').innerHTML =
    d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) +
    '<span class="sec">' + String(d.getSeconds()).padStart(2, '0') + '</span>';
  render();
}

/* ── Boot ───────────────────────────────────────────────── */
document.body.classList.add('hidecursor');
fetchTrains();
fetchNrcc();
setInterval(fetchTrains, 15000);
setInterval(fetchNrcc, 300000);
setInterval(tick, 1000);
tick();
</script>
</body>
</html>
