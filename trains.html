<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trains — Twyford</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: #0d1b2a;
  color: #e8eaf0;
  font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}
@media (hover: hover) and (pointer: fine) { * { cursor: none; } }

/* ── NRCC disruption banner ─────────────────────────────── */
#nrcc-banner {
  display: none;
  background: #1a0a00;
  border-bottom: 2px solid #7a4000;
  padding: 5px 36px 5px 14px;
  font-size: clamp(10px, 1.3vw, 16px);
  color: #e0a040;
  position: relative;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#nrcc-close {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: #7a4000; cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px;
}
#nrcc-close:hover { color: #e0a040; }

/* ── Top bar ─────────────────────────────────────────────── */
#topbar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111e2e;
  border-bottom: 2px solid #1e3a5a;
  padding: 0 20px;
  flex-shrink: 0;
}
#back-btn {
  font-size: clamp(14px, 2vw, 26px);
  font-weight: bold;
  color: #7fb3d3;
  cursor: pointer;
  letter-spacing: 0.5px;
}
#back-btn:hover, #back-btn:active { color: #ffffff; }
#mode-btns {
  display: flex;
  gap: 6px;
}
.mode-btn {
  padding: 5px 16px;
  border-radius: 20px;
  font-size: clamp(12px, 1.6vw, 22px);
  font-weight: bold;
  letter-spacing: 1px;
  color: #5a8fad;
  border: 1.5px solid #1e3a5a;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.1s;
}
.mode-btn:hover { background: rgba(30,58,90,0.5); color: #a0c8e8; }
.mode-btn.active { background: #1e3a5a; color: #ffffff; border-color: #4a7aaa; }
#updated {
  font-size: clamp(11px, 1.3vw, 18px);
  color: #4a7a9a;
  text-align: right;
}

/* ── Page layout ─────────────────────────────────────────── */
#page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px - 32px);
  overflow: hidden;
}

/* ── No-data / error state ───────────────────────────────── */
#no-data {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(16px, 2.5vw, 36px);
  color: #4a7a9a;
  font-style: italic;
}

/* ── Focus view ──────────────────────────────────────────── */
#focus-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header: operator colour band */
.fv-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: clamp(10px, 2vw, 28px);
  padding: clamp(10px, 2vh, 20px) clamp(14px, 2.5vw, 32px);
  border-bottom: 2px solid rgba(255,255,255,0.12);
}
.fv-op-badge {
  flex-shrink: 0;
  width: clamp(56px, 9vw, 120px);
  height: clamp(56px, 9vw, 120px);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(18px, 3.5vw, 52px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
}
.fv-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.fv-headcode {
  font-size: clamp(34px, 8vw, 110px);
  font-weight: bold;
  line-height: 1;
  font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
}
.fv-op-name {
  font-size: clamp(16px, 3vw, 44px);
  opacity: 0.85;
}
.fv-right {
  flex-shrink: 0;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: clamp(3px, 0.8vh, 10px);
}
.fv-track-badge {
  font-size: clamp(12px, 2vw, 28px);
  font-weight: bold;
  letter-spacing: 1px;
  padding: 4px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.3);
  white-space: nowrap;
}
.fv-call-badge {
  font-size: clamp(11px, 1.6vw, 22px);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.7;
  white-space: nowrap;
}
.badge-stop  { color: #7fd3a8; border-color: #3a8a60; }
.badge-pass  { color: #f0b85a; border-color: #a07030; }
.badge-est   { color: #a0c0e0; border-color: #3a6080; }

/* Route section */
.fv-route {
  flex: 1;
  min-height: 0;
  padding: clamp(8px, 2vh, 24px) clamp(14px, 3vw, 40px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-bottom: 2px solid #1e3a5a;
}
.fv-route-station {
  font-size: clamp(14px, 3.5vw, 50px);
  font-weight: bold;
  color: #e8eaf0;
  line-height: 1.2;
}
.fv-route-station.twyford {
  color: #ffd080;
  font-size: clamp(16px, 4.5vw, 64px);
}
.fv-route-time {
  font-size: clamp(12px, 2vw, 30px);
  color: #7fb3d3;
  margin-top: 2px;
  margin-bottom: 2px;
}
.fv-route-arrow {
  font-size: clamp(11px, 1.6vw, 22px);
  color: #3a6a8a;
  padding: clamp(2px, 0.5vh, 6px) 0;
}
.fv-route-late {
  color: #f0a060;
}
.fv-route-ontime {
  color: #7fd3a8;
}
.fv-route-est {
  color: #a0c0e0;
  font-style: italic;
}

/* Stats row */
.fv-stats {
  flex-shrink: 0;
  display: flex;
  border-top: 0;
}
.fv-stat-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #1e3a5a;
  padding: clamp(8px, 1.5vh, 20px) clamp(6px, 1vw, 16px);
  gap: clamp(3px, 0.6vh, 8px);
}
.fv-stat-card:last-child { border-right: none; }
.fv-stat-label {
  font-size: clamp(10px, 1.3vw, 18px);
  color: #4a7a9a;
  text-transform: uppercase;
  letter-spacing: 2.5px;
}
.fv-stat-value {
  font-size: clamp(22px, 3.8vw, 56px);
  font-weight: bold;
  color: #ffffff;
  line-height: 1;
  font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
}
.fv-stat-unit {
  font-size: clamp(11px, 1.4vw, 20px);
  color: #5a8fad;
}
.stat-late    { color: #f0a060; }
.stat-ontime  { color: #7fd3a8; }
.stat-est     { color: #a0c0e0; }
.stat-cancel  { color: #e05050; }

/* ── Multi-train view ────────────────────────────────────── */
#multi-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.mvc-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  border-bottom: 2px solid #1e3a5a;
}
.mvc-card:last-child { border-bottom: none; }

/* Header — mirrors fv-header but smaller */
.mvc-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: clamp(8px, 1.5vw, 20px);
  padding: clamp(5px, 1vh, 12px) clamp(12px, 2vw, 28px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.mvc-op-badge {
  flex-shrink: 0;
  width: clamp(36px, 5.5vw, 74px);
  height: clamp(36px, 5.5vw, 74px);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(12px, 2.4vw, 32px);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
}
.mvc-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.mvc-headcode {
  font-size: clamp(22px, 5vw, 68px);
  font-weight: bold;
  font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
  line-height: 1;
}
.mvc-op-name {
  font-size: clamp(11px, 1.9vw, 26px);
  opacity: 0.85;
}
.mvc-right {
  flex-shrink: 0;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: clamp(2px, 0.4vh, 6px);
}
.mvc-track-badge {
  font-size: clamp(10px, 1.4vw, 18px);
  font-weight: bold;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.3);
  white-space: nowrap;
}
.mvc-call-badge {
  font-size: clamp(9px, 1.1vw, 15px);
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.7;
  white-space: nowrap;
}
.mvc-countdown {
  font-size: clamp(9px, 1.1vw, 14px);
  color: #a0c8e8;
  font-style: italic;
  white-space: nowrap;
}

/* Route — horizontal */
.mvc-route {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  padding: clamp(3px, 0.8vh, 10px) clamp(12px, 2vw, 28px);
  gap: clamp(6px, 1vw, 14px);
  border-bottom: 1px solid #1e3a5a;
  overflow: hidden;
}
.mvc-route-ep {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.mvc-route-ep-right { align-items: flex-end; text-align: right; }
.mvc-ep-name {
  font-size: clamp(11px, 2vw, 26px);
  font-weight: bold;
  color: #e8eaf0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.mvc-ep-time {
  font-size: clamp(9px, 1.2vw, 16px);
  color: #7fb3d3;
  white-space: nowrap;
}
.mvc-route-arrow {
  flex-shrink: 0;
  font-size: clamp(14px, 2.5vw, 32px);
  color: #3a6a8a;
}
.mvc-route-twy {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.mvc-twy-name {
  font-size: clamp(13px, 2.4vw, 32px);
  font-weight: bold;
  color: #ffd080;
}
.mvc-twy-time {
  font-size: clamp(10px, 1.4vw, 19px);
  color: #7fb3d3;
  text-align: center;
  white-space: nowrap;
}

/* Stats — mirrors fv-stats but smaller */
.mvc-stats {
  flex-shrink: 0;
  display: flex;
}
.mvc-stat-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #1e3a5a;
  padding: clamp(4px, 0.8vh, 10px) clamp(4px, 0.8vw, 10px);
  gap: clamp(1px, 0.3vh, 4px);
}
.mvc-stat-card:last-child { border-right: none; }
.mvc-stat-label {
  font-size: clamp(8px, 1vw, 13px);
  color: #4a7a9a;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.mvc-stat-value {
  font-size: clamp(14px, 2.5vw, 34px);
  font-weight: bold;
  color: #ffffff;
  line-height: 1;
  font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
}

/* ── List view ────────────────────────────────────────────── */
#list-view {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
#train-table {
  width: 100%;
  border-collapse: collapse;
}
#train-table thead th {
  position: sticky;
  top: 0;
  background: #111e2e;
  border-bottom: 2px solid #1e3a5a;
  font-size: clamp(9px, 1.2vw, 16px);
  color: #4a7a9a;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 10px;
  text-align: left;
  font-weight: normal;
}
.tr-row {
  border-bottom: 1px solid #131f2f;
  cursor: pointer;
}
.tr-row:hover   { background: rgba(30,58,90,0.35); }
.tr-row:active  { background: rgba(30,58,90,0.65); }
.tr-row.past    { opacity: 0.45; }
.tr-row td {
  padding: clamp(7px, 1.2vh, 14px) 10px;
  font-size: clamp(12px, 1.6vw, 22px);
  vertical-align: middle;
}
.tr-time { font-family: 'DejaVu Sans Mono', 'Courier New', monospace; white-space: nowrap; }
.tr-late { color: #f0a060; }
.tr-ontime { color: #7fd3a8; }
.tr-est { color: #a0c0e0; font-style: italic; }
.tr-hc { font-family: 'DejaVu Sans Mono', 'Courier New', monospace; font-size: clamp(10px, 1.4vw, 18px); color: #7fb3d3; }
.tr-op {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: clamp(10px, 1.3vw, 17px);
  font-weight: bold;
  white-space: nowrap;
}
.tr-route { color: #c0ccd8; font-size: clamp(11px, 1.5vw, 20px); }
.tr-track { font-size: clamp(10px, 1.3vw, 16px); color: #5a8fad; white-space: nowrap; }
.tr-status { font-size: clamp(10px, 1.2vw, 15px); white-space: nowrap; }
.tr-cancel { color: #e05050; }

.fv-countdown {
  font-size: clamp(11px, 1.5vw, 20px);
  color: #a0c8e8;
  letter-spacing: 0.5px;
  white-space: nowrap;
  font-style: italic;
}

/* ── Approach bar ────────────────────────────────────────── */
#approach-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  background: #081620;
  border-top: 1px solid #1a3a5a;
  display: flex;
  align-items: center;
  padding: 0 40px 0 36px;
  z-index: 10;
}
#appr-track {
  flex: 1;
  position: relative;
  height: 18px;
  background: #0d2030;
  border-radius: 3px;
  border: 1px solid #1a3a5a;
}
.appr-mark {
  position: absolute;
  top: 0; bottom: 0; width: 1px;
  background: #2a5a8a66;
}
.appr-lbl {
  position: absolute;
  font-size: 8px;
  color: #3a6a8a;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}
.appr-dot {
  position: absolute;
  height: 14px;
  min-width: 22px;
  padding: 0 3px;
  border-radius: 3px;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: bold;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  pointer-events: none;
}

/* Responsive: Joggler 800×480 */
@media (max-height: 500px) {
  #topbar         { height: 44px; }
  .fv-op-badge    { width: 48px; height: 48px; }
  .fv-headcode    { font-size: clamp(28px, 9vw, 80px); }
  .fv-stat-card   { padding: 6px 4px; gap: 2px; }
}
</style>
</head>
<body>

<div id="nrcc-banner">
  <span id="nrcc-text"></span>
  <span id="nrcc-close" onmousedown="dismissNrcc()">×</span>
</div>
<div id="topbar">
  <div id="back-btn" onmousedown="window.location.href='/'">&#8592; Dashboard</div>
  <div id="mode-btns">
    <div class="mode-btn" id="btn-recent" onmousedown="setMode('recent')">Recent</div>
    <div class="mode-btn active" id="btn-next" onmousedown="setMode('next')">Next</div>
    <div class="mode-btn" id="btn-list" onmousedown="setMode('list')">List</div>
  </div>
  <div id="updated">Loading…</div>
</div>

<div id="page">
  <div id="no-data" style="display:none">No train data</div>
  <div id="focus-view" style="display:none"></div>
  <div id="multi-view" style="display:none"></div>
  <div id="list-view" style="display:none">
    <table id="train-table">
      <thead>
        <tr>
          <th>Sched</th>
          <th>Actual</th>
          <th>HC</th>
          <th>Operator</th>
          <th>From → To</th>
          <th>Track</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="train-tbody"></tbody>
    </table>
  </div>
</div>

<script>
'use strict';

/* ── Operator branding ────────────────────────────────────── */
var OPS = {
  'GW': {bg:'#007a4d', fg:'#ffffff', abbr:'GWR'},
  'XR': {bg:'#7156a5', fg:'#ffffff', abbr:'XR'},
  'XC': {bg:'#a61530', fg:'#ffffff', abbr:'XC'},
  'HX': {bg:'#532885', fg:'#ffffff', abbr:'HX'},
  'AW': {bg:'#8c3b8c', fg:'#ffffff', abbr:'TfW'},
  'EM': {bg:'#334f8d', fg:'#ffffff', abbr:'EMR'},
  'CH': {bg:'#0a4d8c', fg:'#ffffff', abbr:'CHR'},
  'LN': {bg:'#1c3f6e', fg:'#ffffff', abbr:'LNR'},
  'VT': {bg:'#9d1f30', fg:'#ffffff', abbr:'AVT'},
  'GX': {bg:'#f05a24', fg:'#ffffff', abbr:'GTX'},
  // Freight
  'GB': {bg:'#1e3050', fg:'#ffdd00', abbr:'GBRf'},
  'DW': {bg:'#db0a17', fg:'#ffffff', abbr:'DB'},
  'FL': {bg:'#1a6b2a', fg:'#ffffff', abbr:'FLT'},
  'ZZ': {bg:'#f05a24', fg:'#000000', abbr:'CLR'},
  'ZN': {bg:'#d4ac0d', fg:'#000000', abbr:'NRL'},
  'HB': {bg:'#4a4a4a', fg:'#ffffff', abbr:'HNR'},
};

function opStyle(code, isPassenger) {
  if (OPS[code]) return OPS[code];
  if (isPassenger === false) return {bg:'#2d3d1a', fg:'#a0c060', abbr:'FRET'};
  return {bg:'#2a3a4a', fg:'#c0ccd8', abbr: code || '??'};
}

function freightClass(hc) {
  if (!hc) return 'Freight';
  var c = hc[0];
  if (c === '4') return 'Heavy Freight';
  if (c === '6') return 'Intermodal';
  if (c === '7') return 'Freight';
  if (c === '8') return 'Light Loco';
  if (c === '9') return 'Special';
  return 'Freight';
}

function confBadge(t) {
  var td = tdPositions[t.headcode];
  if (td && td.age_s < 120) return '<span style="color:#2a9a50;font-size:clamp(9px,1.1vw,15px)">● live</span>';
  if (t.confirmed && t.twy_actual) return '<span style="color:#5a9a70;font-size:clamp(9px,1.1vw,15px)">✓ TRUST</span>';
  if (t.confirmed) return '<span style="color:#4a7aaa;font-size:clamp(9px,1.1vw,15px)">· RTT</span>';
  return '<span style="color:#8a7020;font-size:clamp(9px,1.1vw,15px)">~ est.</span>';
}

function labelLine(t) {
  // Primary label: destination for passengers, freight class for freight
  var primary = t.passenger === false
    ? freightClass(t.headcode)
    : (t.dest || t.op_name || t.op_code || '—');
  return primary;
}

/* ── State ────────────────────────────────────────────────── */
var currentMode    = 'next';
var trainsData     = null;
var tdPositions    = {};   // headcode → {berth, age_s}
var nrccDismissed  = false;
var pollTimer      = null;
var countdownTimer = null;
var tickTimer      = null;
var nextFetchAt    = 0;   // Date.now() ms when next fetch is due

/* ── Mode switching ──────────────────────────────────────── */
function setMode(mode) {
  currentMode = mode;
  ['recent','next','list'].forEach(function(m) {
    document.getElementById('btn-' + m).classList.toggle('active', m === mode);
  });
  render();
}

/* ── Polling ─────────────────────────────────────────────── */
var POLL_INTERVAL = 15000;  // ms between proxy polls (proxy caches RTT at 30s TTL)

function startPoll() {
  fetchTrains();
  fetchTdLive();
  fetchNrcc();
  pollTimer      = setInterval(fetchTrains, POLL_INTERVAL);
  countdownTimer = setInterval(render, POLL_INTERVAL);
  tickTimer      = setInterval(tickTopbar, 1000);
  setInterval(fetchTdLive, 5000);
  setInterval(fetchNrcc, 300000);   // NRCC every 5 min
}

function fetchTdLive() {
  fetch('/api/td-live')
    .then(function(r){ return r.json(); })
    .then(function(d){
      tdPositions = {};
      (d.positions || []).forEach(function(p){
        if (p.age_s < 300) tdPositions[p.headcode] = {berth:p.berth, age_s:p.age_s};
      });
    })
    .catch(function(){});
}

function fetchNrcc() {
  fetch('/api/nrcc')
    .then(function(r){ return r.json(); })
    .then(function(d){ renderNrcc(d.messages || []); })
    .catch(function(){});
}

function renderNrcc(msgs) {
  var banner = document.getElementById('nrcc-banner');
  if (!msgs.length || nrccDismissed) { banner.style.display = 'none'; return; }
  var msg = msgs[0].replace(/\s+/g, ' ').trim();
  document.getElementById('nrcc-text').textContent = '⚠ ' + msg;
  banner.style.display = 'block';
}

function dismissNrcc() {
  nrccDismissed = true;
  document.getElementById('nrcc-banner').style.display = 'none';
}

function tickTopbar() {
  var secs = Math.max(0, Math.round((nextFetchAt - Date.now()) / 1000));
  var updEl = document.getElementById('updated');
  // Replace just the countdown suffix, keep the HH:MM:SS prefix
  var base = updEl.dataset.base || updEl.textContent;
  updEl.dataset.base = base;
  updEl.textContent = base + '  ·  ' + secs + 's';
}

function fetchTrains() {
  nextFetchAt = Date.now() + POLL_INTERVAL;
  fetch('/api/trains')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      trainsData = d;
      render();
    })
    .catch(function(e) {
      console.error(e);
      var el = document.getElementById('updated');
      el.dataset.base = 'Error';
      el.textContent  = 'Error';
    });
}

/* ── Time helpers ────────────────────────────────────────── */
function trainMs(t) {
  // Prefer backend-computed house pass time (accounts for 15s stop offset + direction)
  if (t.house_pass_ts) return t.house_pass_ts * 1000;
  var iso = t.twy_actual || t.twy_sched;
  if (!iso) return 0;
  var ms = new Date(iso).getTime();
  if (!t.twy_actual && t.late_min) ms += t.late_min * 60000;
  return ms;
}

function fmtTime(isoStr) {
  if (!isoStr) return '—';
  var d = new Date(isoStr);
  if (isNaN(d)) return '—';
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function fmtTimeMs(ms) {
  if (!ms) return '—';
  var d = new Date(ms);
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function trackLabel(t) {
  var arrow = t.direction === 'up' ? '↑' : '↓';
  var dir   = t.direction === 'up' ? 'Up' : 'Down';
  return arrow + ' ' + dir + ' ' + t.track;
}

function lateStr(t) {
  if (t.cancelled) return 'Cancelled';
  if (t.late_min === null || t.late_min === undefined) return '';
  if (t.late_min === 0) return 'On time';
  if (t.late_min > 0)   return '+' + t.late_min + ' min';
  if (t.late_min < 0)   return t.late_min + ' min';
  return '';
}

// Returns a half-minute-resolution countdown string, e.g. "in about 2½ mins".
// Only used for estimated (unconfirmed) trains.
function fmtCountdown(ms, now) {
  var diff = ms - now;
  if (diff < 15000) return 'passing now';
  var slots = Math.round(diff / 30000);  // 1 slot = 30 seconds
  if (slots < 1) return 'passing now';
  var totalSecs = slots * 30;
  var mins = Math.floor(totalSecs / 60);
  var half = (totalSecs % 60) === 30;
  if (mins === 0) return 'in about 30 secs';
  if (half)  return 'in about ' + mins + '½ mins';
  return 'in about ' + mins + ' min' + (mins !== 1 ? 's' : '');
}

/* ── Main render ─────────────────────────────────────────── */
function render() {
  if (!trainsData) return;
  var now = Date.now();

  var ts = trainsData.ts ? new Date(trainsData.ts * 1000) : new Date();
  var baseText = ts.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  var el = document.getElementById('updated');
  el.dataset.base = baseText;
  el.textContent  = baseText;   // tickTopbar() will append the countdown

  var trains = trainsData.trains || [];
  document.getElementById('no-data').style.display = 'none';
  document.getElementById('focus-view').style.display = 'none';
  document.getElementById('multi-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'none';

  if (currentMode === 'list' || currentMode === 'list-detail') {
    if (currentMode === 'list') {
      document.getElementById('list-view').style.display = 'block';
      renderList(trains, now);
    }
  } else {
    var targets = findTarget(trains, currentMode, now);
    if (!targets.length) {
      document.getElementById('no-data').style.display = 'flex';
      document.getElementById('no-data').textContent =
        currentMode === 'recent' ? 'No recent trains in last 10 min' : 'No upcoming trains';
    } else if (targets.length === 1) {
      document.getElementById('focus-view').style.display = 'flex';
      renderFocus(targets[0], now);
    } else {
      document.getElementById('multi-view').style.display = 'flex';
      renderMulti(targets, now);
    }
  }
  renderApproachBar(trains, now);
}

// Returns an array. For 'next' mode: first upcoming train plus any within 90s of it.
// For 'recent' mode: single most-recent train (as array). Empty array = nothing to show.
function findTarget(trains, mode, now) {
  if (mode === 'recent') {
    var cutoff = now - 10 * 60000;
    var past = trains.filter(function(t) {
      var ms = trainMs(t);
      if (ms < cutoff) return false;
      // Use the same grace thresholds as NEXT, but inverted:
      // a train is "past" only once it has cleared its grace window.
      var grace = 120000;
      if (t.confirmed && t.twy_actual) {
        grace = (t.direction === 'up') ? 30000 : 0;
      }
      return ms < now - grace;
    });
    past.sort(function(a, b) { return trainMs(b) - trainMs(a); });
    return past.length ? [past[0]] : [];
  } else {
    var upcoming = trains.filter(function(t) {
      var ms = trainMs(t);
      // Down trains: house is east of Twyford — train passed the house *before*
      //   arriving at Twyford, so once twy_actual is set the train is gone (grace=0).
      // Up trains: train departs Twyford heading east, passes the house ~30s later.
      // Estimated/unconfirmed: keep 2-min grace (schedule is approximate).
      var grace = 120000;
      if (t.confirmed && t.twy_actual) {
        grace = (t.direction === 'up') ? 30000 : 0;
      }
      return ms >= now - grace;
    });
    upcoming.sort(function(a, b) { return trainMs(a) - trainMs(b); });
    if (!upcoming.length) return [];
    var firstMs = trainMs(upcoming[0]);
    // Include all trains within 90s of the first
    return upcoming.filter(function(t) { return trainMs(t) <= firstMs + 90000; });
  }
}

/* ── Focus view ──────────────────────────────────────────── */
function renderFocus(t, now) {
  var op   = opStyle(t.op_code, t.passenger);
  var ms   = trainMs(t);
  var late = lateStr(t);
  var isBadLate = (t.late_min && t.late_min >= 5);
  var isEst = !t.confirmed;
  var isStop = t.call_type === 'STOP';

  var callClass = isStop ? 'badge-stop' : (isEst ? 'badge-est' : 'badge-pass');
  var callText  = isStop ? 'Stops at Twyford'
                : (isEst ? 'Passing through (est.)' : 'Passes Twyford');

  var schedDisp = fmtTime(t.twy_sched);
  var estDisp   = ms ? fmtTimeMs(ms) : schedDisp;
  if (isEst) schedDisp = '~' + schedDisp;

  /* Twyford time display */
  var hasPassed = t.confirmed && t.twy_actual && ms < now;
  var twyTimeHtml;
  if (t.cancelled) {
    twyTimeHtml = '<span class="fv-route-time tr-cancel">Cancelled</span>';
  } else if (isEst) {
    twyTimeHtml = '<span class="fv-route-time fv-route-est">~' + fmtTimeMs(ms) + '</span>';
  } else if (t.twy_actual) {
    var lateClass = isBadLate ? 'fv-route-late' : 'fv-route-ontime';
    var lateNote  = isBadLate ? ' (' + late + ')' : '';
    twyTimeHtml = '<span class="fv-route-time">Sched ' + fmtTime(t.twy_sched) + '</span> ' +
                  '<span class="fv-route-time ' + lateClass + '"> ✓ ' + fmtTime(t.twy_actual) + lateNote + '</span>';
  } else {
    var lateClass2 = isBadLate ? 'fv-route-late' : '';
    twyTimeHtml = '<span class="fv-route-time ' + lateClass2 + '">' + fmtTime(t.twy_sched) +
                  (late && late !== 'On time' ? ' (' + late + ')' : '') + '</span>';
  }

  var platformHtml = (isStop && t.platform)
    ? ' <span style="color:#7fb3d3;font-size:clamp(12px,1.8vw,26px)">Plat ' + esc(t.platform) + '</span>'
    : '';

  /* Stat cards */
  var statLabel  = isEst ? 'Est. Time' : (hasPassed ? 'Passed At' : 'At Twyford');
  var statTime   = isEst ? '~' + fmtTimeMs(ms) : (t.twy_actual ? fmtTime(t.twy_actual) : fmtTime(t.twy_sched));
  var statDelay  = t.cancelled ? '<span class="stat-cancel">Cancelled</span>'
                 : isEst ? '<span class="stat-est">N/A</span>'
                 : (t.late_min === 0 ? '<span class="stat-ontime">On time</span>'
                 : '<span class="stat-late">' + (t.late_min > 0 ? '+' : '') + (t.late_min || '?') + ' min</span>');
  var statTrack  = trackLabel(t);
  var statVeh    = t.num_veh ? t.num_veh + (t.num_veh === 1 ? ' coach' : ' coaches') : '—';

  document.getElementById('focus-view').innerHTML =
    '<div class="fv-header" style="background:linear-gradient(135deg,' + op.bg + '55 0%,' + op.bg + '11 100%); border-bottom: 2px solid ' + op.bg + '88">' +
      '<div class="fv-op-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</div>' +
      '<div class="fv-main">' +
        '<div class="fv-headcode">' + esc(labelLine(t)) + '</div>' +
        '<div class="fv-op-name">' + esc(t.headcode) + ' · ' + esc(t.op_name || op.abbr) + '  ' + confBadge(t) + '</div>' +
      '</div>' +
      '<div class="fv-right">' +
        '<span class="fv-track-badge">' + esc(trackLabel(t)) + '</span>' +
        '<span class="fv-call-badge ' + callClass + '">' + callText + '</span>' +
        (isEst ? '<span class="fv-countdown">' + esc(fmtCountdown(ms, now)) + '</span>' : '') +
      '</div>' +
    '</div>' +

    '<div class="fv-route">' +
      '<div class="fv-route-station">' + esc(t.passenger === false
        ? (t.direction === 'up' ? '← From west' : '← From London')
        : (t.origin || '—')) + '</div>' +
      (t.orig_dep ? '<div class="fv-route-time">dep ' + fmtTime(t.orig_dep) + '</div>' : '') +
      '<div class="fv-route-arrow">↓</div>' +
      '<div class="fv-route-station twyford">Twyford</div>' +
      '<div>' + twyTimeHtml + platformHtml + '</div>' +
      '<div class="fv-route-arrow">↓</div>' +
      '<div class="fv-route-station">' + esc(t.passenger === false
        ? (t.direction === 'up' ? '→ To London' : '→ To west')
        : (t.dest || '—')) + '</div>' +
      (t.dest_arr ? '<div class="fv-route-time">arr ' + fmtTime(t.dest_arr) + '</div>' : '') +
    '</div>' +

    '<div class="fv-stats">' +
      fvCard(statLabel, statTime, '') +
      fvCard('Delay', statDelay, '', true) +
      fvCard('Track', statTrack, '') +
      fvCard('Vehicles', statVeh, '') +
    '</div>';
}

function fvCard(label, value, unit, rawHtml) {
  return '<div class="fv-stat-card">' +
    '<div class="fv-stat-label">' + esc(label) + '</div>' +
    '<div class="fv-stat-value">' + (rawHtml ? value : esc(value)) + '</div>' +
    (unit ? '<div class="fv-stat-unit">' + esc(unit) + '</div>' : '') +
    '</div>';
}

/* ── Multi-train view ────────────────────────────────────── */
function renderMulti(targets, now) {
  var html = '';
  targets.forEach(function(t) {
    var op        = opStyle(t.op_code, t.passenger);
    var ms        = trainMs(t);
    var late      = lateStr(t);
    var isEst     = !t.confirmed;
    var isBadLate = (t.late_min && t.late_min >= 5);
    var hasPassed = t.confirmed && t.twy_actual && ms < now;
    var isStop    = t.call_type === 'STOP';

    var callClass = isStop ? 'badge-stop' : (isEst ? 'badge-est' : 'badge-pass');
    var callText  = isStop ? 'Stops at Twyford'
                  : (isEst ? 'Passing through (est.)' : 'Passes Twyford');

    // Twyford time — same logic as renderFocus
    var twyTimeHtml;
    if (t.cancelled) {
      twyTimeHtml = '<span class="stat-cancel">Cancelled</span>';
    } else if (isEst) {
      twyTimeHtml = '<span class="stat-est">~' + esc(fmtTimeMs(ms)) + '</span>';
    } else if (t.twy_actual) {
      var lateClassA = isBadLate ? 'fv-route-late' : 'fv-route-ontime';
      var lateNoteA  = isBadLate ? ' (+' + t.late_min + ' min)' : '';
      twyTimeHtml = 'Sched ' + esc(fmtTime(t.twy_sched)) +
                    ' <span class="' + lateClassA + '"> ✓ ' + esc(fmtTime(t.twy_actual)) + esc(lateNoteA) + '</span>';
    } else {
      var lateClassB = isBadLate ? 'fv-route-late' : '';
      twyTimeHtml = '<span class="' + lateClassB + '">' + esc(fmtTime(t.twy_sched)) +
                    (late && late !== 'On time' ? ' (' + esc(late) + ')' : '') + '</span>';
    }

    var platformHtml = (isStop && t.platform)
      ? ' <span style="color:#7fb3d3"> Plat ' + esc(t.platform) + '</span>'
      : '';

    // Stat cards — same as renderFocus
    var statLabel = isEst ? 'Est. Time' : (hasPassed ? 'Passed At' : 'At Twyford');
    var statTime  = isEst ? '~' + fmtTimeMs(ms) : (t.twy_actual ? fmtTime(t.twy_actual) : fmtTime(t.twy_sched));
    var statDelay = t.cancelled ? '<span class="stat-cancel">Cancelled</span>'
                  : isEst ? '<span class="stat-est">N/A</span>'
                  : (t.late_min === 0 ? '<span class="stat-ontime">On time</span>'
                  : '<span class="stat-late">' + (t.late_min > 0 ? '+' : '') + (t.late_min || '?') + ' min</span>');
    var statTrack = trackLabel(t);
    var statVeh   = t.num_veh ? t.num_veh + (t.num_veh === 1 ? ' coach' : ' coaches') : '—';

    var originStr = t.passenger === false
      ? (t.direction === 'up' ? '← From west' : '← From London')
      : (t.origin || '—');
    var destStr = t.passenger === false
      ? (t.direction === 'up' ? '→ To London' : '→ To west')
      : (t.dest || '—');

    html +=
      '<div class="mvc-card" style="background:linear-gradient(135deg,' + op.bg + '55 0%,' + op.bg + '11 100%)">' +

      '<div class="mvc-header" style="background:linear-gradient(135deg,' + op.bg + '44 0%,transparent 100%);border-bottom:1px solid ' + op.bg + '66">' +
        '<div class="mvc-op-badge" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</div>' +
        '<div class="mvc-main">' +
          '<div class="mvc-headcode">' + esc(labelLine(t)) + '</div>' +
          '<div class="mvc-op-name">' + esc(t.headcode) + ' · ' + esc(t.op_name || op.abbr) + '  ' + confBadge(t) + '</div>' +
        '</div>' +
        '<div class="mvc-right">' +
          '<span class="mvc-track-badge">' + esc(trackLabel(t)) + '</span>' +
          '<span class="mvc-call-badge ' + callClass + '">' + esc(callText) + '</span>' +
          (isEst ? '<span class="mvc-countdown">' + esc(fmtCountdown(ms, now)) + '</span>' : '') +
        '</div>' +
      '</div>' +

      '<div class="mvc-route">' +
        '<div class="mvc-route-ep">' +
          '<div class="mvc-ep-name">' + esc(originStr) + '</div>' +
          (t.orig_dep ? '<div class="mvc-ep-time">dep ' + esc(fmtTime(t.orig_dep)) + '</div>' : '') +
        '</div>' +
        '<div class="mvc-route-arrow">→</div>' +
        '<div class="mvc-route-twy">' +
          '<div class="mvc-twy-name">Twyford</div>' +
          '<div class="mvc-twy-time">' + twyTimeHtml + platformHtml + '</div>' +
        '</div>' +
        '<div class="mvc-route-arrow">→</div>' +
        '<div class="mvc-route-ep mvc-route-ep-right">' +
          '<div class="mvc-ep-name">' + esc(destStr) + '</div>' +
          (t.dest_arr ? '<div class="mvc-ep-time">arr ' + esc(fmtTime(t.dest_arr)) + '</div>' : '') +
        '</div>' +
      '</div>' +

      '<div class="mvc-stats">' +
        mvcCard(statLabel, statTime, '') +
        mvcCard('Delay', statDelay, '', true) +
        mvcCard('Track', statTrack, '') +
        mvcCard('Vehicles', statVeh, '') +
      '</div>' +

      '</div>';
  });
  document.getElementById('multi-view').innerHTML = html;
}

function mvcCard(label, value, unit, rawHtml) {
  return '<div class="mvc-stat-card">' +
    '<div class="mvc-stat-label">' + esc(label) + '</div>' +
    '<div class="mvc-stat-value">' + (rawHtml ? value : esc(value)) + '</div>' +
    (unit ? '<div style="font-size:clamp(8px,0.9vw,12px);color:#5a8fad">' + esc(unit) + '</div>' : '') +
    '</div>';
}

/* ── List view ───────────────────────────────────────────── */
function renderList(trains, now) {
  var tb = document.getElementById('train-tbody');
  if (!trains.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#4a7a9a;padding:30px">No trains</td></tr>';
    return;
  }
  var html = '';
  trains.forEach(function(t) {
    var ms     = trainMs(t);
    var isPast = ms < now - 90000;
    var isEst  = !t.confirmed;
    var late   = lateStr(t);
    var op     = opStyle(t.op_code, t.passenger);

    // Scheduled time — always show the WTT/estimated sched; prefix ~ if estimated
    var schedDisp = isEst ? '~' + fmtTime(t.twy_sched) : fmtTime(t.twy_sched);

    // Actual time — only set once TRUST confirms
    var actualDisp = t.twy_actual ? fmtTime(t.twy_actual) : '—';

    var lateClass = t.cancelled ? 'tr-cancel'
                  : isEst ? 'tr-est'
                  : (t.late_min && t.late_min > 0) ? 'tr-late' : 'tr-ontime';
    var lateDisp  = t.cancelled ? 'Cancelled' : isEst ? 'est.' : (late || '');
    var routeStr  = t.passenger === false
      ? freightClass(t.headcode)
      : (t.origin || '—') + ' → ' + (t.dest || '—');

    html += '<tr class="tr-row' + (isPast ? ' past' : '') + '" onmousedown="rowTap(this)" data-uid="' + esc(t.uid) + '">' +
      '<td class="tr-time ' + lateClass + '">' + esc(schedDisp) + '</td>' +
      '<td class="tr-time ' + (t.twy_actual ? (lateClass || 'tr-ontime') : '') + '">' + esc(actualDisp) + '</td>' +
      '<td class="tr-hc">' + esc(t.headcode) + '</td>' +
      '<td><span class="tr-op" style="background:' + op.bg + ';color:' + op.fg + '">' + esc(op.abbr) + '</span></td>' +
      '<td class="tr-route">' + esc(routeStr) + '</td>' +
      '<td class="tr-track">' + esc(trackLabel(t)) + '</td>' +
      '<td class="tr-status ' + lateClass + '">' + esc(lateDisp) + '</td>' +
      '</tr>';
  });
  tb.innerHTML = html;
}

function rowTap(row) {
  if (!trainsData) return;
  var uid = row.dataset.uid;
  var t = (trainsData.trains || []).find(function(x) { return x.uid === uid; });
  if (!t) return;
  document.getElementById('no-data').style.display = 'none';
  document.getElementById('focus-view').style.display = 'flex';
  document.getElementById('list-view').style.display = 'none';
  renderFocus(t, Date.now());
  ['recent','next','list'].forEach(function(m) {
    document.getElementById('btn-' + m).classList.remove('active');
  });
  // Pressing List again returns to list
  document.getElementById('btn-list').classList.add('active');
  currentMode = 'list-detail';
}

/* ── Helpers ─────────────────────────────────────────────── */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Boot ────────────────────────────────────────────────── */
setMode('next');
startPoll();
/* ── Approach bar ────────────────────────────────────────── */
var APPR_HOUSE_PCT = 62.9;  // Twyford house: 8.3mi from Reading / 13.2mi total

function renderApproachBar(trains, now) {
  var inner = document.getElementById('appr-dots');
  if (!inner) return;
  var dots = '';
  (trains || []).forEach(function(t) {
    var houseMs = (t.house_pass_ts || 0) * 1000;
    if (!houseMs) return;
    var dtSec = (houseMs - now) / 1000;
    if (dtSec < -300 || dtSec > 2100) return;  // 5 min past → 35 min future

    var isMain = (t.track === 'Main');
    var speedMph = isMain ? 49 : 33;
    var milesAway = Math.abs(dtSec) / 3600 * speedMph;
    var pctAway = milesAway / 13.2 * 100;

    var pct;
    if (t.direction === 'down') {
      // DOWN: arrives from Maidenhead side (right=high pct), moves left
      pct = APPR_HOUSE_PCT + (dtSec > 0 ? pctAway : -pctAway);
    } else {
      // UP: arrives from Reading side (left=low pct), moves right
      pct = APPR_HOUSE_PCT - (dtSec > 0 ? pctAway : -pctAway);
    }
    pct = Math.max(1, Math.min(99, pct));

    var op = opStyle(t.op_code, t.passenger);
    var td = tdPositions[t.headcode];
    var hasTd = td && td.age_s < 120;
    var border = hasTd ? '2px solid #2a9a50' : '1px solid ' + op.fg + '55';
    var label = (t.passenger === false ? freightClass(t.headcode) : (t.dest || ''))
                  .slice(0, 3).toUpperCase();
    dots += '<div class="appr-dot" style="left:' + pct.toFixed(1) + '%;background:' + op.bg + ';border:' + border + '">' + esc(label) + '</div>';
  });
  inner.innerHTML = dots;
}
